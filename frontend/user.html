<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="V RISING" />
  <meta property="og:title" content="V Rising — Профиль игрока" />
  <meta property="og:description" content="Официальный сайт игрового сервера V Rising — новости, статус серверов, лидерборд, правила." />
  <meta property="og:image" content="/uploads/og-default.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="description" content="Официальный сайт игрового сервера V Rising — новости, статус серверов, лидерборд, правила." />
  <title>V Rising — Профиль игрока</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tailwind.min.css" />
  <style>
    :root {
      --bg:#06000f; --card:rgba(14,5,22,0.88); --border:rgba(110,0,150,0.22);
      --text:#e2d8f0; --muted:#9488a8; --gold:#c9a94a; --crimson:#c8002a;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 50%, rgba(80,0,130,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(150,0,28,0.08) 0%, transparent 50%);
      background-attachment:fixed;
      font-family:'Inter',system-ui,sans-serif;color:var(--text);min-height:100vh;
    }
    .gothic{font-family:'Cinzel',serif;}
    .glass-nav{background:rgba(8,0,14,0.9);border-bottom:1px solid rgba(110,0,20,0.35);backdrop-filter:blur(14px);position:sticky;top:0;z-index:40;}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,0.055) 1px,transparent 1px);background-size:28px 28px;}
    [data-tip]{position:relative;}
    [data-tip]::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);background:rgba(6,0,15,0.96);border:1px solid rgba(180,0,35,0.4);color:#d4c4e0;font-size:.68rem;padding:.28rem .65rem;border-radius:.4rem;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:999;font-family:'Inter',sans-serif;}
    [data-tip]:hover::after{opacity:1;}
    .profile-cover{
      position:relative;height:160px;overflow:hidden;
      background:linear-gradient(135deg,rgba(40,0,80,0.9),rgba(90,0,20,0.85),rgba(20,0,50,0.9));
    }
    .cover-fog{
      position:absolute;inset:0;pointer-events:none;
      background:radial-gradient(ellipse at 20% 60%,rgba(120,0,200,0.25) 0%,transparent 55%),
                 radial-gradient(ellipse at 80% 30%,rgba(200,0,40,0.2) 0%,transparent 50%);
      animation:cover-drift 12s ease-in-out infinite alternate;
    }
    @keyframes cover-drift{to{transform:translate(3%,4%) scale(1.06);}}
    .cover-stars{position:absolute;inset:0;pointer-events:none;}
    .cover-star{position:absolute;border-radius:50%;background:#fff;animation:twinkle 3s ease-in-out infinite alternate;}
    @keyframes twinkle{0%{opacity:.15}100%{opacity:.75}}
    .cover-glow{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(200,0,40,0.6),rgba(120,0,200,0.5),transparent);}
    .avatar-circle{
      width:92px;height:92px;border-radius:50%;
      background:radial-gradient(circle at 38% 32%,rgba(80,0,150,0.6),rgba(120,0,20,0.5));
      border:3px solid rgba(14,5,22,1);
      box-shadow:0 0 0 2px rgba(190,0,40,0.5),0 0 28px rgba(180,0,30,0.4);
      display:flex;align-items:center;justify-content:center;
      font-family:'Cinzel',serif;font-size:2.2rem;color:#d4c4e0;overflow:hidden;
    }
    .avatar-circle img{width:100%;height:100%;object-fit:cover;}
    .rank-bar-wrap{height:5px;background:rgba(255,255,255,0.07);border-radius:9999px;overflow:hidden;margin-top:.45rem;}
    .rank-bar{height:100%;border-radius:9999px;transition:width .8s ease;}
    .g-card{
      background:rgba(14,5,22,0.82);border:1px solid rgba(110,0,150,0.22);
      border-radius:.875rem;backdrop-filter:blur(16px) saturate(1.2);
      box-shadow:0 4px 24px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.04);
      position:relative;
    }
    .g-card::before{
      content:'';position:absolute;top:0;left:20%;right:20%;height:1px;
      background:linear-gradient(90deg,transparent,rgba(200,0,45,0.35),transparent);
    }
    .stat-row{display:flex;justify-content:space-between;align-items:center;padding:.52rem 0;border-bottom:1px solid rgba(110,0,20,0.1);}
    .stat-row:last-child{border-bottom:none;}
    .btn{
      background:linear-gradient(135deg,#6a001a,#a00022);border:none;border-radius:.55rem;
      padding:.42rem .95rem;color:#fff;font-size:.75rem;font-weight:700;
      cursor:pointer;box-shadow:0 0 14px rgba(180,0,30,0.45);transition:all .2s;
      text-decoration:none;display:inline-flex;align-items:center;gap:.35rem;
    }
    .btn:hover{box-shadow:0 0 26px rgba(210,0,40,0.7);transform:translateY(-1px);}
    .btn-ghost{background:rgba(80,0,15,0.3);border:1px solid rgba(150,0,20,0.35);box-shadow:none;color:var(--muted);}
    .btn-ghost:hover{background:rgba(100,0,20,0.4);color:var(--text);box-shadow:none;}
    @keyframes fade-up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .g-card{animation:fade-up .4s ease both;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:rgba(8,0,14,0.4);}
    ::-webkit-scrollbar-thumb{background:rgba(130,0,24,0.5);border-radius:3px;}
    /* ── Mobile ── */
    @media (max-width:640px) {
      body{overflow-x:hidden;}
      .g-card{padding:1rem !important;}
    }
    @media (max-width:400px) {
      .g-card{padding:.85rem !important;}
      .stat-row{padding:.45rem 0;}
    }

/* ── Mobile ── */
#nav-mob-btn2 {
  display:none; align-items:center; justify-content:center;
  width:34px; height:34px; background:rgba(18,5,28,0.8);
  border:1px solid rgba(110,0,20,0.35); border-radius:.4rem; cursor:pointer; flex-shrink:0;
}
#nav-mob-btn2 span { display:block; width:15px; height:1.5px; background:var(--text); border-radius:1px; margin:3px auto; }
#mob-menu2 {
  display:none; position:fixed; top:0; right:-260px; width:240px; height:100vh;
  background:rgba(10,2,18,0.98); border-left:1px solid rgba(110,0,20,0.3);
  z-index:310; transition:right .3s ease; padding:4rem 1.2rem 1.5rem; flex-direction:column; gap:.5rem;
}
#mob-menu2.open { right:0; display:flex; }
#mob-overlay2 { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:300; }
#mob-overlay2.open { display:block; }
.mob-link { display:block; padding:.6rem .75rem; color:var(--muted); text-decoration:none; border-radius:.4rem;
  border:1px solid transparent; font-size:.82rem; transition:all .15s; }
.mob-link:hover { color:var(--text); border-color:rgba(110,0,20,0.3); background:rgba(110,0,20,0.1); }
@media (max-width:640px) {
  #nav-mob-btn2 { display:flex; }
  .user-page-nav-links { display:none !important; }
  .u-stat-grid { grid-template-columns:repeat(2,1fr) !important; }
  .u-main-wrap { flex-direction:column !important; }
}
  </style>
</head>
<body>

<nav class="glass-nav">
  <div style="max-width:680px;margin:auto;padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;">
    <a href="/" id="nav-logo" class="gothic" style="font-size:1.1rem;font-weight:900;letter-spacing:.15em;color:#d4c4e0;text-decoration:none;text-shadow:0 0 20px rgba(204,0,40,0.6);">V RISING</a>
    <div class="user-page-nav-links" style="display:flex;gap:.5rem;">
      <a href="/leaderboard.html" class="btn btn-ghost" style="font-size:.72rem;">🏆 Лидерборд</a>
      <a href="/" class="btn btn-ghost" style="font-size:.72rem;">← Главная</a>
    </div>
      <div id="mob-overlay2" onclick="closeMobMenu2()"></div>
      <div id="mob-menu2">
        <a href="/" class="mob-link">🏠 Главная</a>
        <a href="/servers.html" class="mob-link">⚔️ Серверы</a>
        <a href="/leaderboard.html" class="mob-link">🏆 Игроки</a>
        <a href="/profile.html" class="mob-link">👤 Профиль</a>
      </div>
      <button id="nav-mob-btn2" onclick="openMobMenu2()" aria-label="Меню">
        <span></span><span></span><span></span>
      </button>
  </div>
</nav>

<div style="max-width:680px;margin:2rem auto 3rem;padding:0 1rem;">

  <div id="not-found" style="display:none;text-align:center;padding:4rem 1rem;">
    <div style="font-size:2.5rem;margin-bottom:1rem;">⚰</div>
    <div class="gothic" style="font-size:1rem;color:var(--muted);">Игрок не найден</div>
    <a href="/" class="btn" style="margin-top:1.5rem;font-size:.78rem;">← На главную</a>
  </div>

  <div id="profile-wrap">
    <!-- Cover + Avatar -->
    <div class="g-card" style="overflow:hidden;padding:0;margin-bottom:1.1rem;">
      <div class="profile-cover">
        <div class="cover-fog"></div>
        <div class="cover-stars" id="cover-stars"></div>
        <div style="position:absolute;bottom:1rem;left:1.5rem;font-family:'Cinzel',serif;font-size:.6rem;font-weight:700;letter-spacing:.22em;color:rgba(200,170,255,0.55);text-transform:uppercase;" id="cover-subtitle">— Профиль игрока —</div>
        <div class="cover-glow"></div>
      </div>
      <div style="padding:0 1.5rem 1.5rem;">
        <div style="margin-top:-46px;margin-bottom:.75rem;position:relative;z-index:2;">
          <div class="avatar-circle" id="user-avatar"></div>
        </div>
        <div style="display:flex;align-items:center;gap:.65rem;flex-wrap:wrap;margin-bottom:.2rem;">
          <h1 class="gothic" id="user-name" style="font-size:1.45rem;font-weight:700;color:#d4c4e0;letter-spacing:.06em;">—</h1>
          <span id="user-role-badge" style="font-size:.6rem;padding:.15rem .6rem;border-radius:9999px;border:1px solid rgba(120,80,200,0.4);color:#c4b5fd;background:rgba(80,40,140,0.2);"></span>
          <span id="user-status" style="display:none;align-items:center;gap:.28rem;font-size:.6rem;"></span>
          <a id="dm-user-btn" href="#" onclick="dmUser(event)" style="visibility:hidden;display:inline-flex;align-items:center;gap:.35rem;background:rgba(80,0,120,0.22);border:1px solid rgba(110,0,150,0.38);color:var(--muted);border-radius:.5rem;padding:.28rem .72rem;font-size:.72rem;text-decoration:none;cursor:pointer;transition:all .18s;" onmouseover="this.style.color='var(--text)';this.style.background='rgba(100,0,150,0.32)'" onmouseout="this.style.color='var(--muted)';this.style.background='rgba(80,0,120,0.22)'">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Написать
          </a>
        </div>
        <div id="user-game-nick" style="display:none;font-size:.72rem;color:var(--muted);margin-bottom:.1rem;"></div>
        <!-- Rank -->
        <div id="rank-wrap" style="display:none;margin-top:.5rem;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.2rem;">
            <span id="rank-label" style="font-family:'Oswald',sans-serif;font-size:.85rem;font-weight:500;letter-spacing:.04em;"></span>
            <span id="rank-time" style="font-size:.62rem;color:var(--muted);font-family:'Oswald',sans-serif;font-variant-numeric:tabular-nums;"></span>
          </div>
          <div class="rank-bar-wrap"><div id="rank-bar" class="rank-bar" style="width:0%;"></div></div>
          <div style="display:flex;justify-content:space-between;margin-top:.18rem;">
            <span id="rank-cur-label" style="font-size:.52rem;color:var(--muted);"></span>
            <span id="rank-next-label" style="font-size:.52rem;color:var(--muted);"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Info -->
    <div class="g-card" style="padding:1.4rem 1.5rem;">
      <h2 class="gothic" style="font-size:.68rem;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;margin-bottom:1rem;">— Информация —</h2>
      <div class="stat-row">
        <span style="color:var(--muted);font-size:.82rem;">Роль</span>
        <span id="user-role" style="font-size:.85rem;color:var(--text);font-weight:500;">—</span>
      </div>
      <div class="stat-row">
        <span style="color:var(--muted);font-size:.82rem;">На сервере с</span>
        <span id="user-since" style="font-size:.85rem;color:var(--text);font-weight:500;font-family:'Oswald',sans-serif;">—</span>
      </div>
      <div class="stat-row">
        <span style="color:var(--muted);font-size:.82rem;">Всего на серверах</span>
        <span id="user-playtime" style="font-size:.85rem;color:var(--text);font-weight:500;font-family:'Oswald',sans-serif;font-variant-numeric:tabular-nums;">—</span>
      </div>
      <div class="stat-row">
        <span style="color:var(--muted);font-size:.82rem;">Последний сеанс</span>
        <span id="user-last-seen" style="font-size:.85rem;color:var(--text);font-weight:500;font-family:'Oswald',sans-serif;">—</span>
      </div>
      <div class="stat-row">
        <span style="color:var(--muted);font-size:.82rem;">Комментариев</span>
        <span id="user-comment-count" style="font-size:.85rem;color:var(--text);font-weight:500;font-family:'Oswald',sans-serif;font-variant-numeric:tabular-nums;">—</span>
      </div>
    </div>
  </div>

</div>

<script src="/common.js?v=3"></script>
<script>
const API = '/api';

function applySiteBackground(bg) {
  bg = (bg || '').trim();
  if (!bg) return;
  document.body.style.backgroundImage = [
    'radial-gradient(ellipse at 15% 50%, rgba(80,0,130,0.14) 0%, transparent 55%)',
    'radial-gradient(ellipse at 85% 20%, rgba(150,0,28,0.10) 0%, transparent 50%)',
    'linear-gradient(rgba(8,0,14,0.72), rgba(8,0,14,0.72))',
    `url('${bg}')`,
  ].join(',');
  document.body.style.backgroundSize = 'auto,auto,auto,cover';
  document.body.style.backgroundPosition = 'center,center,center,center';
  document.body.style.backgroundAttachment = 'fixed,fixed,fixed,fixed';
}

const RANKS = [
  {label:'⚰ Смертный',    min:0,      max:18000,   color:'#9488a8', next:'Охотник'},
  {label:'⚔ Охотник',     min:18000,  max:90000,   color:'#c8a84a', next:'Лорд крови'},
  {label:'🩸 Лорд крови', min:90000,  max:360000,  color:'#e05070', next:'Повелитель'},
  {label:'☠ Повелитель',  min:360000, max:Infinity, color:'#b46ef0', next:null},
];

// esc, _dateOpts, fmtDate, _renderAdminBadge, _statusInfo — defined in common.js
function fmtSec(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?`${h}ч ${m}м`:`${m}м`;}
function fmtAgo(iso){
  if(!iso)return'Никогда';
  const d=Math.floor((Date.now()-_toDate(iso).getTime())/864e5);
  if(d<1)return'Сегодня';if(d===1)return'Вчера';
  if(d<7)return d+' дн. назад';if(d<30)return Math.floor(d/7)+' нед. назад';
  if(d<365)return Math.floor(d/30)+' мес. назад';return Math.floor(d/365)+' г. назад';
}

function buildStars(){
  const ct=document.getElementById('cover-stars');
  for(let i=0;i<40;i++){
    const s=document.createElement('div');s.className='cover-star';
    const sz=Math.random()*1.8+.6;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*3}s;`;
    ct.appendChild(s);
  }
}

function renderRank(totalSeconds){
  const wrap=document.getElementById('rank-wrap'); if(!wrap)return;
  const rank=RANKS.slice().reverse().find(r=>totalSeconds>=r.min)||RANKS[0];
  const pct=rank.max===Infinity?100:Math.min(100,Math.round((totalSeconds-rank.min)/(rank.max-rank.min)*100));
  const bar=document.getElementById('rank-bar');
  document.getElementById('rank-label').textContent=rank.label;
  document.getElementById('rank-label').style.color=rank.color;
  document.getElementById('rank-time').textContent=fmtSec(totalSeconds)+' на серверах';
  bar.style.background=`linear-gradient(90deg,${rank.color}88,${rank.color})`;
  bar.style.boxShadow=`0 0 8px ${rank.color}66`;
  setTimeout(()=>{bar.style.width=pct+'%';},80);
  document.getElementById('rank-cur-label').textContent=rank.label.split(' ').slice(1).join(' ');
  document.getElementById('rank-next-label').textContent=rank.next?rank.next+' → '+fmtSec(rank.max-totalSeconds):'Максимальный ранг';
  wrap.style.display='';
}

function dmUser(e) {
  e.preventDefault();
  const username = new URLSearchParams(location.search).get('u');
  if (username) window.location.href = `/?dm=${encodeURIComponent(username)}`;
}

async function loadUser(){
  buildStars();
  const params=new URLSearchParams(location.search);
  const username=params.get('u');
  if(!username){document.getElementById('not-found').style.display='';document.getElementById('profile-wrap').style.display='none';return;}
  try{
    const u=await fetch(`${API}/users/${encodeURIComponent(username)}`).then(r=>{if(!r.ok)throw r;return r.json();});
    document.title=`V Rising — ${u.username}`;
    const av=document.getElementById('user-avatar');
    if(u.avatar_url){const img=document.createElement('img');img.src=u.avatar_url;av.appendChild(img);}
    else{av.textContent=u.username.charAt(0).toUpperCase();}
    document.getElementById('user-name').textContent=u.username;
    // Game nickname
    if (u.game_nickname) {
      const nickEl = document.getElementById('user-game-nick');
      if (nickEl) { nickEl.textContent = '⚔ В игре: ' + u.game_nickname; nickEl.style.display = ''; }
    }
    // Show DM button if logged in as a different user (space always reserved to avoid CLS)
    let _isMe = false;
    const dmBtn = document.getElementById('dm-user-btn');
    try {
      const me = await fetch(`${API}/auth/me`,{credentials:'include'}).then(r=>r.ok?r.json():null);
      if (me) {
        _isMe = me.username === u.username;
        if (!_isMe && dmBtn) dmBtn.style.visibility = 'visible';
        else if (dmBtn) dmBtn.style.display = 'none';
      } else if (dmBtn) dmBtn.style.display = 'none';
    } catch { if (dmBtn) dmBtn.style.display = 'none'; }
    const badge=document.getElementById('user-role-badge');
    if (u.role === 'admin') {
      badge.innerHTML = _renderAdminBadge(u);
      badge.style.cssText = '';
    } else {
      badge.textContent = 'Игрок';
      badge.style.color='#c4b5fd'; badge.style.borderColor='rgba(120,80,200,0.4)'; badge.style.background='rgba(80,40,140,0.2)';
    }
    document.getElementById('user-role').textContent=u.role==='admin'?(u.admin_title||'Администратор'):'Игрок';
    document.getElementById('user-since').textContent=fmtDate(u.created_at);
    document.getElementById('user-playtime').textContent=u.total_seconds>0?fmtSec(u.total_seconds):'Ещё не играл';
    document.getElementById('user-last-seen').textContent=u.last_seen?fmtAgo(u.last_seen):'Не играл';
    document.getElementById('user-comment-count').textContent=u.comment_count??'0';
    renderRank(u.total_seconds||0);
    const statusEl = document.getElementById('user-status');
    if (statusEl) {
      const effectiveIso = _isMe ? new Date().toISOString() : u.last_active_at;
      const st = _statusInfo(effectiveIso);
      statusEl.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:${st.dot};flex-shrink:0;${st.glow?'box-shadow:'+st.glow+';':''}"></span><span style="color:${st.color};">${st.label}</span>`;
      statusEl.style.display = 'inline-flex';
    }
    try{
      const s=await fetch(`${API}/settings/public`).then(r=>r.json());
      window.__TZ = s.timezone || 'Europe/Moscow';
      window.__H12 = (s.time_format || '24h') === '12h';
      window.__DATEFMT = s.date_format || 'dd.mm.yyyy';
      document.getElementById('nav-logo').textContent=s.site_title||'V RISING';
      document.getElementById('cover-subtitle').textContent='— '+(s.site_title||'V Rising')+' · Профиль игрока —';
      applySiteBackground(s.bg_image_url);
    }catch{}
  }catch{
    document.getElementById('not-found').style.display='';
    document.getElementById('profile-wrap').style.display='none';
  }
}
loadUser();

function openMobMenu2() {
  document.getElementById('mob-menu2').classList.add('open');
  document.getElementById('mob-overlay2').classList.add('open');
}
function closeMobMenu2() {
  document.getElementById('mob-menu2').classList.remove('open');
  document.getElementById('mob-overlay2').classList.remove('open');
}
</script>
</body>
</html>
