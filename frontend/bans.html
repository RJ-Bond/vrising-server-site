<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Баны — Just-Skill.Ru</title>
  <link rel="canonical" href="https://just-skill.ru/bans.html" />
  <meta name="description" content="Список заблокированных игроков серверов V Rising на Just-Skill.Ru." />
  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="V RISING" />
  <meta property="og:title" content="V Rising — Баны" />
  <meta property="og:description" content="Официальный сайт игрового сервера V Rising — новости, статус серверов, лидерборд, правила." />
  <meta property="og:image" content="/uploads/og-default.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tailwind.min.css" />
  <link rel="stylesheet" href="/theme.css?v=1" />
  <link rel="stylesheet" href="/components.css?v=2" />
  <style>
    /* Design tokens in /theme.css — this page uses them unchanged. */
    * { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body {
      background:var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 50%, rgba(80,0,130,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(150,0,28,0.08) 0%, transparent 50%);
      background-attachment:fixed;
      font-family:'Inter',system-ui,sans-serif; color:var(--text); min-height:100vh;
    }
    /* nav + tooltips + base: /components.css */


    /* ── Ban-in stagger animation ── */
    @keyframes ban-in {
      from { opacity:0; transform:translateX(-6px); }
      to   { opacity:1; transform:translateX(0); }
    }
    @keyframes fade-up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

    /* ── Search input ── */
    .search-input {
      width:100%; background:rgba(14,5,22,0.7); border:1px solid rgba(110,0,150,0.28);
      border-radius:.6rem; color:var(--text); font-family:'Inter',sans-serif;
      font-size:.875rem; padding:.6rem 1rem; outline:none; transition:border-color .2s, box-shadow .2s;
    }
    .search-input::placeholder { color:var(--muted); }
    .search-input:focus { border-color:rgba(140,0,180,0.55); box-shadow:0 0 0 3px rgba(110,0,150,0.12); }

    /* ── Filter pills ── */
    .pill {
      font-size:.72rem; font-weight:600; padding:.3rem .75rem; border-radius:9999px;
      border:1px solid rgba(110,0,150,0.25); background:rgba(14,5,22,0.6);
      color:var(--muted); cursor:pointer; transition:all .18s; font-family:'Inter',sans-serif;
    }
    .pill:hover { border-color:rgba(140,0,180,0.45); color:var(--text); }
    .pill.active { background:rgba(110,0,150,0.22); border-color:rgba(140,0,180,0.55); color:var(--text); }

    /* ── Ban card ── */
    .ban-card {
      background:var(--card); border:1px solid var(--border); border-radius:.75rem;
      padding:1rem 1.1rem; margin-bottom:.7rem; position:relative;
      backdrop-filter:blur(14px) saturate(1.2);
      box-shadow:0 2px 14px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.03);
      transition:border-color .2s, box-shadow .2s;
    }
    .ban-card:hover { border-color:rgba(140,0,180,0.38); box-shadow:0 4px 22px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.04); }

    /* ── Skeleton shimmer ── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }
    .skeleton {
      border-radius:.5rem; animation:shimmer 1.4s ease infinite;
      background: linear-gradient(90deg, rgba(80,20,110,0.12) 25%, rgba(110,40,150,0.22) 50%, rgba(80,20,110,0.12) 75%);
      background-size:800px 100%;
    }

    /* ── Mobile ── */
    @media (max-width:640px) {
      body { overflow-x:hidden; }
      .glass-nav > div { padding:.6rem 1rem !important; }
      .ban-meta-row { flex-wrap:wrap; gap:.3rem; }
      /* Prevent iOS Safari zoom-on-focus for the search input. */
      input, textarea, select { font-size:16px !important; }
    }
    @media (max-width:480px) {
      .ban-card { padding:.8rem .9rem; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<div class="mobile-overlay" id="mob-overlay" onclick="toggleMobileNav()"></div>
<div class="mobile-drawer" id="mob-drawer">
  <a href="/">Главная</a>
  <a href="/servers.html">Сервера</a>
  <a href="/leaderboard.html">Игроки</a>
  <a href="/clans.html">Кланы</a>
  <a href="/map.html">Карта</a>
  <a href="/bans.html" class="active">Баны</a>
  <a href="/faq.html">FAQ</a>
  <a href="/profile.html">Профиль</a>
</div>
<nav class="glass-nav">
  <div style="max-width:900px;margin:auto;padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem;">
    <a href="/" id="nav-logo" class="gothic" style="font-size:1.1rem;font-weight:900;letter-spacing:.15em;color:#d4c4e0;text-decoration:none;text-shadow:0 0 20px rgba(204,0,40,0.6);"></a>
    <div class="nav-links">
      <a href="/" class="topnav-link">Главная</a>
      <a href="/servers.html" class="topnav-link">Сервера</a>
      <a href="/leaderboard.html" class="topnav-link">Игроки</a>
      <a href="/clans.html" class="topnav-link">Кланы</a>
      <a href="/map.html" class="topnav-link">Карта</a>
      <a href="/bans.html" class="topnav-link active">Баны</a>
      <a href="/faq.html" class="topnav-link">FAQ</a>
      <a id="nav-profile-link" href="/profile.html" class="topnav-link" style="display:none;">Профиль</a>
      <a id="nav-login-link" href="/login.html" class="topnav-link">Войти</a>
    </div>
    <button class="nav-burger" onclick="toggleMobileNav()">☰</button>
  </div>
</nav>

<!-- MAIN -->
<div style="max-width:760px;margin:2.5rem auto;padding:0 1rem;position:relative;z-index:1;">

  <!-- Page header -->
  <div style="margin-bottom:1.75rem;animation:fade-up .38s ease both;">
    <div style="display:flex;align-items:center;gap:.65rem;margin-bottom:.4rem;">
      <span style="font-size:1.55rem;line-height:1;">🚫</span>
      <h1 class="gothic" style="font-size:1.25rem;font-weight:700;letter-spacing:.09em;color:var(--gold);text-transform:uppercase;">Список банов</h1>
    </div>
    <p style="font-size:.82rem;color:var(--muted);line-height:1.5;padding-left:2.2rem;">
      Заблокированные игроки сервера. Данные обновляются в реальном времени.
    </p>
  </div>

  <!-- Search + filter -->
  <div style="margin-bottom:1.1rem;display:flex;flex-direction:column;gap:.6rem;animation:fade-up .4s ease .05s both;">
    <div style="position:relative;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-input" class="search-input" type="text" placeholder="Поиск по нику..." style="padding-left:2.4rem;" oninput="applyFilters()" />
    </div>
    <div id="filter-pills" style="display:flex;gap:.4rem;flex-wrap:wrap;">
      <button class="pill active" data-type="all"    onclick="setFilter(this,'all')">Все</button>
      <button class="pill"        data-type="warn"   onclick="setFilter(this,'warn')">⚠ Предупреждение</button>
      <button class="pill"        data-type="kick"   onclick="setFilter(this,'kick')">👢 Кик</button>
      <button class="pill"        data-type="ban"    onclick="setFilter(this,'ban')">🚫 Бан</button>
      <button class="pill"        data-type="permban" onclick="setFilter(this,'permban')">☠ Перма</button>
    </div>
  </div>

  <!-- Info bar -->
  <div id="ban-info" style="font-size:.75rem;color:var(--muted);margin-bottom:.75rem;min-height:1.1rem;"></div>

  <!-- Ban list -->
  <div id="ban-list"></div>

</div>

<script src="/common.js"></script>
<script>
const API = '/api';

/* ── Severity config ── */
const BAN_SEVERITY = {
  warn:    { label:'Предупреждение', color:'#f59e0b', bg:'rgba(245,158,11,0.12)', border:'rgba(245,158,11,0.38)', icon:'⚠' },
  kick:    { label:'Кик',            color:'#f97316', bg:'rgba(249,115,22,0.12)', border:'rgba(249,115,22,0.38)', icon:'👢' },
  ban:     { label:'Бан',            color:'#ef4444', bg:'rgba(239,68,68,0.12)',  border:'rgba(239,68,68,0.4)',   icon:'🚫' },
  permban: { label:'Перма-бан',      color:'#7f1d1d', bg:'rgba(127,29,29,0.18)', border:'rgba(220,38,38,0.5)',   icon:'☠' },
};
function getSeverity(type) {
  return BAN_SEVERITY[String(type || '').toLowerCase()] || BAN_SEVERITY.ban;
}

/* ── State ── */
let allBans = [];
let currentFilter = 'all';
let currentMe = null;

/* ── Nav auth ── */
(function() {
  const cached = (() => { try { return JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user')); } catch { return null; } })();
  if (cached) {
    document.getElementById('nav-profile-link') && (document.getElementById('nav-profile-link').style.display = '');
    document.getElementById('nav-login-link') && (document.getElementById('nav-login-link').style.display = 'none');
  }
  fetch('/api/auth/me', { credentials:'include' }).then(r => {
    const profileLink = document.getElementById('nav-profile-link');
    const loginLink   = document.getElementById('nav-login-link');
    if (r.ok) {
      if (profileLink) profileLink.style.display = '';
      if (loginLink)   loginLink.style.display = 'none';
    } else {
      localStorage.removeItem('user'); sessionStorage.removeItem('user');
      localStorage.removeItem('token'); sessionStorage.removeItem('token');
      if (profileLink) profileLink.style.display = 'none';
      if (loginLink)   loginLink.style.display = '';
    }
  }).catch(() => {});
})();

/* ── Site settings ── */
function applySiteBackground(bg) {
  bg = (bg || '').trim();
  if (!bg) return;
  document.body.style.backgroundImage = [
    'radial-gradient(ellipse at 15% 50%, rgba(80,0,130,0.14) 0%, transparent 55%)',
    'radial-gradient(ellipse at 85% 20%, rgba(150,0,28,0.10) 0%, transparent 50%)',
    'linear-gradient(rgba(8,0,14,0.72), rgba(8,0,14,0.72))',
    `url('${bg}')`,
  ].join(',');
  document.body.style.backgroundSize = 'auto,auto,auto,cover';
  document.body.style.backgroundPosition = 'center,center,center,center';
  document.body.style.backgroundAttachment = 'fixed,fixed,fixed,fixed';
}
(async function() {
  try {
    const d = await fetch(`${API}/settings/public`).then(r => r.json());
    const title = (d.site_title || 'V Rising').trim();
    document.title = `${title} — Баны`;
    document.getElementById('nav-logo').textContent = '⚔ ' + title;
    applySiteBackground(d.bg_image_url);
  } catch {}
})();

/* ── Mobile nav ── */
function toggleMobileNav() {
  const overlay = document.getElementById('mob-overlay');
  const drawer  = document.getElementById('mob-drawer');
  const isOpen  = drawer.classList.contains('open');
  drawer.classList.toggle('open', !isOpen);
  overlay.classList.toggle('open', !isOpen);
  document.body.style.overflow = isOpen ? '' : 'hidden';
}

/* ── Date helpers ── */
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso.endsWith('Z') || /[+-]\d{2}:\d{2}$/.test(iso) ? iso : iso + 'Z');
  if (isNaN(d)) return '—';
  return d.toLocaleDateString('ru-RU', { day:'2-digit', month:'2-digit', year:'numeric', timeZone:'Europe/Moscow' });
}

function calcDuration(createdIso, expiresIso) {
  if (!expiresIso) return 'Навсегда';
  const created = new Date(createdIso.endsWith('Z') || /[+-]\d{2}:\d{2}$/.test(createdIso) ? createdIso : createdIso + 'Z');
  const expires = new Date(expiresIso.endsWith('Z') || /[+-]\d{2}:\d{2}$/.test(expiresIso) ? expiresIso : expiresIso + 'Z');
  const diffMs = expires - created;
  if (diffMs <= 0) return '—';
  const days = Math.round(diffMs / 86400000);
  if (days === 1) return '1 день';
  if (days < 5)  return `${days} дня`;
  if (days < 30) return `${days} дней`;
  const months = Math.round(days / 30);
  if (months < 12) return `${months} мес.`;
  return `${Math.round(months / 12)} г.`;
}

function isExpired(expiresIso) {
  if (!expiresIso) return false; // permanent = still active
  const exp = new Date(expiresIso.endsWith('Z') || /[+-]\d{2}:\d{2}$/.test(expiresIso) ? expiresIso : expiresIso + 'Z');
  return exp < new Date();
}

/* ── Render ── */
function renderBadge(sev) {
  return `<span style="display:inline-flex;align-items:center;gap:.28rem;font-size:.62rem;font-weight:700;padding:.18rem .58rem;border-radius:9999px;background:${sev.bg};border:1px solid ${sev.border};color:${sev.color};">${sev.icon} ${sev.label}</span>`;
}

function renderCard(ban, idx, isMe) {
  const sev      = getSeverity(ban.ban_type);
  const expired  = isExpired(ban.expires_at);
  const duration = calcDuration(ban.created_at, ban.expires_at);

  const leftBorder = isMe
    ? '2px solid var(--crimson)'
    : `2px solid ${sev.color}`;
  const cardBg = isMe
    ? 'background:rgba(200,0,42,0.08);'
    : '';

  const statusLabel = expired
    ? `<span style="font-size:.65rem;font-weight:700;color:#6aad7a;background:rgba(106,173,122,0.12);border:1px solid rgba(106,173,122,0.28);padding:.12rem .45rem;border-radius:9999px;">Истёк</span>`
    : `<span style="font-size:.65rem;font-weight:700;color:#ef4444;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.28);padding:.12rem .45rem;border-radius:9999px;">Активен</span>`;

  const durationBadge = `<span style="font-family:'Oswald',sans-serif;font-size:.8rem;color:var(--muted);margin-left:.2rem;">${esc(duration)}</span>`;

  const meTag = isMe
    ? `<span style="font-size:.62rem;font-weight:700;padding:.12rem .45rem;border-radius:9999px;background:rgba(200,0,42,0.18);border:1px solid rgba(200,0,42,0.45);color:var(--crimson);">Вы</span>`
    : '';

  const reason = ban.reason
    ? `<div style="font-size:.8rem;color:var(--muted);margin-top:.45rem;">Причина: <span style="color:var(--text);">${esc(ban.reason)}</span></div>`
    : '';

  return `
<div class="ban-card" data-username="${esc(ban.username)}" data-type="${esc(ban.ban_type || 'ban')}"
     style="border-left:${leftBorder};${cardBg}animation:ban-in .35s ease both;animation-delay:${idx * 30}ms;">
  <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.35rem;">
    ${renderBadge(sev)}
    <a href="/user.html?u=${encodeURIComponent(ban.username)}"
       style="font-size:.92rem;font-weight:600;color:var(--text);text-decoration:none;transition:color .2s;"
       onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text)'">
      ${esc(ban.username)}
    </a>
    ${meTag}
    ${durationBadge}
    <span style="margin-left:auto;">${statusLabel}</span>
  </div>
  ${reason}
  <div class="ban-meta-row" style="display:flex;gap:1rem;margin-top:.42rem;font-size:.74rem;color:var(--muted);">
    <span>Администратор: <b style="color:var(--text);font-weight:500;">${esc(ban.admin || '—')}</b></span>
    <span>Дата: <b style="color:var(--text);font-weight:500;">${fmtDate(ban.created_at)}</b></span>
    <span>Истекает: <b style="color:var(--text);font-weight:500;">${ban.expires_at ? fmtDate(ban.expires_at) : 'Никогда'}</b></span>
  </div>
</div>`;
}

function renderSkeleton() {
  return Array.from({length:4}, (_, i) => `
<div class="ban-card" style="border-left:2px solid rgba(110,0,150,0.25);animation:fade-up .3s ease ${i * 60}ms both;">
  <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.5rem;">
    <div class="skeleton" style="width:90px;height:20px;"></div>
    <div class="skeleton" style="width:120px;height:18px;"></div>
    <div class="skeleton" style="width:60px;height:18px;margin-left:auto;"></div>
  </div>
  <div class="skeleton" style="width:70%;height:14px;margin-bottom:.4rem;"></div>
  <div style="display:flex;gap:1rem;">
    <div class="skeleton" style="width:100px;height:12px;"></div>
    <div class="skeleton" style="width:80px;height:12px;"></div>
    <div class="skeleton" style="width:90px;height:12px;"></div>
  </div>
</div>`).join('');
}

function renderEmpty() {
  return `
<div style="text-align:center;padding:3.5rem 1rem;animation:fade-up .35s ease both;">
  <div style="font-size:3rem;margin-bottom:.8rem;">✅</div>
  <p class="gothic" style="font-size:1rem;color:var(--gold);letter-spacing:.07em;margin-bottom:.4rem;">Банов нет</p>
  <p style="font-size:.84rem;color:var(--muted);">Сервер чист!</p>
</div>`;
}

function renderNoResults() {
  return `
<div style="text-align:center;padding:2.5rem 1rem;animation:fade-up .28s ease both;">
  <div style="font-size:2.2rem;margin-bottom:.6rem;">🔍</div>
  <p style="font-size:.84rem;color:var(--muted);">Ничего не найдено по вашему запросу.</p>
</div>`;
}

/* ── Filter logic ── */
function setFilter(btn, type) {
  currentFilter = type;
  document.querySelectorAll('#filter-pills .pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = (document.getElementById('search-input').value || '').toLowerCase().trim();
  const list = document.getElementById('ban-list');

  let visible = allBans.filter(ban => {
    const nameMatch = !q || ban.username.toLowerCase().includes(q);
    const typeMatch = currentFilter === 'all' || (ban.ban_type || 'ban').toLowerCase() === currentFilter;
    return nameMatch && typeMatch;
  });

  const info = document.getElementById('ban-info');
  if (q || currentFilter !== 'all') {
    info.textContent = `Показано: ${visible.length} из ${allBans.length}`;
  } else {
    info.textContent = allBans.length > 0
      ? `Всего банов: ${allBans.length}`
      : '';
  }

  if (!visible.length) {
    list.innerHTML = allBans.length === 0 ? renderEmpty() : renderNoResults();
    return;
  }

  list.innerHTML = visible.map((ban, i) => {
    const isMe = currentMe && ban.username === currentMe.username;
    return renderCard(ban, i, isMe);
  }).join('');
}

/* ── Load data ── */
(async function init() {
  const list = document.getElementById('ban-list');
  list.innerHTML = renderSkeleton();

  // Fetch current user (for "Your ban" highlight) — non-blocking
  fetch(`${API}/auth/me`, { credentials:'include' })
    .then(r => r.ok ? r.json() : null)
    .then(me => { currentMe = me; })
    .catch(() => {});

  try {
    const data = await fetch(`${API}/bans?per_page=100`).then(r => {
      if (!r.ok) throw new Error('API error ' + r.status);
      return r.json();
    });

    allBans = data.items || [];

    // Small delay so skeleton is visible briefly if load was instant
    await new Promise(r => setTimeout(r, 180));

    applyFilters();

    // Re-render after me is known (if it loaded in that window)
    if (!currentMe) {
      setTimeout(() => applyFilters(), 600);
    }

  } catch (err) {
    list.innerHTML = `
<div style="text-align:center;padding:3rem 1rem;animation:fade-up .3s ease both;">
  <div style="font-size:2rem;margin-bottom:.6rem;">⚠</div>
  <p style="font-size:.85rem;color:var(--muted);">Не удалось загрузить список банов.</p>
</div>`;
    if (typeof showToast === 'function') showToast('Ошибка загрузки банов', 'error');
  }
})();
</script>
</body>
</html>
