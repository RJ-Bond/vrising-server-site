<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ — Just-Skill.Ru</title>
  <link rel="canonical" href="https://just-skill.ru/faq.html" />
  <meta name="description" content="Часто задаваемые вопросы по серверам V Rising на Just-Skill.Ru. Правила, подключение, помощь." />
    <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="V RISING" />
  <meta property="og:title" content="V Rising — FAQ" />
  <meta property="og:description" content="Официальный сайт игрового сервера V Rising — новости, статус серверов, лидерборд, правила." />
  <meta property="og:image" content="/uploads/og-default.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="canonical" href="https://just-skill.ru/faq.html" />
  <meta name="description" content="Часто задаваемые вопросы по серверам V Rising на Just-Skill.Ru. Правила, подключение, помощь." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tailwind.min.css" />
  <style>
    :root {
      --bg:      #06000f;
      --card:    rgba(16,7,23,0.92);
      --panel:   rgba(255,255,255,0.035);
      --border:  rgba(110,0,150,0.22);
      --text:    #f5f0fb;
      --muted:   #b6a8d2;
      --gold:    #c9a94a;
      --crimson: #c8002a;
      --purple:  #7c3aed;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body {
      background:var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 50%, rgba(80,0,130,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(150,0,28,0.08) 0%, transparent 50%);
      background-attachment:fixed;
      font-family:'Inter',system-ui,sans-serif; color:var(--text); min-height:100vh;
    }
    .gothic { font-family:'Cinzel',serif; }
    .glass-nav { background:rgba(8,0,14,0.9); border-bottom:1px solid rgba(110,0,20,0.35); backdrop-filter:blur(14px); position:sticky; top:0; z-index:40; }
    .topnav-link {
      font-size:.78rem; font-weight:600; color:var(--muted); text-decoration:none;
      padding:.4rem .75rem; border-radius:.5rem; border:1px solid transparent; transition:all .2s;
      background:none; cursor:pointer; font-family:'Inter',sans-serif;
    }
    .topnav-link:hover { color:var(--text); background:rgba(150,0,28,0.12); border-color:rgba(160,0,35,0.35); }
    .topnav-link.active { color:#fff; background:rgba(150,0,28,0.22); border-color:rgba(180,0,35,0.5); }
    body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; background-image:radial-gradient(rgba(255,255,255,0.055) 1px, transparent 1px); background-size:28px 28px; }
    .nav-links { display:flex; align-items:center; gap:.3rem; flex-wrap:wrap; }
    .nav-burger { display:none; align-items:center; justify-content:center; width:2.2rem; height:2.2rem; border-radius:.5rem; background:none; border:1px solid rgba(110,0,20,0.35); color:var(--muted); cursor:pointer; transition:all .2s; flex-shrink:0; }
    .nav-burger:hover { border-color:rgba(180,0,35,0.5); color:var(--text); }
    .mobile-overlay { display:none; position:fixed; inset:0; z-index:49; background:rgba(0,0,0,0.65); backdrop-filter:blur(3px); opacity:0; transition:opacity .25s; pointer-events:none; }
    .mobile-overlay.open { opacity:1; pointer-events:auto; }
    .mobile-drawer { position:fixed; bottom:0; left:0; right:0; z-index:50; background:rgba(8,0,14,0.98); border-top:1px solid rgba(110,0,20,0.5); backdrop-filter:blur(20px); padding:1rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom)); transform:translateY(100%); transition:transform .3s cubic-bezier(.32,.72,0,1); display:grid; grid-template-columns:1fr 1fr; gap:.5rem; }
    .mobile-drawer.open { transform:translateY(0); }
    .mobile-drawer a { font-size:.85rem; font-weight:600; color:var(--muted); text-decoration:none; padding:.65rem .9rem; border-radius:.6rem; border:1px solid rgba(110,0,20,0.2); transition:all .18s; text-align:center; }
    .mobile-drawer a:hover, .mobile-drawer a.active { color:#fff; background:rgba(150,0,28,0.22); border-color:rgba(180,0,35,0.5); }
    @media (max-width:640px) { .nav-links { display:none; } .nav-burger { display:flex; } .mobile-overlay { display:block; } }
    [data-tip] { position:relative; }
    [data-tip]::after { content:attr(data-tip); position:absolute; bottom:calc(100% + 7px); left:50%; transform:translateX(-50%); background:rgba(6,0,15,0.96); border:1px solid rgba(180,0,35,0.4); color:#d4c4e0; font-size:.68rem; padding:.28rem .65rem; border-radius:.4rem; white-space:nowrap; pointer-events:none; opacity:0; transition:opacity .15s; z-index:999; font-family:'Inter',sans-serif; }
    [data-tip]:hover::after { opacity:1; }

    /* ── Search ── */
    .faq-search-wrap { position:relative; margin-bottom:1.5rem; }
    .faq-search-input {
      width:100%; background:rgba(16,7,23,0.85); border:1px solid rgba(110,0,150,0.22);
      border-radius:.65rem; padding:.65rem 1rem .65rem 2.5rem;
      color:var(--text); font-size:.88rem; outline:none;
      transition:border-color .2s, box-shadow .2s; font-family:'Inter',sans-serif;
    }
    .faq-search-input:focus { border-color:rgba(200,0,42,0.45); box-shadow:0 0 14px rgba(180,0,30,0.1); }
    .faq-search-input::placeholder { color:var(--muted); }
    .faq-search-icon { position:absolute;left:.82rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none; }
    .faq-search-clear {
      position:absolute;right:.7rem;top:50%;transform:translateY(-50%);
      background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;line-height:1;
      padding:.2rem;display:none;transition:color .15s;
    }
    .faq-search-clear:hover { color:var(--text); }
    /* ── Category label ── */
    .faq-cat-label {
      font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.16em;color:rgba(200,0,42,0.5);
      text-transform:uppercase;margin:1.25rem 0 .5rem;
      display:flex;align-items:center;gap:.55rem;
    }
    .faq-cat-label:first-child { margin-top:0; }
    .faq-cat-label::before { content:'';flex-shrink:0;width:14px;height:1px;background:linear-gradient(90deg,transparent,rgba(200,0,42,0.32)); }
    .faq-cat-label::after  { content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(200,0,42,0.18),transparent); }
    /* ── FAQ items ── */
    .faq-item {
      background:var(--card); border:1px solid var(--border); border-radius:.75rem;
      margin-bottom:.7rem; overflow:hidden;
      border-left:2px solid transparent;
      transition:border-color .25s, box-shadow .25s;
    }
    .faq-item.open {
      border-left-color:rgba(200,0,42,0.5);
      box-shadow:0 0 18px rgba(130,0,22,0.08),-2px 0 10px rgba(130,0,22,0.06);
    }
    .faq-q {
      display:flex; align-items:center; justify-content:space-between; gap:.75rem;
      padding:1rem 1.2rem; cursor:pointer; user-select:none;
    }
    .faq-q-inner { display:flex; align-items:center; gap:.65rem; flex:1; min-width:0; }
    .faq-num {
      flex-shrink:0; width:1.4rem; height:1.4rem; border-radius:50%;
      background:rgba(110,0,150,0.14); border:1px solid rgba(110,0,150,0.2);
      display:flex; align-items:center; justify-content:center;
      font-size:.56rem; font-weight:700; color:var(--muted);
      font-family:'Oswald',sans-serif; letter-spacing:0;
      transition:background .25s, border-color .25s, color .25s;
    }
    .faq-item.open .faq-num { background:rgba(200,0,42,0.14); border-color:rgba(200,0,42,0.32); color:var(--crimson); }
    .faq-q-text { font-size:.88rem; font-weight:600; color:#ece3f7; }
    .faq-arrow { color:var(--gold); transition:transform .25s; flex-shrink:0; }
    .faq-item.open .faq-arrow { transform:rotate(180deg); }
    .faq-a {
      max-height:0; overflow:hidden; transition:max-height .3s ease, padding .3s ease;
      font-size:.82rem; color:var(--muted); line-height:1.65; padding:0 1.2rem;
    }
    .faq-item.open .faq-a { padding:0 1.2rem 1.1rem; }
    .faq-a a { color:var(--gold); }
    /* ── Stagger animation ── */
    @keyframes faq-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .faq-item { animation:faq-in .3s ease both; }
    /* ── No results ── */
    .faq-no-results { text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:.84rem;font-style:italic; }

    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:rgba(8,0,14,0.4); }
    ::-webkit-scrollbar-thumb { background:rgba(130,0,24,0.5); border-radius:3px; }
    /* ── Mobile ── */
    @media (max-width:640px) {
      body { overflow-x:hidden; }
      .glass-nav > div { padding:.6rem 1rem !important; }
      /* Prevent iOS Safari zoom-on-focus for the FAQ search input. */
      input, textarea, select { font-size:16px !important; }
    }
    @media (max-width:480px) {
      .faq-q { padding:.85rem 1rem; gap:.6rem; }
      .faq-q span:first-child { font-size:.82rem; }
      .faq-a { font-size:.8rem; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<div class="mobile-overlay" id="mob-overlay" onclick="toggleMobileNav()"></div>
<div class="mobile-drawer" id="mob-drawer">
  <a href="/">Главная</a>
  <a href="/servers.html">Сервера</a>
  <a href="/leaderboard.html">Игроки</a>
  <a href="/clans.html">Кланы</a>
  <a href="/map.html">Карта</a>
  <a href="/bans.html">Баны</a>
  <a href="/faq.html" class="active">FAQ</a>
  <a href="/profile.html">Профиль</a>
</div>
<nav class="glass-nav">
  <div style="max-width:1000px;margin:auto;padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem;">
    <a href="/" id="nav-logo" class="gothic" style="font-size:1.1rem;font-weight:900;letter-spacing:.15em;color:#d4c4e0;text-decoration:none;text-shadow:0 0 20px rgba(204,0,40,0.6);"></a>
    <div class="nav-links">
      <a href="/" class="topnav-link">Главная</a>
      <a href="/servers.html" class="topnav-link">Сервера</a>
      <a href="/leaderboard.html" class="topnav-link">Игроки</a>
      <a href="/clans.html" class="topnav-link">Кланы</a>
      <a href="/map.html" class="topnav-link">Карта</a>
      <a href="/bans.html" class="topnav-link">Баны</a>
      <a href="/faq.html" class="topnav-link active">FAQ</a>
      <a id="nav-profile-link" href="/profile.html" class="topnav-link" style="display:none;">Профиль</a>
      <a id="nav-login-link" href="/login.html" class="topnav-link">Войти</a>
    </div>
    <button class="nav-burger" onclick="toggleMobileNav()">☰</button>
  </div>
</nav>

<div style="max-width:680px;margin:2.5rem auto 3.5rem;padding:0 1rem;">
  <div style="text-align:center;margin-bottom:1.75rem;">
    <div style="display:flex;align-items:center;justify-content:center;gap:.7rem;margin-bottom:.5rem;">
      <span style="height:1px;width:36px;background:linear-gradient(90deg,transparent,var(--gold));"></span>
      <h1 class="gothic" style="font-size:1.3rem;letter-spacing:.1em;color:var(--gold);text-transform:uppercase;">Частые вопросы</h1>
      <span style="height:1px;width:36px;background:linear-gradient(90deg,var(--gold),transparent);"></span>
    </div>
    <p style="font-size:.8rem;color:var(--muted);">Если ответа нет здесь — спросите в Discord</p>
  </div>

  <div class="faq-search-wrap">
    <span class="faq-search-icon">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </span>
    <input id="faq-search" class="faq-search-input" type="text" placeholder="Поиск по вопросам…" oninput="onFaqSearch(this.value)" />
    <button class="faq-search-clear" id="faq-search-clear" onclick="clearFaqSearch()" aria-label="Очистить">✕</button>
  </div>

  <div id="faq-list"></div>
</div>

<script>
const API = '/api';
function getToken() { return localStorage.getItem('token') || sessionStorage.getItem('token'); }

function applySiteBackground(bg) {
  bg = (bg || '').trim();
  if (!bg) return;
  document.body.style.backgroundImage = [
    'radial-gradient(ellipse at 15% 50%, rgba(80,0,130,0.14) 0%, transparent 55%)',
    'radial-gradient(ellipse at 85% 20%, rgba(150,0,28,0.10) 0%, transparent 50%)',
    'linear-gradient(rgba(8,0,14,0.72), rgba(8,0,14,0.72))',
    `url('${bg}')`,
  ].join(',');
  document.body.style.backgroundSize = 'auto,auto,auto,cover';
  document.body.style.backgroundPosition = 'center,center,center,center';
  document.body.style.backgroundAttachment = 'fixed,fixed,fixed,fixed';
}

(function() {
  const cached = (() => { try { return JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user')); } catch { return null; } })();
  if (cached) {
    document.getElementById('nav-profile-link') && (document.getElementById('nav-profile-link').style.display = '');
    document.getElementById('nav-login-link') && (document.getElementById('nav-login-link').style.display = 'none');
  }
  fetch('/api/auth/me', { credentials: 'include' }).then(r => {
    const profileLink = document.getElementById('nav-profile-link');
    const loginLink = document.getElementById('nav-login-link');
    if (r.ok) {
      if (profileLink) profileLink.style.display = '';
      if (loginLink) loginLink.style.display = 'none';
    } else {
      localStorage.removeItem('user'); sessionStorage.removeItem('user');
      localStorage.removeItem('token'); sessionStorage.removeItem('token');
      if (profileLink) profileLink.style.display = 'none';
      if (loginLink) loginLink.style.display = '';
    }
  }).catch(() => {});
})();

(async function() {
  try {
    const d = await fetch(`${API}/settings/public`).then(r => r.json());
    const title = (d.site_title || 'V Rising').trim();
    document.title = `${title} — FAQ`;
    document.getElementById('nav-logo').textContent = '⚔ ' + title;
    applySiteBackground(d.bg_image_url);
  } catch {}
})();

const FAQ = [
  {
    cat: 'Игра',
    q: 'Как подключиться к серверу?',
    a: 'Проще всего — кнопкой «Подключиться через Steam» на <a href="/servers.html">странице серверов</a> или в виджете мониторинга на главной: она сама откроет V Rising и подключит к нужному серверу. Если кнопки нет — спросите IP и порт у администрации в Discord и подключитесь вручную через меню «Прямое подключение» в игре.',
  },
  {
    cat: 'Игра',
    q: 'Что такое вайп и когда он будет?',
    a: 'Вайп — это сброс прогресса сервера (полный или частичный, в зависимости от типа). Дата ближайшего вайпа и обратный отсчёт показаны на главной странице под статусом сервера.',
  },
  {
    cat: 'Игра',
    q: 'Можно ли атаковать других игроков?',
    a: 'Зависит от настроек конкретного сервера — все правила перечислены в разделе «Правила» на главной странице. Если коротко: PvE-сервера запрещают атаки и гриферство построек других игроков.',
  },
  {
    cat: 'Аккаунт',
    q: 'Зачем регистрироваться на сайте?',
    a: 'Аккаунт на сайте даёт профиль с вашей статистикой, участие в комментариях к новостям и кланах. Чтобы время в игре подтягивалось автоматически, регистрируйте сайт-аккаунт с тем же именем, что и ваш игровой персонаж.',
  },
  {
    cat: 'Аккаунт',
    q: 'Почему в профиле не отображается моё время в игре?',
    a: 'Сайт сопоставляет статистику по точному совпадению имени персонажа и имени аккаунта на сайте. Проверьте, что ник в игре и логин на сайте написаны одинаково (включая регистр и пробелы).',
  },
  {
    cat: 'Аккаунт',
    q: 'Забыл пароль — что делать?',
    a: 'На <a href="/login.html">странице входа</a> нажмите «Забыли пароль?», укажите email и дождитесь, пока администратор вышлет ссылку для сброса через Discord.',
  },
  {
    cat: 'Сообщество',
    q: 'Как создать клан или вступить в существующий?',
    a: 'На странице <a href="/clans.html">«Кланы»</a> залогиненные игроки могут создать свой клан (название + короткий тег) или вступить в один из уже существующих одной кнопкой.',
  },
  {
    cat: 'Сервера',
    q: 'Где посмотреть, сколько игроков сейчас онлайн?',
    a: 'На <a href="/servers.html">странице серверов</a> — список игроков, аптайм, пинг, история онлайна за выбранный период и пиковые значения для каждого сервера.',
  },
  {
    cat: 'Прочее',
    q: 'Нашёл баг, читера или нарушение правил — куда сообщить?',
    a: 'Через Discord сервера (ссылка в шапке/подвале сайта) — это самый быстрый способ связаться с администрацией.',
  },
];

let _faqQ = '';

function renderFaq(filter) {
  filter = (filter !== undefined ? filter : _faqQ).toLowerCase().trim();
  const list = document.getElementById('faq-list');

  // Group by category preserving insertion order
  const cats = {};
  FAQ.forEach((item, i) => {
    if (!cats[item.cat]) cats[item.cat] = [];
    cats[item.cat].push({ ...item, idx: i });
  });

  let html = '';
  let total = 0;

  for (const [cat, items] of Object.entries(cats)) {
    const visible = filter
      ? items.filter(it => it.q.toLowerCase().includes(filter) || it.a.toLowerCase().includes(filter))
      : items;
    if (!visible.length) continue;
    if (!filter) html += `<div class="faq-cat-label">${cat}</div>`;
    visible.forEach((item, ci) => {
      const delay = (total + ci) * 40;
      html += `
        <div class="faq-item" id="faq-${item.idx}" style="animation-delay:${delay}ms;">
          <div class="faq-q" onclick="toggleFaq(${item.idx})">
            <div class="faq-q-inner">
              <span class="faq-num">${item.idx + 1}</span>
              <span class="faq-q-text">${item.q}</span>
            </div>
            <svg class="faq-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="faq-a">${item.a}</div>
        </div>`;
    });
    total += visible.length;
  }

  list.innerHTML = total ? html : '<div class="faq-no-results">Ничего не найдено по запросу</div>';

  // Open first item on initial render (no filter)
  if (!filter) {
    const first = list.querySelector('.faq-item');
    if (first) {
      first.classList.add('open');
      const a = first.querySelector('.faq-a');
      if (a) a.style.maxHeight = a.scrollHeight + 24 + 'px';
    }
  }
}

function toggleFaq(i) {
  const el = document.getElementById(`faq-${i}`);
  const isOpen = el.classList.contains('open');
  el.classList.toggle('open', !isOpen);
  const a = el.querySelector('.faq-a');
  a.style.maxHeight = !isOpen ? a.scrollHeight + 24 + 'px' : '0';
}

function onFaqSearch(val) {
  _faqQ = val;
  document.getElementById('faq-search-clear').style.display = val ? 'block' : 'none';
  renderFaq(val);
}

function clearFaqSearch() {
  _faqQ = '';
  document.getElementById('faq-search').value = '';
  document.getElementById('faq-search-clear').style.display = 'none';
  renderFaq('');
}

renderFaq();

function toggleMobileNav() {
  const overlay = document.getElementById('mob-overlay');
  const drawer = document.getElementById('mob-drawer');
  const isOpen = drawer.classList.contains('open');
  drawer.classList.toggle('open', !isOpen);
  overlay.classList.toggle('open', !isOpen);
  document.body.style.overflow = isOpen ? '' : 'hidden';
}
</script>
</body>
</html>
