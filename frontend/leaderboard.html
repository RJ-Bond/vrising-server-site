  <meta name="description" content="Рейтинг лучших игроков серверов V Rising на Just-Skill.Ru. Время игры, статистика, достижения." />
  <title>Лидерборд игроков V Rising — Just-Skill.Ru</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tailwind.min.css" />
  <style>
    :root {
      --bg:      #06000f;
      --card:    rgba(16,7,23,0.92);
      --panel:   rgba(255,255,255,0.035);
      --border:  rgba(110,0,150,0.22);
      --text:    #f5f0fb;
      --muted:   #b6a8d2;
      --gold:    #c9a94a;
      --crimson: #c8002a;
      --purple:  #7c3aed;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }

    /* ①  Background dot-grid noise */
    body {
      background:var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 50%, rgba(80,0,130,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(150,0,28,0.08) 0%, transparent 50%);
      background-attachment:fixed;
      font-family:'Inter',system-ui,sans-serif; color:var(--text); min-height:100vh;
    }
    body::before {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:radial-gradient(rgba(255,255,255,0.055) 1px, transparent 1px);
      background-size:28px 28px;
    }

    /* ③  Fetch progress bar */
    #fetch-bar {
      position:fixed; top:0; left:0; z-index:1001; height:2px; width:0%; opacity:0;
      background:linear-gradient(90deg, var(--crimson), #a020f0, var(--crimson));
      background-size:200% 100%;
      pointer-events:none;
      box-shadow:0 0 10px rgba(200,0,42,0.8), 0 0 4px rgba(160,32,240,0.6);
      animation:bar-shimmer 1.5s linear infinite;
    }
    @keyframes bar-shimmer { 0%{background-position:0 0} 100%{background-position:200% 0} }

    /* ⑨  CSS-only tooltips */
    [data-tip] { position:relative; }
    [data-tip]::after {
      content:attr(data-tip);
      position:absolute; bottom:calc(100% + 7px); left:50%; transform:translateX(-50%);
      background:rgba(6,0,15,0.96); border:1px solid rgba(180,0,35,0.4);
      color:#d4c4e0; font-size:.68rem; padding:.28rem .65rem; border-radius:.4rem;
      white-space:nowrap; pointer-events:none; opacity:0; transition:opacity .15s;
      z-index:200; font-family:'Inter',sans-serif; letter-spacing:.01em;
    }
    [data-tip]:hover::after { opacity:1; }

    .gothic { font-family:'Cinzel',serif; }

    /* ── Nav ── */
    .glass-nav {
      background:rgba(8,0,14,0.9); border-bottom:1px solid rgba(110,0,20,0.35);
      backdrop-filter:blur(14px); position:sticky; top:0; z-index:40;
    }
    .nav-inner {
      max-width:1000px; margin:auto; padding:.7rem 1.5rem;
      display:flex; align-items:center; justify-content:space-between; gap:.6rem;
    }
    .nav-links { display:flex; align-items:center; gap:.3rem; flex-wrap:wrap; }
    .topnav-link {
      font-size:.78rem; font-weight:600; color:var(--muted); text-decoration:none;
      padding:.4rem .75rem; border-radius:.5rem; border:1px solid transparent; transition:all .2s;
      background:none; cursor:pointer; font-family:'Inter',sans-serif;
    }
    .topnav-link:hover { color:var(--text); background:rgba(150,0,28,0.12); border-color:rgba(160,0,35,0.35); }
    .topnav-link.active { color:#fff; background:rgba(150,0,28,0.22); border-color:rgba(180,0,35,0.5); }

    /* ⑥  Mobile hamburger */
    .nav-burger {
      display:none; align-items:center; justify-content:center;
      width:2.2rem; height:2.2rem; border-radius:.5rem;
      background:none; border:1px solid rgba(110,0,20,0.35);
      color:var(--muted); cursor:pointer; transition:all .2s; flex-shrink:0;
    }
    .nav-burger:hover { border-color:rgba(180,0,35,0.5); color:var(--text); }
    .mobile-overlay {
      display:none; position:fixed; inset:0; z-index:49;
      background:rgba(0,0,0,0.65); backdrop-filter:blur(3px);
      opacity:0; transition:opacity .25s; pointer-events:none;
    }
    .mobile-overlay.open { opacity:1; pointer-events:auto; }
    .mobile-drawer {
      position:fixed; bottom:0; left:0; right:0; z-index:50;
      background:rgba(8,0,14,0.98); border-top:1px solid rgba(110,0,20,0.5);
      backdrop-filter:blur(20px); padding:1rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom));
      transform:translateY(100%); transition:transform .3s cubic-bezier(.32,.72,0,1);
      display:grid; grid-template-columns:1fr 1fr; gap:.5rem;
    }
    .mobile-drawer.open { transform:translateY(0); }
    .mobile-drawer a {
      font-size:.85rem; font-weight:600; color:var(--muted); text-decoration:none;
      padding:.65rem .9rem; border-radius:.6rem; border:1px solid rgba(110,0,20,0.2);
      transition:all .18s; text-align:center;
    }
    .mobile-drawer a:hover,.mobile-drawer a.active { color:#fff; background:rgba(150,0,28,0.22); border-color:rgba(180,0,35,0.5); }
    @media (max-width:640px) {
      .nav-links { display:none; }
      .nav-burger { display:flex; }
      .mobile-overlay { display:block; }
    }

    /* ── Card ── */
    .g-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:.875rem; backdrop-filter:blur(16px) saturate(1.2);
      box-shadow:0 4px 24px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.04);
      position:relative; padding:1.25rem;
    }
    @keyframes fade-up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .g-card { animation:fade-up .4s ease both; }

    /* ── Controls ── */
    .lb-controls { display:flex; gap:.6rem; flex-wrap:wrap; align-items:center; justify-content:space-between; margin-bottom:1rem; }
    .lb-toggle { display:flex; gap:.2rem; background:var(--panel); border:1px solid rgba(255,255,255,0.08); border-radius:.5rem; padding:2px; }
    .lb-toggle-btn { background:none; border:none; color:var(--muted); font-size:.74rem; font-weight:600; padding:.4rem .8rem; border-radius:.4rem; cursor:pointer; transition:all .15s; font-family:'Inter',sans-serif; }
    .lb-toggle-btn:hover { color:var(--text); }
    .lb-toggle-btn.active { background:linear-gradient(135deg,#7a001c,var(--crimson)); color:#fff; }

    .lb-search-row { display:flex; gap:.5rem; margin-bottom:1.25rem; }
    .lb-search-input {
      flex:1; background:var(--panel); border:1px solid rgba(255,255,255,0.1); border-radius:.5rem;
      padding:.5rem .8rem; color:var(--text); font-size:.82rem; outline:none; font-family:'Inter',sans-serif; transition:border-color .2s;
    }
    .lb-search-input:focus { border-color:rgba(200,0,40,0.45); }
    .lb-find-me-btn {
      background:var(--panel); border:1px solid rgba(201,169,74,0.3); color:var(--gold);
      border-radius:.5rem; padding:.5rem .9rem; font-size:.78rem; font-weight:600;
      cursor:pointer; transition:all .2s; white-space:nowrap;
    }
    .lb-find-me-btn:hover { background:rgba(201,169,74,0.12); border-color:rgba(201,169,74,0.55); }
    .lb-find-me-btn:disabled { opacity:.4; cursor:not-allowed; }

    /* ── Rows ── */
    .lb-row {
      display:flex; align-items:center; gap:.9rem; padding:.65rem .5rem;
      border-bottom:1px solid rgba(255,255,255,0.06); text-decoration:none; color:inherit;
      transition:background .15s, transform .15s; border-radius:.4rem;
    }
    .lb-row:hover { background:rgba(255,255,255,0.035); transform:translateX(2px); }
    .lb-row:last-child { border-bottom:none; }
    .lb-row.me { background:rgba(201,169,74,0.08); border:1px solid rgba(201,169,74,0.3); padding-left:.4rem; padding-right:.4rem; }
    .lb-row.rank-1 { background:rgba(255,213,74,0.07); border:1px solid rgba(255,213,74,0.2); padding-left:.4rem; padding-right:.4rem; }
    .lb-row.rank-2 { background:rgba(214,214,232,0.05); border:1px solid rgba(214,214,232,0.15); padding-left:.4rem; padding-right:.4rem; }
    .lb-row.rank-3 { background:rgba(224,163,97,0.06); border:1px solid rgba(224,163,97,0.16); padding-left:.4rem; padding-right:.4rem; }
    .lb-row.rank-1:hover { background:rgba(255,213,74,0.12); }
    .lb-row.rank-2:hover { background:rgba(214,214,232,0.09); }
    .lb-row.rank-3:hover { background:rgba(224,163,97,0.10); }
    .lb-progress { height:2px; border-radius:9999px; background:rgba(255,255,255,0.07); margin-top:.32rem; overflow:hidden; }
    .lb-progress-fill { height:100%; border-radius:9999px; transition:width .4s ease; }
    .lb-badge { font-size:.72rem; line-height:1; flex-shrink:0; }
    .lb-rank { font-family:'Oswald',sans-serif; font-size:1rem; font-weight:600; color:var(--muted); width:2.2rem; text-align:center; flex-shrink:0; }
    .lb-rank.top1 { color:#ffd54a; text-shadow:0 0 12px rgba(255,213,74,0.7); }
    .lb-rank.top2 { color:#d6d6e8; text-shadow:0 0 8px rgba(214,214,232,0.5); }
    .lb-rank.top3 { color:#e0a361; text-shadow:0 0 8px rgba(224,163,97,0.5); }
    .lb-medal { font-size:1.1rem; }
    .lb-avatar-wrap { position:relative; flex-shrink:0; }
    .lb-avatar {
      width:2rem; height:2rem; border-radius:50%; object-fit:cover;
      display:flex; align-items:center; justify-content:center;
      font-family:'Cinzel',serif; font-size:.85rem; color:#d4c4e0;
      border:1px solid rgba(255,255,255,0.09);
    }

    /* ⑦  Online pulse ripple */
    .lb-online-dot {
      position:absolute; bottom:-1px; right:-1px; width:.55rem; height:.55rem;
      border-radius:50%; background:#2ee69b; border:2px solid var(--card); display:none;
    }
    .lb-online-dot.show {
      display:block;
      animation:online-pulse 2.2s ease-in-out infinite;
    }
    @keyframes online-pulse {
      0%,100% { box-shadow:0 0 0 0 rgba(46,230,155,0.7), 0 0 5px #2ee69b; }
      55%      { box-shadow:0 0 0 5px rgba(46,230,155,0),  0 0 5px #2ee69b; }
    }

    .lb-name-col { flex:1; min-width:0; }
    .lb-name { font-family:'Philosopher',serif; font-size:.92rem; color:#ece3f7; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:block; }
    .lb-last-session { font-size:.62rem; color:var(--muted); }
    .lb-time { font-family:'Oswald',sans-serif; font-size:.85rem; color:var(--gold); white-space:nowrap; flex-shrink:0; }
    .lb-seen { font-size:.66rem; color:var(--muted); white-space:nowrap; flex-shrink:0; min-width:5.5rem; text-align:right; }

    /* ①  Skeleton rows */
    @keyframes skel-shimmer {
      0%   { background-position:-600px 0; }
      100% { background-position: 600px 0; }
    }
    .skel-piece {
      display:inline-block; border-radius:.4rem;
      background:linear-gradient(90deg, rgba(28,8,42,0.8) 25%, rgba(70,20,90,0.5) 50%, rgba(28,8,42,0.8) 75%);
      background-size:1200px 100%;
      animation:skel-shimmer 1.6s ease-in-out infinite;
    }
    .lb-row.skel-row { pointer-events:none; }
    .lb-row.skel-row:hover { background:none; transform:none; }

    /* ⑤  Empty state */
    .lb-empty-state {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:3rem 1rem; gap:.75rem; text-align:center;
    }
    .lb-empty-icon { font-size:2.5rem; opacity:.6; filter:drop-shadow(0 0 14px rgba(180,0,30,0.45)); }
    .lb-empty-title { font-family:'Cinzel',serif; font-size:.82rem; letter-spacing:.16em; color:var(--gold); text-transform:uppercase; }
    .lb-empty-sub { font-size:.76rem; color:var(--muted); max-width:260px; line-height:1.65; }

    .lb-pagination { display:flex; align-items:center; justify-content:center; gap:.75rem; margin-top:1.25rem; }
    .lb-page-btn {
      background:var(--panel); border:1px solid rgba(255,255,255,0.1); color:var(--text);
      border-radius:.5rem; padding:.5rem 1rem; font-size:.8rem; cursor:pointer; transition:all .2s;
    }
    .lb-page-btn:hover:not(:disabled) { border-color:rgba(200,0,40,0.4); background:rgba(150,0,28,0.1); }
    .lb-page-btn:disabled { opacity:.35; cursor:not-allowed; }
    .lb-page-label { font-size:.78rem; color:var(--muted); }

    @media (max-width:480px) { .lb-seen { display:none; } }
    @media (max-width:480px) { .lb-col-seen { display:none; } }

    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:rgba(8,0,14,0.4); }
    ::-webkit-scrollbar-thumb { background:rgba(130,0,24,0.5); border-radius:3px; }
    /* ── Mobile ── */
    @media (max-width:640px) {
      body { overflow-x:hidden; }
      .g-card { padding:1rem; }
      .lb-controls { flex-direction:column; align-items:stretch; gap:.4rem; }
      .lb-toggle { flex-wrap:wrap; justify-content:center; }
      .lb-toggle-btn { padding:.52rem .9rem; min-height:2.6rem; }
      .lb-row { gap:.55rem; }
      .glass-nav > div { padding:.6rem 1rem !important; }
    }
    @media (max-width:400px) {
      .g-card { padding:.8rem; }
      .lb-row { gap:.4rem; }
      .lb-rank { width:1.6rem; font-size:.88rem; }
      .lb-time { font-size:.78rem; }
    }
    .lb-stat-tile {
      background:var(--panel); border:1px solid var(--border);
      border-radius:.75rem; padding:.75rem .6rem;
      text-align:center; display:flex; flex-direction:column; align-items:center; gap:.2rem;
    }
    .lb-stat-icon { font-size:1rem; line-height:1; }
    .lb-stat-val { font-family:'Oswald',sans-serif; font-size:.92rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
    .lb-stat-leader-name { font-size:.78rem; }
    .lb-stat-label { font-size:.58rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
    @media (max-width:480px) { .lb-stat-tile { padding:.6rem .4rem; } .lb-stat-val { font-size:.8rem; } }
  </style>
</head>

        onmouseover="this.style.borderColor='rgba(200,0,40,0.5)';this.style.color='#e2d8f0'"
        onmouseout="this.style.borderColor='rgba(150,0,28,0.3)';this.style.color='#9488a8'">

      </button>
      <div id="notif-panel" style="display:none;position:absolute;top:calc(100% + .5rem);right:0;width:300px;background:rgba(10,2,18,0.98);border:1px solid rgba(150,0,28,0.3);border-radius:.75rem;box-shadow:0 8px 32px rgba(0,0,0,0.6);z-index:200;overflow:hidden;">

    </button>

<div style="max-width:780px;margin:2.5rem auto 3.5rem;padding:0 1rem;position:relative;z-index:1;">
  <div style="text-align:center;margin-bottom:1.75rem;">
    <div style="display:flex;align-items:center;justify-content:center;gap:.7rem;margin-bottom:.5rem;">
      <span style="height:1px;width:36px;background:linear-gradient(90deg,transparent,var(--gold));"></span>
      <h1 class="gothic" style="font-size:1.3rem;letter-spacing:.1em;color:var(--gold);text-transform:uppercase;">Игроки</h1>
      <span style="height:1px;width:36px;background:linear-gradient(90deg,var(--gold),transparent);"></span>
    </div>
    <p style="font-size:.8rem;color:var(--muted);">Рейтинг по суммарному времени в игре</p>
  </div>

  <div id="lb-stats-row" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem;margin-bottom:.85rem;">
    <div class="lb-stat-tile" id="lb-stat-online">
      <div class="lb-stat-icon">🟢</div>
      <div class="lb-stat-val" id="lb-stat-online-val">—</div>
      <div class="lb-stat-label">Онлайн сейчас</div>
    </div>
    <div class="lb-stat-tile" id="lb-stat-leader">
      <div class="lb-stat-icon">🏆</div>
      <div class="lb-stat-val lb-stat-leader-name" id="lb-stat-leader-val">—</div>
      <div class="lb-stat-label">Лидер сервера</div>
    </div>
    <div class="lb-stat-tile">
      <div class="lb-stat-icon">📅</div>
      <div class="lb-stat-val" id="lb-stat-period-val">Всё время</div>
      <div class="lb-stat-label">Период</div>
    </div>
  </div>
  <div class="g-card">
    <div class="lb-controls">
      <div class="lb-toggle" id="lb-server-toggle">
        <button class="lb-toggle-btn active" data-server="1" onclick="setServer(1,this)" id="lb-server1-btn">Сервер 1</button>
        <button class="lb-toggle-btn" data-server="2" onclick="setServer(2,this)" id="lb-server2-btn" style="display:none;">Сервер 2</button>
      </div>
      <div class="lb-toggle" id="lb-period-toggle">
        <button class="lb-toggle-btn active" data-period="all"   onclick="setPeriod('all',this)">Всё время</button>
        <button class="lb-toggle-btn"        data-period="month" onclick="setPeriod('month',this)">Месяц</button>
        <button class="lb-toggle-btn"        data-period="week"  onclick="setPeriod('week',this)">Неделя</button>
      </div>
    </div>
    <div class="lb-search-row">
      <input id="lb-search" type="text" class="lb-search-input" placeholder="Поиск по нику…" oninput="onSearchInput()">
      <button class="lb-find-me-btn" id="lb-find-me" onclick="findMe()"
              style="display:none;" data-tip="Перейти к своей строке">📍 Найти себя</button>
    </div>
    <div id="lb-col-header" style="display:flex;align-items:center;gap:.9rem;padding:.2rem .5rem .35rem;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;border-bottom:1px solid rgba(255,255,255,0.05);margin-bottom:.2rem;">
      <span style="width:2.2rem;flex-shrink:0;"></span>
      <span style="width:2rem;flex-shrink:0;"></span>
      <span style="flex:1;">Игрок</span>
      <span style="flex-shrink:0;">Время</span>
      <span class="lb-col-seen" style="min-width:5.5rem;text-align:right;flex-shrink:0;">Последний вход</span>
    </div>
    <div id="lb-list"></div>
    <div class="lb-pagination" id="lb-pagination" style="display:none;">
      <button class="lb-page-btn" id="lb-prev" onclick="changePage(-1)">← Назад</button>
      <span class="lb-page-label" id="lb-page-label">Стр. 1</span>
      <button class="lb-page-btn" id="lb-next" onclick="changePage(1)">Вперёд →</button>
    </div>
  </div>
</div>

<script src="/common.js?v=3"></script>
<script>
const API = '/api';
const PER_PAGE = 25;
let _server = 1, _period = 'all', _page = 1;
let _onlineNames = new Set();
let _searchTimer = null;
let _fetchBarTimer = null;

function getToken() { return localStorage.getItem('token') || sessionStorage.getItem('token'); }
// getUser, esc, nameGradient — defined in common.js

/* ③ Fetch progress bar */
function showFetchBar() {
  const bar = document.getElementById('fetch-bar');
  clearTimeout(_fetchBarTimer);
  bar.style.transition = 'width .3s ease, opacity .1s';
  bar.style.opacity = '1';
  bar.style.width = '72%';
}
function hideFetchBar() {
  const bar = document.getElementById('fetch-bar');
  bar.style.transition = 'width .2s ease';
  bar.style.width = '100%';
  _fetchBarTimer = setTimeout(() => {
    bar.style.transition = 'opacity .35s ease';
    bar.style.opacity = '0';
    setTimeout(() => { bar.style.transition = 'none'; bar.style.width = '0%'; }, 380);
  }, 180);
}

/* ⑥ Mobile nav */
function toggleMobileNav() {
  document.getElementById('mobile-drawer').classList.toggle('open');
  document.getElementById('mobile-overlay').classList.toggle('open');
}

function fmtPlaytime(sec) {
  if (!sec) return '0ч';
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
  return h > 0 ? `${h}ч ${m}м` : `${m}м`;
}
// _dateOpts — defined in common.js
function relativeDate(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 2)   return 'только что';
  if (m < 60)  return `${m} мин. назад`;
  const h = Math.floor(m / 60);
  if (h < 24)  return `${h} ч. назад`;
  const d = Math.floor(h / 24);
  if (d === 1) return 'вчера';
  if (d < 7)   return `${d} дн. назад`;
  const w = Math.floor(d / 7);
  if (w < 5)   return `${w} нед. назад`;
  const mo = Math.floor(d / 30);
  if (mo < 12) return `${mo} мес. назад`;
  return `${Math.floor(d / 365)} г. назад`;
}

function activityBadge(lastSeen) {
  if (!lastSeen) return '';
  const diff = Date.now() - new Date(lastSeen).getTime();
  if (diff < 86400000)  return '<span class="lb-badge" title="Был онлайн последние 24ч">🔥</span>';
  if (diff < 604800000) return '<span class="lb-badge" title="Был онлайн последние 7 дней">⚡</span>';
  return '';
}

function achievementBadge(totalSeconds) {
  if (totalSeconds >= 1800000) return '<span class="lb-badge" title="500+ часов на сервере">💀</span>';
  if (totalSeconds >= 360000)  return '<span class="lb-badge" title="100+ часов на сервере">🏆</span>';
  return '';
}

function applySiteBackground(bg) {
  bg = (bg || '').trim();
  if (!bg) return;
  document.body.style.backgroundImage = [
    'radial-gradient(ellipse at 15% 50%, rgba(80,0,130,0.14) 0%, transparent 55%)',
    'radial-gradient(ellipse at 85% 20%, rgba(150,0,28,0.10) 0%, transparent 50%)',
    'linear-gradient(rgba(8,0,14,0.72), rgba(8,0,14,0.72))',
    `url('${bg}')`,
  ].join(',');
  document.body.style.backgroundSize = 'auto,auto,auto,cover';
  document.body.style.backgroundPosition = 'center,center,center,center';
  document.body.style.backgroundAttachment = 'fixed,fixed,fixed,fixed';
}

(function() {
  const cached = getUser();
  if (cached) {
    document.getElementById('nav-profile-link') && (document.getElementById('nav-profile-link').style.display = '');
    document.getElementById('nav-login-link') && (document.getElementById('nav-login-link').style.display = 'none');
    document.getElementById('lb-find-me') && (document.getElementById('lb-find-me').style.display = '');
    const mp = document.getElementById('mob-profile');
    const ml = document.getElementById('mob-login');
    if (mp) mp.style.display = '';
    if (ml) ml.style.display = 'none';
  }
  fetch('/api/auth/me', { credentials: 'include' }).then(r => {
    const profileLink = document.getElementById('nav-profile-link');
    const loginLink = document.getElementById('nav-login-link');
    const findMe = document.getElementById('lb-find-me');
    if (r.ok) {
      if (profileLink) profileLink.style.display = '';
      if (loginLink) loginLink.style.display = 'none';
      if (findMe) findMe.style.display = '';
      const mp = document.getElementById('mob-profile');
      const ml = document.getElementById('mob-login');
      if (mp) mp.style.display = '';
      if (ml) ml.style.display = 'none';
      loadNotifications();
      setInterval(loadNotifications, 60000);
    } else {
      localStorage.removeItem('user'); sessionStorage.removeItem('user');
      localStorage.removeItem('token'); sessionStorage.removeItem('token');
      if (profileLink) profileLink.style.display = 'none';
      if (loginLink) loginLink.style.display = '';
    }
  }).catch(() => {});
})();

(async function() {
  try {
    const d = await fetch(`${API}/settings/public`).then(r => r.json());
    window.__TZ = d.timezone || 'Europe/Moscow';
    window.__H12 = (d.time_format || '24h') === '12h';
    window.__DATEFMT = d.date_format || 'dd.mm.yyyy';
    const title = (d.site_title || 'V Rising').trim();
    document.title = `${title} — Игроки`;
    document.getElementById('nav-logo').textContent = '⚔ ' + title;
    applySiteBackground(d.bg_image_url);
    document.getElementById('lb-server1-btn').textContent = (d.server_name || '').trim() || 'Сервер 1';
    const srv2Name = (d.server2_name || '').trim();
    if (srv2Name) {
      const btn2 = document.getElementById('lb-server2-btn');
      btn2.textContent = srv2Name;
      btn2.style.display = '';
    }
  } catch {}
})();

function setServer(num, btn) {
  _server = num; _page = 1;
  document.querySelectorAll('#lb-server-toggle .lb-toggle-btn').forEach(b => b.classList.toggle('active', b === btn));
  loadLeaderboard();
}
function setPeriod(period, btn) {
  _period = period; _page = 1;
  document.querySelectorAll('#lb-period-toggle .lb-toggle-btn').forEach(b => b.classList.toggle('active', b === btn));
  loadLeaderboard();
}
function changePage(delta) {
  _page = Math.max(1, _page + delta);
  loadLeaderboard();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function onSearchInput() {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(() => { _page = 1; loadLeaderboard(); }, 350);
}

async function loadOnlineStatus() {
  _onlineNames = new Set();
  try {
    const url = _server === 1 ? `${API}/monitor/status` : `${API}/monitor/status2`;
    const d = await fetch(url).then(r => r.json());
    (d.players_list || []).forEach(p => _onlineNames.add(p.name));
  } catch {}
}

/* ① Skeleton placeholder rows */
function renderSkeleton() {
  return Array(8).fill(0).map(() => `
    <div class="lb-row skel-row">
      <span class="lb-rank skel-piece" style="width:2rem;height:.9rem;"></span>
      <span class="skel-piece" style="width:2rem;height:2rem;border-radius:50%;flex-shrink:0;"></span>
      <span style="flex:1;display:flex;flex-direction:column;gap:.35rem;">
        <span class="skel-piece" style="width:55%;height:.72rem;display:block;"></span>
        <span class="skel-piece" style="width:30%;height:.52rem;display:block;"></span>
      </span>
      <span class="skel-piece" style="width:4rem;height:.72rem;flex-shrink:0;"></span>
    </div>`).join('');
}

/* ⑤ Empty state HTML */
function emptyState(icon, title, sub) {
  return `<div class="lb-empty-state">
    <div class="lb-empty-icon">${icon}</div>
    <p class="lb-empty-title">${title}</p>
    <p class="lb-empty-sub">${sub}</p>
  </div>`;
}

async function loadLeaderboard() {
  const list = document.getElementById('lb-list');
  const pag  = document.getElementById('lb-pagination');
  list.innerHTML = renderSkeleton();
  showFetchBar();
  const searchQ = document.getElementById('lb-search').value.trim();
  try {
    const [items] = await Promise.all([
      fetch(`${API}/leaderboard?server=${_server}&period=${_period}&q=${encodeURIComponent(searchQ)}&page=${_page}&per_page=${PER_PAGE}`).then(r => r.json()),
      loadOnlineStatus(),
    ]);
    const me = getUser();
    if (!items.length) {
      if (searchQ) {
        list.innerHTML = emptyState('🔍','Никого не найдено',`По запросу «${esc(searchQ)}» совпадений нет`);
      } else if (_page > 1) {
        list.innerHTML = emptyState('📜','Конец списка','Больше игроков нет на этой странице');
      } else if (_period !== 'all') {
        list.innerHTML = emptyState('📅','Нет данных за период','Попробуйте выбрать «Всё время»');
      } else {
        list.innerHTML = emptyState('🏹','Таблица пуста','На этом сервере статистика ещё не накоплена');
      }
    } else {
      const offset = (_page - 1) * PER_PAGE;
      const maxSeconds = items[0]?.total_seconds || 1;
      list.innerHTML = items.map((p, i) => {
        const rank     = offset + i + 1;
        const rankCls  = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : '';
        const podiumCls = rank <= 3 ? ` rank-${rank}` : '';
        const medal    = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : null;
        const name     = p.player_name || 'Аноним';
        const isOnline = _onlineNames.has(name);
        const isMe     = me && me.username === name;
        const grad     = nameGradient(name);
        const avatarHtml = p.avatar_url
          ? `<img class="lb-avatar" src="${esc(p.avatar_url)}" alt="">`
          : `<span class="lb-avatar" style="background:${grad}">${esc(name.charAt(0).toUpperCase())}</span>`;
        const lastSession = p.last_duration > 0
          ? `<span class="lb-last-session">посл. сессия: ${fmtPlaytime(p.last_duration)}</span>` : '';
        const badge    = activityBadge(p.last_seen) + achievementBadge(p.total_seconds);
        const barPct   = Math.round((p.total_seconds / maxSeconds) * 100);
        const barColor = rank === 1 ? '#ffd54a' : rank === 2 ? 'rgba(214,214,232,0.7)' : rank === 3 ? '#e0a361' : 'rgba(160,0,40,0.55)';
        return `<div class="lb-row${isMe ? ' me' : ''}${podiumCls}" onclick="openPlayerModal('${esc(name)}',${_server},${rank})" style="cursor:pointer;animation:fade-up .35s ease both;animation-delay:${Math.min(i * 25, 300)}ms;">
          <span class="lb-rank ${rankCls}">${medal ? `<span class="lb-medal">${medal}</span>` : rank}</span>
          <span class="lb-avatar-wrap">${avatarHtml}<span class="lb-online-dot${isOnline ? ' show' : ''}"></span></span>
          <span class="lb-name-col">
            <div style="display:flex;align-items:center;gap:.3rem;">
              <span class="lb-name">${esc(name)}</span>
              ${badge}
            </div>
            ${lastSession}
            <div class="lb-progress"><div class="lb-progress-fill" style="width:${barPct}%;background:${barColor};"></div></div>
          </span>
          <span class="lb-time">${fmtPlaytime(p.total_seconds)}</span>
          <span class="lb-seen">${relativeDate(p.last_seen)}</span>
        </div>`;
      }).join('');
    }
    // update stats tiles
    const onlineEl = document.getElementById('lb-stat-online-val');
    const leaderEl = document.getElementById('lb-stat-leader-val');
    const periodEl = document.getElementById('lb-stat-period-val');
    if (onlineEl) onlineEl.textContent = _onlineNames.size > 0 ? _onlineNames.size : '0';
    if (leaderEl && items.length) leaderEl.textContent = items[0].player_name || '—';
    if (periodEl) periodEl.textContent = _period === 'week' ? 'Неделя' : _period === 'month' ? 'Месяц' : 'Всё время';
    pag.style.display = (items.length === PER_PAGE || _page > 1) ? 'flex' : 'none';
    document.getElementById('lb-page-label').textContent = `Стр. ${_page}`;
    document.getElementById('lb-prev').disabled = _page <= 1;
    document.getElementById('lb-next').disabled = items.length < PER_PAGE;
  } catch {
    list.innerHTML = emptyState('⚠','Ошибка загрузки','Не удалось получить данные — попробуйте обновить страницу');
  } finally {
    hideFetchBar();
  }
}

async function findMe() {
  const user = getUser();
  if (!user) return;
  const btn = document.getElementById('lb-find-me');
  const original = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Ищем…';
  try {
    const searchPerPage = 100;
    let found = false;
    for (let p = 1; p <= 20; p++) {
      const items = await fetch(`${API}/leaderboard?server=${_server}&period=${_period}&page=${p}&per_page=${searchPerPage}`).then(r => r.json());
      const idx = items.findIndex(it => it.player_name === user.username);
      if (idx !== -1) {
        const globalRank = (p - 1) * searchPerPage + idx;
        _page = Math.floor(globalRank / PER_PAGE) + 1;
        document.getElementById('lb-search').value = '';
        await loadLeaderboard();
        const myRow = document.querySelector('.lb-row.me');
        if (myRow) myRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
        found = true;
        break;
      }
      if (items.length < searchPerPage) break;
    }
    if (!found) {
      btn.textContent = 'Не найдено';
      setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 2000);
      return;
    }
  } catch {
    btn.textContent = 'Ошибка';
    setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 2000);
    return;
  }
  btn.disabled = false;
  if (btn.textContent === 'Ищем…') btn.textContent = original;
}

loadLeaderboard();

// ── Notification bell ──────────────────────────────────────────────────────
let _notifOpen = false;
async function loadNotifications() {
  const res = await fetch('/api/notifications', {credentials:'include'});
  if (!res.ok) return;
  const d = await res.json();
  const wrap = document.getElementById('notif-bell-wrap');
  const cnt = document.getElementById('notif-count');
  const list = document.getElementById('notif-list');
  if (wrap) wrap.style.display = '';
  if (cnt) { cnt.textContent = d.unread; cnt.style.display = d.unread > 0 ? '' : 'none'; }
  if (list) {
    if (!d.items || !d.items.length) {
      list.innerHTML = '<div style="padding:1rem;text-align:center;font-size:.78rem;color:#9488a8;">Нет уведомлений</div>';
    } else {
      list.innerHTML = d.items.map(n => `
        <div style="padding:.65rem 1rem;border-bottom:1px solid rgba(150,0,28,0.1);background:${n.read?'transparent':'rgba(200,0,40,0.05)'};">
          <div style="font-size:.75rem;color:#e2d8f0;">
            ${n.type==='reply'?`<strong>@${esc(n.data?.from_username||'')}</strong> ответил на ваш комментарий`:'Новое уведомление'}
          </div>
          ${n.data?.preview ? `<div style="font-size:.68rem;color:#9488a8;margin-top:.2rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(n.data.preview)}</div>` : ''}
          ${n.data?.news_slug ? `<a href="/news/${esc(n.data.news_slug)}" style="font-size:.65rem;color:#c8002a;text-decoration:none;">Перейти →</a>` : ''}
        </div>`).join('');
    }
  }
}
function toggleNotifPanel() {
  const panel = document.getElementById('notif-panel');
  _notifOpen = !_notifOpen;
  if (panel) panel.style.display = _notifOpen ? '' : 'none';
  if (_notifOpen) loadNotifications();
}
async function markAllNotifRead() {
  await fetch('/api/notifications/read-all', {method:'POST', credentials:'include'});
  const cnt = document.getElementById('notif-count');
  if (cnt) cnt.style.display = 'none';
  loadNotifications();
}
document.addEventListener('click', e => {
  if (_notifOpen && !e.target.closest('#notif-bell-wrap')) {
    _notifOpen = false;
    const panel = document.getElementById('notif-panel');
    if (panel) panel.style.display = 'none';
  }
});

// ── Theme toggle ────────────────────────────────────────────────────────────

// ── Player modal ────────────────────────────────────────────────────────────
let _playerModal = null;
async function openPlayerModal(playerName, serverNum, playerRank) {
  if (_playerModal) { _playerModal.remove(); _playerModal = null; }
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:3rem 1rem;overflow-y:auto;';
  modal.innerHTML = `
    <div style="position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(5px);" onclick="closePlayerModal()"></div>
    <div style="position:relative;background:rgba(10,2,18,.97);border:1px solid rgba(180,0,35,.4);border-radius:1rem;padding:1.75rem;max-width:400px;width:100%;box-shadow:0 8px 48px rgba(0,0,0,.7);" id="player-modal-inner">
      <button onclick="closePlayerModal()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;color:#9488a8;cursor:pointer;font-size:1.1rem;line-height:1;padding:.2rem;">✕</button>
      <div id="player-modal-content" style="text-align:center;">
        <div style="width:3rem;height:3rem;border-radius:50%;background:rgba(150,0,28,.3);margin:0 auto .75rem;display:flex;align-items:center;justify-content:center;font-size:1.2rem;">⚔</div>
        <div style="color:#9488a8;font-size:.85rem;">Загрузка...</div>
      </div>
    </div>`;
  document.body.appendChild(modal);
  _playerModal = modal;

  try {
    const data = await fetch(`${API}/users/${encodeURIComponent(playerName)}`).then(r => r.ok ? r.json() : null);
    const inner = document.getElementById('player-modal-content');
    if (!data) {
      inner.innerHTML = '<p style="color:#f87171;font-size:.85rem;">Игрок не найден</p>';
      return;
    }
    const totalH = Math.floor((data.total_seconds||0) / 3600);
    const totalM = Math.floor(((data.total_seconds||0) % 3600) / 60);
    const lastH  = Math.floor((data.last_duration||0) / 3600);
    const lastM  = Math.floor(((data.last_duration||0) % 3600) / 60);
    const sc     = data.session_count || 0;
    const avgSec = sc > 0 ? Math.round((data.total_seconds||0) / sc) : 0;
    const avgH   = Math.floor(avgSec / 3600);
    const avgM   = Math.floor((avgSec % 3600) / 60);
    const avatarHtml = data.avatar_url
      ? `<img src="${esc(data.avatar_url)}" alt="" style="width:4rem;height:4rem;border-radius:50%;object-fit:cover;margin:0 auto .75rem;display:block;border:2px solid rgba(150,0,28,.5);">`
      : `<div style="width:4rem;height:4rem;border-radius:50%;background:${nameGradient(playerName)};margin:0 auto .75rem;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;color:#fff;">${esc(playerName.charAt(0).toUpperCase())}</div>`;
    const isOnline = _onlineNames.has(playerName);
    inner.innerHTML = `
      ${avatarHtml}
      <h3 style="font-family:'Cinzel',serif;font-size:1.05rem;font-weight:700;color:#d4c4e0;margin-bottom:.2rem;">${esc(playerName)}</h3>
      ${playerRank ? `<div style="font-size:.68rem;color:#9488a8;margin-bottom:.5rem;"># ${playerRank} место в рейтинге</div>` : ''}
      ${isOnline ? '<div style="display:inline-flex;align-items:center;gap:.35rem;background:rgba(0,70,15,.25);border:1px solid rgba(0,160,35,.4);color:#86efac;font-size:.7rem;font-weight:700;padding:.2rem .6rem;border-radius:9999px;margin-bottom:.75rem;"><span style="width:.45rem;height:.45rem;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;"></span>В сети</div>' : ''}
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-top:.85rem;text-align:left;">
        <div style="background:rgba(14,5,22,.5);border:1px solid rgba(120,0,28,.2);border-radius:.5rem;padding:.55rem .7rem;">
          <div style="font-size:.55rem;color:#9488a8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.2rem;">Всего</div>
          <div style="font-size:.92rem;font-weight:700;color:#e2d8f0;font-family:'Oswald',sans-serif;">${totalH}ч ${totalM}м</div>
        </div>
        <div style="background:rgba(14,5,22,.5);border:1px solid rgba(120,0,28,.2);border-radius:.5rem;padding:.55rem .7rem;">
          <div style="font-size:.55rem;color:#9488a8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.2rem;">Ср. сессия</div>
          <div style="font-size:.92rem;font-weight:700;color:#e2d8f0;font-family:'Oswald',sans-serif;">${sc > 0 ? `${avgH}ч ${avgM}м` : '—'}</div>
        </div>
        <div style="background:rgba(14,5,22,.5);border:1px solid rgba(120,0,28,.2);border-radius:.5rem;padding:.55rem .7rem;">
          <div style="font-size:.55rem;color:#9488a8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.2rem;">Сессий</div>
          <div style="font-size:.92rem;font-weight:700;color:#e2d8f0;font-family:'Oswald',sans-serif;">${sc || '—'}</div>
        </div>
        <div style="background:rgba(14,5,22,.5);border:1px solid rgba(120,0,28,.2);border-radius:.5rem;padding:.55rem .7rem;">
          <div style="font-size:.55rem;color:#9488a8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.2rem;">Посл. сессия</div>
          <div style="font-size:.88rem;font-weight:700;color:#e2d8f0;font-family:'Oswald',sans-serif;">${lastH}ч ${lastM}м</div>
        </div>
        <div style="background:rgba(14,5,22,.5);border:1px solid rgba(120,0,28,.2);border-radius:.5rem;padding:.55rem .7rem;grid-column:span 2;">
          <div style="font-size:.55rem;color:#9488a8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.2rem;">Последний вход</div>
          <div style="font-size:.82rem;color:#e2d8f0;">${data.last_seen ? new Date(data.last_seen).toLocaleString('ru-RU', {timeZone: window.__TZ||'Europe/Moscow'}) : '—'}</div>
        </div>
      </div>
      <div style="margin-top:1rem;">
        <a href="/user.html?u=${encodeURIComponent(playerName)}" style="display:inline-block;padding:.5rem 1.25rem;background:rgba(150,0,28,.2);border:1px solid rgba(180,0,40,.4);border-radius:.5rem;color:#e2d8f0;font-size:.8rem;text-decoration:none;transition:background .15s;" onmouseover="this.style.background='rgba(150,0,28,.35)'" onmouseout="this.style.background='rgba(150,0,28,.2)'">Открыть профиль →</a>
      </div>`;
  } catch {
    const inner = document.getElementById('player-modal-content');
    if (inner) inner.innerHTML = '<p style="color:#f87171;font-size:.85rem;">Ошибка загрузки</p>';
  }
}
function closePlayerModal() {
  if (_playerModal) { _playerModal.remove(); _playerModal = null; }
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePlayerModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
    e.preventDefault();
    const s = document.getElementById('lb-search');
    if (s) { s.focus(); s.select(); }
  }
});
</script>
</body>
</html>
