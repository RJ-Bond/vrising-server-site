<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Just-Skill.Ru" />
  <meta property="og:title" content="V Rising — События" />
  <meta property="og:description" content="События и турниры сервера V Rising — участвуйте в PvP и PvE активностях." />
  <meta property="og:image" content="https://v.just-skill.ru/uploads/og-default.png" />
  <meta property="og:url" content="https://v.just-skill.ru/events.html" />
  <link rel="canonical" href="https://v.just-skill.ru/events.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="description" content="События и турниры сервера V Rising — участвуйте в PvP и PvE активностях." />
  <title>События — V Rising</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#06000f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tailwind.min.css" />
  <link rel="stylesheet" href="/theme.css?v=1" />
  <link rel="stylesheet" href="/components.css?v=2" />
  <style>
    /* Base tokens in /theme.css; overrides below for this page. */
    :root {
      --panel:   rgba(255,255,255,0.035);
      --green:   #2ee69b;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body {
      background:var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 50%, rgba(80,0,130,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(150,0,28,0.08) 0%, transparent 50%);
      background-attachment:fixed;
      font-family:'Inter',system-ui,sans-serif; color:var(--text); min-height:100vh;
    }
    /* nav + tooltips + base: /components.css */

    /* Event cards */
    .event-card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:.875rem;
      backdrop-filter:blur(16px);
      transition:box-shadow .25s, transform .2s;
      animation:fade-up .35s ease both;
    }
    .event-card:hover {
      box-shadow:0 8px 40px rgba(0,0,0,0.7), 0 0 28px rgba(110,0,150,.18);
      transform:translateY(-3px);
    }
    @keyframes fade-up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

    /* Countdown */
    .event-countdown { display:flex; align-items:baseline; gap:.2rem; flex-wrap:wrap; }
    .event-countdown span { font-family:'Oswald',sans-serif; font-size:1.1rem; font-weight:600; color:var(--text); }
    .event-countdown small { font-size:.58rem; color:var(--muted); margin-right:.2rem; }

    /* Status filter buttons */
    .srv-period-btn { background:none; border:1px solid rgba(110,0,150,.22); color:var(--muted); font-size:.72rem; font-weight:600; padding:.3rem .7rem; border-radius:.4rem; cursor:pointer; transition:all .15s; font-family:'Inter',sans-serif; }
    .srv-period-btn.active { background:rgba(180,0,42,.3); border-color:rgba(200,0,42,.5); color:#fff; }
    .srv-period-btn:hover:not(.active) { color:var(--text); border-color:rgba(160,0,200,.4); }

    /* Category filter pills */
    .cat-pill { background:none; border:1px solid rgba(110,0,150,.22); color:var(--muted); font-size:.72rem; font-weight:600; padding:.3rem .8rem; border-radius:9999px; cursor:pointer; transition:all .15s; font-family:'Inter',sans-serif; }
    .cat-pill.active { background:rgba(200,0,42,.2); border-color:rgba(200,0,42,.5); color:var(--text); }
    .cat-pill:hover:not(.active) { color:var(--text); border-color:rgba(160,0,200,.4); }

  </style>
</head>
<body>

<!-- NAV -->
<div class="mobile-overlay" id="mob-overlay" onclick="toggleMobileNav()"></div>
<div class="mobile-drawer" id="mob-drawer">
  <a href="/">Главная</a>
  <a href="/servers.html">Сервера</a>
  <a href="/leaderboard.html">Игроки</a>
  <a href="/clans.html">Кланы</a>
  <a href="/map.html">Карта</a>
  <a href="/bans.html">Баны</a>
  <a href="/faq.html">FAQ</a>
  <a href="/events.html" class="active">События</a>
  <a href="/profile.html">Профиль</a>
</div>
<nav class="glass-nav">
  <div style="max-width:1000px;margin:auto;padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem;">
    <a href="/" class="gothic" style="font-size:1.1rem;font-weight:900;letter-spacing:.15em;color:#d4c4e0;text-decoration:none;text-shadow:0 0 20px rgba(204,0,40,0.6);">⚔ V RISING</a>
    <div class="nav-links">
      <a href="/" class="topnav-link">Главная</a>
      <a href="/servers.html" class="topnav-link">Сервера</a>
      <a href="/leaderboard.html" class="topnav-link">Игроки</a>
      <a href="/clans.html" class="topnav-link">Кланы</a>
      <a href="/map.html" class="topnav-link">Карта</a>
      <a href="/bans.html" class="topnav-link">Баны</a>
      <a href="/faq.html" class="topnav-link">FAQ</a>
      <a href="/events.html" class="topnav-link active">События</a>
      <a id="nav-profile-link" href="/profile.html" class="topnav-link" style="display:none;">Профиль</a>
      <a id="nav-login-link" href="/login.html" class="topnav-link">Войти</a>
    </div>
    <button class="nav-burger" onclick="toggleMobileNav()" aria-label="Меню">☰</button>
  </div>
</nav>

<div style="max-width:860px;margin:2.5rem auto 3.5rem;padding:0 1rem;position:relative;z-index:1;">
  <div style="text-align:center;margin-bottom:2rem;">
    <h1 class="gothic" style="font-size:1.3rem;letter-spacing:.1em;color:var(--gold);text-transform:uppercase;">События и турниры</h1>
    <p style="font-size:.8rem;color:var(--muted);margin-top:.4rem;">Участвуйте в событиях сервера</p>
  </div>

  <!-- Status filter -->
  <div style="display:flex;gap:.4rem;margin-bottom:.6rem;flex-wrap:wrap;">
    <button class="srv-period-btn active" onclick="filterStatus('all',this)">Все</button>
    <button class="srv-period-btn" onclick="filterStatus('upcoming',this)">Предстоящие</button>
    <button class="srv-period-btn" onclick="filterStatus('active',this)">Активные</button>
    <button class="srv-period-btn" onclick="filterStatus('ended',this)">Прошедшие</button>
  </div>

  <!-- Category filter -->
  <div style="display:flex;gap:.4rem;margin-bottom:1.5rem;flex-wrap:wrap;">
    <button class="cat-pill active" onclick="filterCategory('all',this)">Все</button>
    <button class="cat-pill" onclick="filterCategory('wipe',this)">🔥 Вайп</button>
    <button class="cat-pill" onclick="filterCategory('tournament',this)">⚔ Турнир</button>
    <button class="cat-pill" onclick="filterCategory('update',this)">⚡ Обновление</button>
    <button class="cat-pill" onclick="filterCategory('event',this)">🌟 Событие</button>
  </div>

  <div id="events-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;">
    <p style="color:var(--muted);text-align:center;grid-column:1/-1;">Загрузка…</p>
  </div>
</div>

<script src="/common.js?v=9"></script>
<script>
const API = '/api';

const EVENT_TYPES = {
  wipe:       { label:'Вайп',       color:'#c8002a', bg:'rgba(200,0,42,0.15)',   border:'rgba(200,0,42,0.4)',   icon:'🔥' },
  tournament: { label:'Турнир',     color:'#c9a94a', bg:'rgba(200,160,0,0.15)', border:'rgba(200,160,0,0.4)', icon:'⚔' },
  update:     { label:'Обновление', color:'#3b82f6', bg:'rgba(59,130,246,0.12)', border:'rgba(59,130,246,0.35)',icon:'⚡' },
  event:      { label:'Событие',    color:'#a855f7', bg:'rgba(168,85,247,0.12)', border:'rgba(168,85,247,0.35)',icon:'🌟' },
};
// Map legacy API event_type values to new categories
const LEGACY_TYPE_MAP = { pvp:'tournament', pve:'event', social:'event', other:'event' };

const STATUS_LABELS = {upcoming:'Предстоящее', active:'Активное', ended:'Завершено', cancelled:'Отменено'};
const STATUS_COLORS = {upcoming:'#c9a04a', active:'#2ee69b', ended:'#9488a8', cancelled:'#f87171'};

let _allEvents = [];
let _currentStatus = 'all';
let _currentCategory = 'all';
let _currentUser = null;

fetch('/api/auth/me', {credentials:'include'}).then(r=>r.ok?r.json():null).then(u=>{ _currentUser=u; }).catch(()=>{});

function toggleMobileNav() {
  document.getElementById('mob-overlay').classList.toggle('open');
  document.getElementById('mob-drawer').classList.toggle('open');
}

function getEventType(ev) {
  const t = ev.event_type || ev.type || '';
  if (EVENT_TYPES[t]) return t;
  return LEGACY_TYPE_MAP[t] || 'event';
}

function makeTypeBadge(typeName) {
  const t = EVENT_TYPES[typeName] || EVENT_TYPES.event;
  return `<span style="font-size:.6rem;font-weight:700;letter-spacing:.06em;padding:.2rem .6rem;border-radius:9999px;background:${t.bg};border:1px solid ${t.border};color:${t.color};">${t.icon} ${t.label}</span>`;
}

function startCountdowns() {
  document.querySelectorAll('.event-countdown[data-end]').forEach(el => {
    function tick() {
      const diff = new Date(el.dataset.end) - Date.now();
      if (diff <= 0) { el.textContent = 'Завершено'; return; }
      const d = Math.floor(diff/86400000);
      const h = Math.floor((diff%86400000)/3600000);
      const m = Math.floor((diff%3600000)/60000);
      const s = Math.floor((diff%60000)/1000);
      const pad = n => String(n).padStart(2,'0');
      el.innerHTML = d > 0
        ? `<span>${d}</span><small>д</small> <span>${pad(h)}</span><small>ч</small> <span>${pad(m)}</span><small>м</small>`
        : `<span>${pad(h)}</span><small>ч</small> <span>${pad(m)}</span><small>м</small> <span>${pad(s)}</span><small>с</small>`;
    }
    tick();
    setInterval(tick, 1000);
  });
}

// ── Event structured data (schema.org) — mirrors the NewsArticle JSON-LD
// pattern used for news articles (see _setArticleJsonLd in index.js), but
// for the real, currently-listed events rather than placeholder data. ──
function setEventsJsonLd(events) {
  const id = 'events-jsonld';
  document.getElementById(id)?.remove();
  const listable = (events || []).filter(e => e.status !== 'cancelled');
  if (!listable.length) return;
  const el = document.createElement('script');
  el.type = 'application/ld+json';
  el.id = id;
  el.textContent = JSON.stringify(listable.map(ev => ({
    '@context': 'https://schema.org',
    '@type': 'Event',
    name: ev.title,
    description: ev.description || ev.title,
    startDate: ev.start_date,
    endDate: ev.end_date || undefined,
    // Cancelled events are filtered out above; everything remaining ran/will
    // run as scheduled — schema.org's eventStatus enum has no "ended" value.
    eventStatus: 'https://schema.org/EventScheduled',
    eventAttendanceMode: 'https://schema.org/OnlineEventAttendanceMode',
    location: { '@type': 'VirtualLocation', url: `${location.origin}/events.html#${ev.id}` },
    image: ev.cover_url || `${location.origin}/uploads/og-default.png`,
    url: `${location.origin}/events.html#${ev.id}`,
    organizer: { '@type': 'Organization', name: 'Just-Skill.Ru', url: 'https://v.just-skill.ru' },
  })));
  document.head.appendChild(el);
}

async function loadEvents() {
  const grid = document.getElementById('events-grid');
  try {
    const d = await fetch(`${API}/events?per_page=50`).then(r=>r.json());
    _allEvents = d.items || [];
    renderEvents();
    setEventsJsonLd(_allEvents);
  } catch {
    if (grid) grid.innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:3.5rem 1rem;">
        <div style="font-size:3rem;margin-bottom:1rem;opacity:.6;filter:drop-shadow(0 0 12px rgba(180,0,30,0.45));">⚠</div>
        <div class="gothic" style="font-size:1rem;color:var(--gold);margin-bottom:.5rem;">Ошибка загрузки</div>
        <div style="font-size:.8rem;color:var(--muted);margin-bottom:1rem;">Не удалось загрузить события — проверьте связь и попробуйте снова.</div>
        <button onclick="loadEvents()" style="background:rgba(20,5,35,0.6);border:1px solid rgba(110,0,20,0.35);color:var(--muted);border-radius:.5rem;padding:.4rem .9rem;cursor:pointer;font-family:'Inter',sans-serif;font-size:.8rem;">↻ Повторить</button>
      </div>`;
  }
}

function filterStatus(status, btn) {
  _currentStatus = status;
  document.querySelectorAll('.srv-period-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderEvents();
}

function filterCategory(cat, btn) {
  _currentCategory = cat;
  document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderEvents();
}

function renderEvents() {
  const grid = document.getElementById('events-grid');
  if (!grid) return;

  let items = _allEvents;
  if (_currentStatus !== 'all') items = items.filter(e => e.status === _currentStatus);
  if (_currentCategory !== 'all') items = items.filter(e => getEventType(e) === _currentCategory);

  if (!items.length) {
    grid.innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:3.5rem 1rem;">
        <div style="font-size:3rem;margin-bottom:1rem;">🌑</div>
        <div class="gothic" style="font-size:1rem;color:var(--text);margin-bottom:.5rem;">Событий нет</div>
        <div style="font-size:.8rem;color:var(--muted);">Следите за объявлениями в Discord</div>
      </div>`;
    return;
  }

  grid.innerHTML = items.map((ev, idx) => {
    const typeName = getEventType(ev);
    const typeInfo = EVENT_TYPES[typeName] || EVENT_TYPES.event;
    const badge = makeTypeBadge(typeName);
    const pCount = ev.participant_count || 0;
    const pMax = ev.max_participants;

    const startDt = ev.start_date
      ? new Date(ev.start_date).toLocaleDateString('ru-RU', {day:'2-digit', month:'short', year:'numeric'})
      : '—';

    // Countdown: upcoming → count to start, active + end_date → count to end
    let countdownHtml = '';
    const countdownTarget = ev.status === 'upcoming'
      ? (ev.start_date || null)
      : ev.status === 'active' ? (ev.end_date || null) : null;
    if (countdownTarget) {
      const label = ev.status === 'upcoming' ? 'До начала' : 'До конца';
      countdownHtml = `
        <div style="margin-bottom:.75rem;padding:.6rem .75rem;background:rgba(255,255,255,0.03);border-radius:.5rem;border:1px solid rgba(255,255,255,0.06);">
          <div style="font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.35rem;">${label}</div>
          <div class="event-countdown" data-end="${countdownTarget}"></div>
        </div>`;
    }

    const joinBtn = (ev.status === 'ended' || ev.status === 'cancelled') ? ''
      : `<button onclick="joinEvent(${ev.id},this)" class="ev-join-btn" id="ev-join-${ev.id}"
          style="width:100%;padding:.5rem;background:linear-gradient(135deg,#6a001a,#a00022);border:none;border-radius:.5rem;color:#fff;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s;"
          onmouseover="this.style.filter='brightness(1.2)'" onmouseout="this.style.filter=''">
          Записаться
        </button>`;

    return `<div class="event-card" data-event-id="${ev.id}" data-status="${ev.status}" data-type="${typeName}"
        style="padding:1.25rem 1.4rem;border-left:3px solid ${typeInfo.color};animation-delay:${idx * 50}ms;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:.65rem;">
        ${badge}
        <span style="font-size:.68rem;color:var(--muted);font-family:'Oswald',sans-serif;white-space:nowrap;">${startDt}</span>
      </div>
      <div class="gothic" style="font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:.4rem;line-height:1.3;">${esc(ev.title)}</div>
      ${ev.description
        ? `<div style="font-size:.8rem;color:var(--muted);line-height:1.55;margin-bottom:.85rem;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;">${esc(ev.description)}</div>`
        : '<div style="margin-bottom:.85rem;"></div>'}
      ${countdownHtml}
      <div style="font-size:.72rem;color:var(--muted);margin-bottom:${joinBtn ? '.75rem' : '0'};">👥 ${pCount}${pMax ? '/' + pMax : ''} участников</div>
      ${joinBtn}
    </div>`;
  }).join('');

  startCountdowns();
}

async function joinEvent(id, btn) {
  if (!_currentUser) { window.location.href = '/login.html'; return; }
  btn.disabled = true;
  btn.textContent = 'Загрузка…';
  try {
    const r = await fetch(`${API}/events/${id}/join`, {method:'POST', credentials:'include'});
    if (r.ok) {
      btn.textContent = '✔ Вы записаны — отменить';
      btn.style.background = 'rgba(46,230,155,.2)';
      btn.style.border = '1px solid rgba(46,230,155,.4)';
      btn.style.color = '#2ee69b';
      btn.onclick = () => leaveEvent(id, btn);
    } else {
      const d = await r.json().catch(() => ({}));
      btn.textContent = d.detail || 'Ошибка';
      btn.style.background = 'rgba(248,113,113,.2)';
      btn.disabled = false;
    }
  } catch { btn.textContent = 'Ошибка'; btn.disabled = false; }
}

async function leaveEvent(id, btn) {
  btn.disabled = true;
  try {
    await fetch(`${API}/events/${id}/leave`, {method:'DELETE', credentials:'include'});
    btn.textContent = 'Записаться';
    btn.style.background = 'linear-gradient(135deg,#6a001a,#a00022)';
    btn.style.border = 'none';
    btn.style.color = '#fff';
    btn.disabled = false;
    btn.onclick = () => joinEvent(id, btn);
  } catch { btn.disabled = false; }
}

// Check auth state for nav links
(function() {
  const profileLink = document.getElementById('nav-profile-link');
  const loginLink = document.getElementById('nav-login-link');
  fetch('/api/auth/me', {credentials:'include'}).then(r => {
    if (r.ok) {
      if (profileLink) profileLink.style.display = '';
      if (loginLink) loginLink.style.display = 'none';
    } else {
      if (profileLink) profileLink.style.display = 'none';
      if (loginLink) loginLink.style.display = '';
    }
  }).catch(() => {});
})();

loadEvents();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
