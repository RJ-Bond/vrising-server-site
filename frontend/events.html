<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="V RISING" />
  <meta property="og:title" content="V Rising — События" />
  <meta property="og:description" content="Официальный сайт игрового сервера V Rising — события, турниры, PvP и PvE активности." />
  <meta property="og:image" content="/uploads/og-default.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="description" content="События и турниры сервера V Rising — участвуйте в PvP и PvE активностях." />
  <title>События — V Rising</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#06000f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tailwind.min.css" />
  <style>
    :root {
      --bg:      #06000f;
      --card:    rgba(16,7,23,0.92);
      --panel:   rgba(255,255,255,0.035);
      --border:  rgba(110,0,150,0.22);
      --text:    #f5f0fb;
      --muted:   #b6a8d2;
      --label:   #d6c9ee;
      --gold:    #c9a94a;
      --crimson: #c8002a;
      --purple:  #7c3aed;
      --green:   #2ee69b;
      --yellow:  #ffcf5c;
      --red:     #ff5d7e;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body {
      background:var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 50%, rgba(80,0,130,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(150,0,28,0.08) 0%, transparent 50%);
      background-attachment:fixed;
      font-family:'Inter',system-ui,sans-serif; color:var(--text); min-height:100vh;
    }
    .gothic { font-family:'Cinzel',serif; }
    .glass-nav { background:rgba(8,0,14,0.9); border-bottom:1px solid rgba(110,0,20,0.35); backdrop-filter:blur(14px); position:sticky; top:0; z-index:40; }
    .topnav-link {
      font-size:.78rem; font-weight:600; color:var(--muted); text-decoration:none;
      padding:.4rem .75rem; border-radius:.5rem; border:1px solid transparent; transition:all .2s;
      background:none; cursor:pointer; font-family:'Inter',sans-serif;
    }
    .topnav-link:hover { color:var(--text); background:rgba(150,0,28,0.12); border-color:rgba(160,0,35,0.35); }
    .topnav-link.active { color:#fff; background:rgba(150,0,28,0.22); border-color:rgba(180,0,35,0.5); }
    body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; background-image:radial-gradient(rgba(255,255,255,0.055) 1px, transparent 1px); background-size:28px 28px; }
    .nav-links { display:flex; align-items:center; gap:.3rem; flex-wrap:wrap; }
    .nav-burger { display:none; align-items:center; justify-content:center; width:2.2rem; height:2.2rem; border-radius:.5rem; background:none; border:1px solid rgba(110,0,20,0.35); color:var(--muted); cursor:pointer; transition:all .2s; flex-shrink:0; }
    .nav-burger:hover { border-color:rgba(180,0,35,0.5); color:var(--text); }
    .mobile-overlay { display:none; position:fixed; inset:0; z-index:49; background:rgba(0,0,0,0.65); backdrop-filter:blur(3px); opacity:0; transition:opacity .25s; pointer-events:none; }
    .mobile-overlay.open { opacity:1; pointer-events:auto; }
    .mobile-drawer { position:fixed; bottom:0; left:0; right:0; z-index:50; background:rgba(8,0,14,0.98); border-top:1px solid rgba(110,0,20,0.5); backdrop-filter:blur(20px); padding:1rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom)); transform:translateY(100%); transition:transform .3s cubic-bezier(.32,.72,0,1); display:grid; grid-template-columns:1fr 1fr; gap:.5rem; }
    .mobile-drawer.open { transform:translateY(0); }
    .mobile-drawer a { font-size:.85rem; font-weight:600; color:var(--muted); text-decoration:none; padding:.65rem .9rem; border-radius:.6rem; border:1px solid rgba(110,0,20,0.2); transition:all .18s; text-align:center; }
    .mobile-drawer a:hover, .mobile-drawer a.active { color:#fff; background:rgba(150,0,28,0.22); border-color:rgba(180,0,35,0.5); }
    @media (max-width:640px) { .nav-links { display:none; } .nav-burger { display:flex; } .mobile-overlay { display:block; } }

    .event-card {
      background:var(--card); border:1px solid rgba(110,0,150,0.22);
      border-radius:.875rem; backdrop-filter:blur(16px); overflow:hidden;
      transition:box-shadow .3s; animation:fade-up .4s ease both;
    }
    .event-card:hover { box-shadow:0 6px 40px rgba(0,0,0,0.7), 0 0 24px rgba(110,0,150,.15); }
    .event-cover { height:140px; object-fit:cover; width:100%; display:block; }
    .event-cover-placeholder { height:140px; display:flex; align-items:center; justify-content:center; font-size:2.5rem; }
    @keyframes fade-up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

    .srv-period-btn { background:none; border:1px solid rgba(110,0,150,.22); color:var(--muted); font-size:.72rem; font-weight:600; padding:.3rem .7rem; border-radius:.4rem; cursor:pointer; transition:all .15s; font-family:'Inter',sans-serif; }
    .srv-period-btn.active { background:rgba(180,0,42,.3); border-color:rgba(200,0,42,.5); color:#fff; }
    .srv-period-btn:hover:not(.active) { color:var(--text); border-color:rgba(160,0,200,.4); }

    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:rgba(8,0,14,0.4); }
    ::-webkit-scrollbar-thumb { background:rgba(130,0,24,0.5); border-radius:3px; }
  </style>
</head>
<body>

<!-- NAV -->
<div class="mobile-overlay" id="mob-overlay" onclick="toggleMobileNav()"></div>
<div class="mobile-drawer" id="mob-drawer">
  <a href="/">Главная</a>
  <a href="/servers.html">Сервера</a>
  <a href="/leaderboard.html">Игроки</a>
  <a href="/clans.html">Кланы</a>
  <a href="/map.html">Карта</a>
  <a href="/bans.html">Баны</a>
  <a href="/faq.html">FAQ</a>
  <a href="/events.html" class="active">События</a>
  <a href="/profile.html">Профиль</a>
</div>
<nav class="glass-nav">
  <div style="max-width:1000px;margin:auto;padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem;">
    <a href="/" class="gothic" style="font-size:1.1rem;font-weight:900;letter-spacing:.15em;color:#d4c4e0;text-decoration:none;text-shadow:0 0 20px rgba(204,0,40,0.6);">⚔ V RISING</a>
    <div class="nav-links">
      <a href="/" class="topnav-link">Главная</a>
      <a href="/servers.html" class="topnav-link">Сервера</a>
      <a href="/leaderboard.html" class="topnav-link">Игроки</a>
      <a href="/clans.html" class="topnav-link">Кланы</a>
      <a href="/map.html" class="topnav-link">Карта</a>
      <a href="/bans.html" class="topnav-link">Баны</a>
      <a href="/faq.html" class="topnav-link">FAQ</a>
      <a href="/events.html" class="topnav-link active">События</a>
      <a id="nav-profile-link" href="/profile.html" class="topnav-link" style="display:none;">Профиль</a>
      <a id="nav-login-link" href="/login.html" class="topnav-link">Войти</a>
    </div>
    <button class="nav-burger" onclick="toggleMobileNav()">☰</button>
  </div>
</nav>

<div style="max-width:860px;margin:2.5rem auto 3.5rem;padding:0 1rem;position:relative;z-index:1;">
  <div style="text-align:center;margin-bottom:2rem;">
    <h1 class="gothic" style="font-size:1.3rem;letter-spacing:.1em;color:var(--gold);text-transform:uppercase;">События и турниры</h1>
    <p style="font-size:.8rem;color:var(--muted);margin-top:.4rem;">Участвуйте в событиях сервера</p>
  </div>

  <div style="display:flex;gap:.4rem;margin-bottom:1.5rem;flex-wrap:wrap;">
    <button class="srv-period-btn active" onclick="filterEvents('all',this)">Все</button>
    <button class="srv-period-btn" onclick="filterEvents('upcoming',this)">Предстоящие</button>
    <button class="srv-period-btn" onclick="filterEvents('active',this)">Активные</button>
    <button class="srv-period-btn" onclick="filterEvents('ended',this)">Прошедшие</button>
  </div>

  <div id="events-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem;">
    <p style="color:var(--muted);text-align:center;grid-column:1/-1;">Загрузка…</p>
  </div>
</div>

<script src="/common.js?v=4"></script>
<script>
const API = '/api';

const EVENT_TYPE_ICONS = {pvp:'⚔️', pve:'🐺', social:'🎉', other:'🗓'};
const EVENT_TYPE_LABELS = {pvp:'PvP', pve:'PvE', social:'Социальное', other:'Событие'};
const STATUS_LABELS = {upcoming:'Предстоящее', active:'Активное', ended:'Завершено', cancelled:'Отменено'};
const STATUS_COLORS = {upcoming:'#c9a04a', active:'#2ee69b', ended:'#9488a8', cancelled:'#f87171'};

let _allEvents = [];
let _currentFilter = 'all';
let _currentUser = null;

fetch('/api/auth/me', {credentials:'include'}).then(r=>r.ok?r.json():null).then(u=>{ _currentUser=u; }).catch(()=>{});

function toggleMobileNav() {
  document.getElementById('mob-overlay').classList.toggle('open');
  document.getElementById('mob-drawer').classList.toggle('open');
}

async function loadEvents() {
  const grid = document.getElementById('events-grid');
  try {
    const d = await fetch(`${API}/events?per_page=50`).then(r=>r.json());
    _allEvents = d.items||[];
    renderEvents();
  } catch {
    if(grid) grid.innerHTML='<p style="color:#f87171;text-align:center;grid-column:1/-1;">Ошибка загрузки событий</p>';
  }
}

function filterEvents(status, btn) {
  _currentFilter = status;
  document.querySelectorAll('.srv-period-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderEvents();
}

function renderEvents() {
  const grid = document.getElementById('events-grid');
  if (!grid) return;
  const items = _currentFilter==='all' ? _allEvents : _allEvents.filter(e=>e.status===_currentFilter);
  if (!items.length) { grid.innerHTML='<p style="color:var(--muted);text-align:center;grid-column:1/-1;padding:2rem 0;">Нет событий</p>'; return; }

  grid.innerHTML = items.map(ev => {
    const icon = EVENT_TYPE_ICONS[ev.event_type]||'🗓';
    const typeLabel = EVENT_TYPE_LABELS[ev.event_type]||ev.event_type;
    const statusColor = STATUS_COLORS[ev.status]||'var(--muted)';
    const statusLabel = STATUS_LABELS[ev.status]||ev.status;
    const pCount = ev.participant_count||0;
    const pMax = ev.max_participants;
    const coverEl = ev.cover_url
      ? `<img class="event-cover" src="${esc(ev.cover_url)}" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="event-cover-placeholder" style="background:linear-gradient(135deg,rgba(80,0,130,.4),rgba(180,0,30,.3));">${icon}</div>`;
    const startDt = ev.start_date ? new Date(ev.start_date).toLocaleDateString('ru-RU',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
    const joinBtn = (ev.status==='ended'||ev.status==='cancelled') ? ''
      : `<button onclick="joinEvent(${ev.id},this)" class="ev-join-btn" id="ev-join-${ev.id}"
          style="width:100%;margin-top:.75rem;padding:.5rem;background:linear-gradient(135deg,#6a001a,#a00022);border:none;border-radius:.5rem;color:#fff;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s;"
          onmouseover="this.style.filter='brightness(1.2)'" onmouseout="this.style.filter=''">
          Записаться
        </button>`;
    return `<div class="event-card" data-status="${ev.status}">
      ${coverEl}
      <div style="padding:1rem;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;">
          <span style="font-size:.62rem;font-weight:700;color:${statusColor};letter-spacing:.05em;">${statusLabel}</span>
          <span style="font-size:.6rem;padding:.15rem .45rem;border-radius:9999px;background:rgba(110,0,150,.2);border:1px solid rgba(110,0,150,.35);color:#c4b5fd;">${icon} ${typeLabel}</span>
        </div>
        <h3 class="gothic" style="font-size:.95rem;font-weight:700;color:#e2d8f0;margin-bottom:.4rem;line-height:1.3;">${esc(ev.title)}</h3>
        ${ev.description ? `<p style="font-size:.75rem;color:var(--muted);margin-bottom:.5rem;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${esc(ev.description)}</p>` : ''}
        <div style="font-size:.72rem;color:var(--muted);margin-bottom:.3rem;">📅 ${startDt}</div>
        <div style="font-size:.72rem;color:var(--muted);">👥 ${pCount}${pMax?'/'+pMax:''} участников</div>
        ${joinBtn}
      </div>
    </div>`;
  }).join('');
}

async function joinEvent(id, btn) {
  if (!_currentUser) { window.location.href = '/login.html'; return; }
  btn.disabled = true;
  btn.textContent = 'Загрузка…';
  try {
    const r = await fetch(`${API}/events/${id}/join`, {method:'POST', credentials:'include'});
    if (r.ok) {
      btn.textContent = '✔ Вы записаны — отменить';
      btn.style.background = 'rgba(46,230,155,.2)';
      btn.style.border = '1px solid rgba(46,230,155,.4)';
      btn.style.color = '#2ee69b';
      btn.onclick = () => leaveEvent(id, btn);
    } else {
      const d = await r.json().catch(()=>({}));
      btn.textContent = d.detail||'Ошибка';
      btn.style.background = 'rgba(248,113,113,.2)';
      btn.disabled = false;
    }
  } catch { btn.textContent='Ошибка'; btn.disabled=false; }
}

async function leaveEvent(id, btn) {
  btn.disabled = true;
  try {
    await fetch(`${API}/events/${id}/leave`, {method:'DELETE', credentials:'include'});
    btn.textContent = 'Записаться';
    btn.style.background = 'linear-gradient(135deg,#6a001a,#a00022)';
    btn.style.border = 'none';
    btn.style.color = '#fff';
    btn.disabled = false;
    btn.onclick = () => joinEvent(id, btn);
  } catch { btn.disabled=false; }
}

// Check auth state for nav links
(function() {
  const profileLink = document.getElementById('nav-profile-link');
  const loginLink = document.getElementById('nav-login-link');
  fetch('/api/auth/me', {credentials:'include'}).then(r => {
    if (r.ok) {
      if (profileLink) profileLink.style.display = '';
      if (loginLink) loginLink.style.display = 'none';
    } else {
      if (profileLink) profileLink.style.display = 'none';
      if (loginLink) loginLink.style.display = '';
    }
  }).catch(() => {});
})();

loadEvents();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
