<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V Rising — Вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --accent: #b5002a; --accent-glow: rgba(181,0,42,0.4);
      --card: rgba(14,3,24,0.95); --border: rgba(150,0,28,0.32);
      --text: #c8c5d4; --muted: #7a7290; --gold: #c9a04a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #080010;
      background-image:
        radial-gradient(ellipse at 25% 60%, rgba(80,0,120,0.13) 0%, transparent 55%),
        radial-gradient(ellipse at 78% 25%, rgba(150,0,28,0.08) 0%, transparent 50%);
      background-attachment: fixed;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text); min-height: 100vh;
      display: flex; flex-direction: column;
    }
    .fog { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .fog::before {
      content: ''; position: absolute; width: 160%; height: 160%; top: -30%; left: -30%;
      background: radial-gradient(ellipse at 38% 55%, rgba(90,0,150,0.1) 0%, transparent 55%);
      animation: fog1 28s ease-in-out infinite alternate;
    }
    .fog::after {
      content: ''; position: absolute; width: 160%; height: 160%; top: -30%; left: -30%;
      background: radial-gradient(ellipse at 65% 28%, rgba(170,0,32,0.07) 0%, transparent 50%);
      animation: fog2 38s ease-in-out infinite alternate-reverse;
    }
    @keyframes fog1 { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(5%,7%) scale(1.1); } }
    @keyframes fog2 { 0% { transform: translate(0,0) scale(1.06); } 100% { transform: translate(-6%,4%) scale(1); } }
    .gothic { font-family: 'Cinzel', serif; }
    .glow-text { text-shadow: 0 0 24px rgba(200,0,40,0.65), 0 0 50px rgba(200,0,40,0.2); }
    .glass-card {
      background: var(--card); border: 1px solid var(--border);
      box-shadow: 0 0 60px rgba(0,0,0,0.7), 0 0 30px rgba(100,0,20,0.1), inset 0 0 30px rgba(80,0,120,0.04);
      backdrop-filter: blur(8px);
    }
    .glass-nav { background: rgba(8,0,16,0.85); border-bottom: 1px solid rgba(150,0,28,0.3); backdrop-filter: blur(12px); }
    .dark-input {
      width: 100%; background: rgba(8,0,16,0.8); border: 1px solid rgba(120,0,24,0.4);
      color: var(--text); border-radius: .5rem; padding: .7rem 1rem; font-size: .95rem;
      transition: border-color .2s, box-shadow .2s;
    }
    .dark-input::placeholder { color: var(--muted); }
    .dark-input:focus { border-color: var(--accent); box-shadow: 0 0 12px rgba(181,0,42,0.22); outline: none; }
    .btn-primary {
      width: 100%; background: linear-gradient(135deg, #7a001c, #b5002a);
      box-shadow: 0 0 24px rgba(181,0,42,0.35); color: #fff; border: none;
      border-radius: .5rem; padding: .8rem 1.5rem; font-size: 1rem; font-weight: 700;
      letter-spacing: .05em; cursor: pointer; transition: box-shadow .2s, transform .15s;
    }
    .btn-primary:hover { box-shadow: 0 0 36px rgba(181,0,42,0.55); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    label { display: block; font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: .35rem; }
    .tab-btn {
      flex: 1; padding: .75rem; font-size: .75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em; cursor: pointer;
      background: none; border: none; color: var(--muted);
      border-bottom: 2px solid transparent; transition: all .2s;
    }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); text-shadow: 0 0 12px var(--accent-glow); }
    .error-box { background: rgba(140,0,20,0.25); border: 1px solid rgba(180,0,30,0.5); color: #fca5a5; border-radius: .5rem; padding: .6rem .9rem; font-size: .85rem; }
    .success-box { background: rgba(0,80,20,0.25); border: 1px solid rgba(0,180,40,0.4); color: #86efac; border-radius: .5rem; padding: .6rem .9rem; font-size: .85rem; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: rgba(8,0,16,0.5); }
    ::-webkit-scrollbar-thumb { background: rgba(150,0,28,0.5); border-radius: 3px; }
  </style>
</head>
<body>
<div class="fog"></div>

<nav class="glass-nav relative z-40">
  <div class="max-w-6xl mx-auto px-4 py-3">
    <a href="/" class="gothic font-black text-xl tracking-widest glow-text" style="color:#e0c8d8;text-decoration:none;">⚔ V RISING</a>
  </div>
</nav>

<div class="relative z-10 flex-1 flex items-center justify-center p-4">
  <div class="glass-card rounded-2xl p-8 w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-6">
      <div class="text-3xl mb-2" style="color:var(--accent);">⚔</div>
      <h1 class="gothic text-2xl font-black glow-text" style="color:#e0c8d8;letter-spacing:.08em;">V RISING</h1>
      <div style="width:5rem;height:1px;background:linear-gradient(90deg,transparent,rgba(181,0,42,0.6),transparent);margin:.75rem auto 0;"></div>
    </div>

    <!-- Tabs -->
    <div class="flex mb-6" style="border-bottom:1px solid rgba(150,0,28,0.25);">
      <button id="tab-login" class="tab-btn active" onclick="switchTab('login')">Вход</button>
      <button id="tab-register" class="tab-btn" onclick="switchTab('register')">Регистрация</button>
    </div>

    <!-- Login -->
    <form id="form-login" onsubmit="submitLogin(event)" class="space-y-4">
      <div>
        <label>Имя пользователя</label>
        <input name="username" type="text" required autocomplete="username" class="dark-input" />
      </div>
      <div>
        <label>Пароль</label>
        <input name="password" type="password" required autocomplete="current-password" class="dark-input" />
      </div>
      <div id="login-error" class="error-box hidden"></div>
      <button type="submit" id="login-btn" class="btn-primary" style="margin-top:.25rem;">Войти</button>
    </form>

    <!-- Register -->
    <form id="form-register" class="hidden space-y-4" onsubmit="submitRegister(event)">
      <div>
        <label>Имя пользователя</label>
        <input name="username" type="text" required autocomplete="username" placeholder="3-32 символа, буквы, цифры, _ и пробелы" class="dark-input" />
      </div>
      <div>
        <label>Email</label>
        <input name="email" type="email" required autocomplete="email" class="dark-input" />
      </div>
      <div>
        <label>Пароль</label>
        <input id="reg-password" name="password" type="password" required autocomplete="new-password" placeholder="Минимум 6 символов" class="dark-input" oninput="checkConfirm()" />
      </div>
      <div>
        <label>Повторите пароль</label>
        <input id="reg-confirm" name="password_confirm" type="password" required autocomplete="new-password" placeholder="Повторите пароль" class="dark-input" oninput="checkConfirm()" style="transition:border-color .2s,box-shadow .2s;" />
        <div id="confirm-hint" style="font-size:.72rem;margin-top:.35rem;display:none;"></div>
      </div>
      <div id="register-error" class="error-box hidden"></div>
      <div id="register-success" class="success-box hidden"></div>
      <button type="submit" id="register-btn" class="btn-primary" style="margin-top:.25rem;">Зарегистрироваться</button>
    </form>

  </div>
</div>

<script>
const API = '/api';

function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('form-login').classList.toggle('hidden', !isLogin);
  document.getElementById('form-register').classList.toggle('hidden', isLogin);
  document.getElementById('tab-login').className = 'tab-btn' + (isLogin ? ' active' : '');
  document.getElementById('tab-register').className = 'tab-btn' + (!isLogin ? ' active' : '');
  ['login-error','register-error','register-success'].forEach(id => document.getElementById(id).classList.add('hidden'));
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.classList.remove('hidden');
}

async function apiPost(url, body) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  let data;
  try { data = await res.json(); }
  catch { data = { detail: `Ошибка сервера (${res.status})` }; }
  return { res, data };
}

function extractError(data, fallback) {
  if (!data.detail) return fallback;
  if (Array.isArray(data.detail)) {
    return data.detail
      .map(d => (d.msg || '').replace(/^value error,\s*/i, ''))
      .join(', ');
  }
  return data.detail;
}

async function submitLogin(e) {
  e.preventDefault();
  document.getElementById('login-error').classList.add('hidden');
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Вход...';
  const fd = new FormData(e.target);
  try {
    const { res, data } = await apiPost(`${API}/auth/login`, {
      username: fd.get('username'), password: fd.get('password'),
    });
    if (!res.ok) { showError('login-error', extractError(data, 'Неверный логин или пароль')); return; }
    localStorage.setItem('token', data.access_token);
    localStorage.setItem('user', JSON.stringify(data.user));
    window.location.href = data.user.role === 'admin' ? '/admin.html' : '/';
  } catch (err) { showError('login-error', 'Нет связи с сервером: ' + err.message); }
  finally { btn.disabled = false; btn.textContent = 'Войти'; }
}

function checkConfirm() {
  const pw  = document.getElementById('reg-password').value;
  const cfw = document.getElementById('reg-confirm').value;
  const hint = document.getElementById('confirm-hint');
  const input = document.getElementById('reg-confirm');
  if (!cfw) { hint.style.display = 'none'; input.style.borderColor = ''; return; }
  const match = pw === cfw;
  hint.style.display = 'block';
  hint.textContent   = match ? '✔ Пароли совпадают' : '✘ Пароли не совпадают';
  hint.style.color   = match ? '#86efac' : '#fca5a5';
  input.style.borderColor = match ? 'rgba(0,180,40,0.5)' : 'rgba(180,0,30,0.6)';
  input.style.boxShadow   = match ? '0 0 8px rgba(0,180,40,0.2)' : '0 0 8px rgba(180,0,30,0.2)';
}

async function submitRegister(e) {
  e.preventDefault();
  document.getElementById('register-error').classList.add('hidden');
  document.getElementById('register-success').classList.add('hidden');
  const pw  = document.getElementById('reg-password').value;
  const cfw = document.getElementById('reg-confirm').value;
  if (pw !== cfw) { showError('register-error', 'Пароли не совпадают'); return; }
  const btn = document.getElementById('register-btn');
  btn.disabled = true; btn.textContent = 'Создание...';
  const fd = new FormData(e.target);
  try {
    const { res, data } = await apiPost(`${API}/auth/register`, {
      username: fd.get('username'), email: fd.get('email'), password: pw,
    });
    if (!res.ok) { showError('register-error', extractError(data, 'Ошибка регистрации')); return; }
    localStorage.setItem('token', data.access_token);
    localStorage.setItem('user', JSON.stringify(data.user));
    const s = document.getElementById('register-success');
    s.textContent = 'Аккаунт создан! Перенаправление...'; s.classList.remove('hidden');
    setTimeout(() => { window.location.href = '/'; }, 1200);
  } catch (err) { showError('register-error', 'Нет связи с сервером: ' + err.message); }
  finally { btn.disabled = false; btn.textContent = 'Зарегистрироваться'; }
}

const user = (() => { try { return JSON.parse(localStorage.getItem('user')); } catch { return null; } })();
if (user && localStorage.getItem('token')) window.location.href = user.role === 'admin' ? '/admin.html' : '/';
if (window.location.hash === '#register') switchTab('register');
</script>
</body>
</html>
