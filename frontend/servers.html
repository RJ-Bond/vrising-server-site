<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Open Graph -->
  <meta property="og:type" content="website" />

  <meta property="og:image" content="/uploads/og-default.png" />

  <title>V Rising — Сервера</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/tailwind.min.css" />
  <style>
    :root {
      --bg:      #06000f;
      --card:    rgba(16,7,23,0.92);
      --panel:   rgba(255,255,255,0.035);
      --border:  rgba(110,0,150,0.22);
      --text:    #f5f0fb;
      --muted:   #b6a8d2;
      --label:   #d6c9ee;
      --gold:    #c9a94a;
      --crimson: #c8002a;
      --purple:  #7c3aed;
      --pink-a:  #c2218a;
      --pink-b:  #9233ea;
      --green:   #2ee69b;
      --yellow:  #ffcf5c;
      --red:     #ff5d7e;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body {
      background:var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 50%, rgba(80,0,130,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(150,0,28,0.08) 0%, transparent 50%);
      background-attachment:fixed;
      font-family:'Inter',system-ui,sans-serif; color:var(--text); min-height:100vh;
    }
    .gothic { font-family:'Cinzel',serif; }
    .glass-nav { background:rgba(8,0,14,0.9); border-bottom:1px solid rgba(110,0,20,0.35); backdrop-filter:blur(14px); position:sticky; top:0; z-index:40; }
    .topnav-link {
      font-size:.78rem; font-weight:600; color:var(--muted); text-decoration:none;
      padding:.4rem .75rem; border-radius:.5rem; border:1px solid transparent; transition:all .2s;
      background:none; cursor:pointer; font-family:'Inter',sans-serif;
    }
    .topnav-link:hover { color:var(--text); background:rgba(150,0,28,0.12); border-color:rgba(160,0,35,0.35); }
    .topnav-link.active { color:#fff; background:rgba(150,0,28,0.22); border-color:rgba(180,0,35,0.5); }
    body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; background-image:radial-gradient(rgba(255,255,255,0.055) 1px, transparent 1px); background-size:28px 28px; }
    .nav-links { display:flex; align-items:center; gap:.3rem; flex-wrap:wrap; }
    .nav-burger { display:none; align-items:center; justify-content:center; width:2.2rem; height:2.2rem; border-radius:.5rem; background:none; border:1px solid rgba(110,0,20,0.35); color:var(--muted); cursor:pointer; transition:all .2s; flex-shrink:0; }
    .nav-burger:hover { border-color:rgba(180,0,35,0.5); color:var(--text); }
    .mobile-overlay { display:none; position:fixed; inset:0; z-index:49; background:rgba(0,0,0,0.65); backdrop-filter:blur(3px); opacity:0; transition:opacity .25s; pointer-events:none; }
    .mobile-overlay.open { opacity:1; pointer-events:auto; }
    .mobile-drawer { position:fixed; bottom:0; left:0; right:0; z-index:50; background:rgba(8,0,14,0.98); border-top:1px solid rgba(110,0,20,0.5); backdrop-filter:blur(20px); padding:1rem 1.25rem calc(1.25rem + env(safe-area-inset-bottom)); transform:translateY(100%); transition:transform .3s cubic-bezier(.32,.72,0,1); display:grid; grid-template-columns:1fr 1fr; gap:.5rem; }
    .mobile-drawer.open { transform:translateY(0); }
    .mobile-drawer a { font-size:.85rem; font-weight:600; color:var(--muted); text-decoration:none; padding:.65rem .9rem; border-radius:.6rem; border:1px solid rgba(110,0,20,0.2); transition:all .18s; text-align:center; }
    .mobile-drawer a:hover, .mobile-drawer a.active { color:#fff; background:rgba(150,0,28,0.22); border-color:rgba(180,0,35,0.5); }
    @media (max-width:640px) { .nav-links { display:none; } .nav-burger { display:flex; } .mobile-overlay { display:block; } }
    [data-tip] { position:relative; }
    [data-tip]::after { content:attr(data-tip); position:absolute; bottom:calc(100% + 7px); left:50%; transform:translateX(-50%); background:rgba(6,0,15,0.96); border:1px solid rgba(180,0,35,0.4); color:#d4c4e0; font-size:.68rem; padding:.28rem .65rem; border-radius:.4rem; white-space:nowrap; pointer-events:none; opacity:0; transition:opacity .15s; z-index:999; font-family:'Inter',sans-serif; }
    [data-tip]:hover::after { opacity:1; }

    .g-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:.875rem; backdrop-filter:blur(16px) saturate(1.2);
      box-shadow:0 4px 24px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.04);
      position:relative; padding:1.5rem;
    }
    .g-card::before {
      content:''; position:absolute; top:0; left:12%; right:12%; height:1px;
      background:linear-gradient(90deg,transparent,var(--accent,rgba(200,0,45,0.4)),transparent);
    }
    @keyframes fade-up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .g-card { animation:fade-up .4s ease both; }

    .srv-head { display:flex; align-items:center; gap:.6rem; margin-bottom:1.1rem; flex-wrap:wrap; }
    .srv-icon { width:1.7rem; height:1.7rem; object-fit:contain; filter:drop-shadow(0 0 8px var(--accent)); flex-shrink:0; }
    .srv-name { font-family:'Philosopher',serif; font-weight:700; font-size:1.05rem; color:#ece3f7; flex:1; min-width:0; }
    .srv-badge-group { display:flex; align-items:center; gap:.35rem; flex-shrink:0; flex-wrap:wrap; }
    .srv-badge { font-size:.6rem; font-weight:700; letter-spacing:.04em; padding:.16rem .5rem; border-radius:9999px; display:inline-flex; align-items:center; gap:.3rem; }
    .srv-badge.on  { background:rgba(46,230,155,0.14); border:1px solid rgba(46,230,155,0.4); color:var(--green); }
    .srv-badge.off { background:rgba(255,93,126,0.14); border:1px solid rgba(255,93,126,0.4); color:var(--red); }
    .srv-dot { width:.4rem; height:.4rem; border-radius:50%; background:currentColor; box-shadow:0 0 8px currentColor; }
    .srv-dot.pulse { animation:srv-pulse 1.6s ease-in-out infinite; }
    @keyframes srv-pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    .srv-vac-badge {
      font-size:.6rem; font-weight:700; letter-spacing:.04em; padding:.16rem .5rem; border-radius:9999px;
      display:inline-flex; align-items:center; gap:.3rem;
      background:rgba(46,230,155,0.1); border:1px solid rgba(46,230,155,0.3); color:var(--green);
    }
    .srv-vac-badge.off { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.1); color:var(--muted); }

    .srv-capacity-track { height:5px; background:rgba(255,255,255,0.08); border-radius:9999px; overflow:hidden; margin-top:.4rem; }
    .srv-capacity-fill { height:100%; border-radius:9999px; background:var(--accent); transition:width .6s ease; }

    .srv-record {
      font-size:.72rem; color:var(--gold); display:flex; align-items:center; gap:.4rem;
      margin-bottom:1.25rem; padding:.5rem .75rem; background:var(--panel);
      border:1px solid rgba(201,169,74,0.2); border-radius:.5rem;
    }

    @keyframes skel-pulse { 0%,100%{opacity:.35} 50%{opacity:.85} }
    .skel { animation:skel-pulse 1.3s ease-in-out infinite; }

    .srv-wipe-chip {
      font-size:.65rem; font-weight:600; color:var(--muted); background:var(--panel);
      border:1px solid rgba(255,255,255,0.1); border-radius:9999px; padding:.2rem .6rem;
      display:inline-flex; align-items:center; gap:.3rem; margin-bottom:1rem;
    }
    .srv-wipe-chip.urgent { color:var(--red); border-color:rgba(255,93,126,0.4); background:rgba(255,93,126,0.1); }

    .srv-connect-row { display:flex; gap:.6rem; margin-bottom:1.25rem; }
    .srv-connect-btn {
      flex:1; background:linear-gradient(135deg,var(--pink-a),var(--pink-b)); border:none; color:#fff;
      font-size:.78rem; font-weight:700; padding:.6rem 1rem; border-radius:.55rem; cursor:pointer;
      box-shadow:0 2px 16px rgba(194,33,138,0.35); transition:transform .15s, box-shadow .2s;
      display:inline-flex; align-items:center; justify-content:center; gap:.45rem;
    }
    .srv-connect-btn:hover { transform:translateY(-1px); box-shadow:0 2px 26px rgba(194,33,138,0.55); }
    .srv-copy-btn {
      background:var(--panel); border:1px solid rgba(255,255,255,0.12); color:var(--muted);
      border-radius:.55rem; padding:.6rem .9rem; font-size:.78rem; cursor:pointer; transition:all .2s;
    }
    .srv-copy-btn:hover { color:var(--text); border-color:rgba(150,50,200,0.5); }

    .srv-metrics {
      display:grid; grid-template-columns:repeat(4,1fr);
      background:var(--panel); border:1px solid rgba(255,255,255,0.08);
      border-radius:.75rem; margin-bottom:1.25rem; overflow:hidden;
    }
    .srv-metric { text-align:center; padding:.85rem .4rem; border-right:1px solid rgba(255,255,255,0.07); border-bottom:1px solid rgba(255,255,255,0.07); }
    .srv-metric:nth-child(4n) { border-right:none; }
    .srv-metric:nth-child(n+5) { border-bottom:none; }
    .srv-metric-val { font-family:'Oswald',sans-serif; font-size:1.2rem; font-weight:600; color:#fff; line-height:1; font-variant-numeric:tabular-nums; }
    .srv-metric-lbl { font-size:.58rem; color:var(--label); font-weight:600; text-transform:uppercase; letter-spacing:.07em; margin-top:.35rem; }

    @media (max-width:680px) {
      .srv-metrics { grid-template-columns:repeat(2,1fr); }
      .srv-metric:nth-child(4n) { border-right:1px solid rgba(255,255,255,0.07); }
      .srv-metric:nth-child(2n) { border-right:none; }
      .srv-metric:nth-child(n+5) { border-bottom:1px solid rgba(255,255,255,0.07); }
      .srv-metric:nth-last-child(-n+2) { border-bottom:none; }
    }

    .srv-section-title { font-family:'Cinzel',serif; font-size:.68rem; letter-spacing:.14em; color:var(--gold); text-transform:uppercase; margin-bottom:.6rem; }
    .srv-divider { height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent); margin:1.25rem 0; }

    .srv-graph-card { margin-bottom:1.25rem; }
    .srv-graph-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:.6rem; }
    .srv-period-toggle { display:flex; gap:.2rem; background:rgba(8,0,16,0.5); border-radius:.4rem; padding:2px; }
    .srv-period-btn { background:none; border:none; color:var(--muted); font-size:.64rem; font-weight:600; padding:.25rem .55rem; border-radius:.3rem; cursor:pointer; transition:all .15s; font-family:'Inter',sans-serif; }
    .srv-period-btn:hover { color:var(--text); }
    .srv-period-btn.active { background:var(--accent); color:#fff; }
    .srv-graph-wrap { position:relative; }
    .srv-graph-tooltip {
      position:absolute; pointer-events:none; background:rgba(10,2,18,0.96); border:1px solid rgba(150,0,28,0.4);
      border-radius:.4rem; padding:.4rem .6rem; font-size:.68rem; color:var(--text); white-space:nowrap;
      box-shadow:0 4px 16px rgba(0,0,0,0.5); z-index:2; line-height:1.5;
    }
    .srv-graph-tooltip b { color:var(--accent); font-size:.88rem; }
    .srv-graph-tooltip span { color:var(--muted); font-size:.62rem; display:block; }
    .srv-graph-axis { display:flex; justify-content:space-between; margin-top:.35rem; font-size:.58rem; color:var(--muted); }
    .srv-heatmap-area { position:relative; }
    .srv-heatmap { display:flex; align-items:flex-end; gap:2px; height:60px; cursor:crosshair; }
    .srv-heatbar { flex:1; background:var(--accent); border-radius:2px 2px 0 0; min-height:2px; opacity:.55; transition:opacity .15s; position:relative; }
    .srv-heatbar:hover { opacity:1; }
    .srv-heatbar.peak { background:var(--gold); opacity:.95; box-shadow:0 0 8px var(--gold); }
    .srv-heat-labels { display:flex; justify-content:space-between; font-size:.55rem; color:var(--muted); margin-top:.25rem; margin-bottom:1.25rem; }

    .srv-players-list { columns:1; column-gap:1.5rem; }
    @media (min-width:481px) { .srv-players-list { columns:2; } }
    @media (min-width:700px) { .srv-players-list { columns:3; } }
    .srv-players-row {
      display:flex; align-items:center; justify-content:space-between; gap:.5rem;
      padding:.4rem 0; border-bottom:1px solid rgba(255,255,255,0.06); font-size:.82rem;
      break-inside:avoid;
    }
    .srv-players-row:last-child { border-bottom:none; }
    .srv-player-dot { width:.4rem; height:.4rem; border-radius:50%; flex-shrink:0; }
    .srv-player-link { text-decoration:none; display:flex; align-items:center; gap:.5rem; min-width:0; flex:1; }
    .srv-player-link:hover .srv-player-name { color:#fff; text-decoration:underline; }
    .srv-player-time { font-family:'Oswald',sans-serif; font-size:.72rem; color:var(--muted); white-space:nowrap; flex-shrink:0; text-align:right; }

    .srv-empty { color:var(--muted); font-size:.78rem; font-style:italic; text-align:center; padding:1rem 0; column-span:all; }

    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:rgba(8,0,14,0.4); }
    ::-webkit-scrollbar-thumb { background:rgba(130,0,24,0.5); border-radius:3px; }
    /* ── Mobile ── */
    @media (max-width:640px) {
      body { overflow-x:hidden; }
      .g-card { padding:1.1rem; }
      .srv-connect-btn, .srv-copy-btn { padding:.55rem .9rem; min-height:2.75rem; }
      .srv-section-title { font-size:.62rem; letter-spacing:.12em; }
      .glass-nav > div { padding:.6rem 1rem !important; }
    }
    @media (max-width:400px) {
      .g-card { padding:.9rem; }
      .srv-connect-btn { font-size:.72rem; }
      .srv-metric-val { font-size:1.05rem; }
    }
  </style>
</head>

<script src="/common.js"></script>
<script>
const API = '/api';
function getToken() { return localStorage.getItem('token') || sessionStorage.getItem('token'); }
// esc — defined in common.js
function fmtDuration(sec) {
  if (sec < 60) return `${sec}с`;
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
  return h > 0 ? `${h}ч ${m}м` : `${m}м`;
}

function applySiteBackground(bg) {
  bg = (bg || '').trim();
  if (!bg) return;
  document.body.style.backgroundImage = [
    'radial-gradient(ellipse at 15% 50%, rgba(80,0,130,0.14) 0%, transparent 55%)',
    'radial-gradient(ellipse at 85% 20%, rgba(150,0,28,0.10) 0%, transparent 50%)',
    'linear-gradient(rgba(8,0,14,0.72), rgba(8,0,14,0.72))',
    `url('${bg}')`,
  ].join(',');
  document.body.style.backgroundSize = 'auto,auto,auto,cover';
  document.body.style.backgroundPosition = 'center,center,center,center';
  document.body.style.backgroundAttachment = 'fixed,fixed,fixed,fixed';
}

(function() {
  const cached = (() => { try { return JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user')); } catch { return null; } })();
  if (cached) {
    document.getElementById('nav-profile-link') && (document.getElementById('nav-profile-link').style.display = '');
    document.getElementById('nav-login-link') && (document.getElementById('nav-login-link').style.display = 'none');
  }
  fetch('/api/auth/me', { credentials: 'include' }).then(r => {
    const profileLink = document.getElementById('nav-profile-link');
    const loginLink = document.getElementById('nav-login-link');
    if (r.ok) {
      if (profileLink) profileLink.style.display = '';
      if (loginLink) loginLink.style.display = 'none';
      loadNotifications();
      setInterval(loadNotifications, 60000);
    } else {
      localStorage.removeItem('user'); sessionStorage.removeItem('user');
      localStorage.removeItem('token'); sessionStorage.removeItem('token');
      if (profileLink) profileLink.style.display = 'none';
      if (loginLink) loginLink.style.display = '';
    }
  }).catch(() => {});
})();

let _wipeSettings = {};
let _baseTitle = 'V Rising — Сервера';
// _dateOpts, fmtDate — defined in common.js
let _onlineCounts = { 1: 0, 2: 0 };

function updatePageTitle() {
  const total = (_serverEnabled[1] ? _onlineCounts[1] : 0) + (_serverEnabled[2] ? _onlineCounts[2] : 0);
  document.title = total > 0 ? `🟢 ${total} онлайн — ${_baseTitle}` : _baseTitle;
}

(async function() {
  try {
    const d = await fetch(`${API}/settings/public`).then(r => r.json());
    const title = (d.site_title || 'V Rising').trim();
    _baseTitle = `${title} — Сервера`;
    document.title = _baseTitle;
    document.getElementById('nav-logo').textContent = '⚔ ' + title;
    applySiteBackground(d.bg_image_url);
    _wipeSettings = {
      1: { date: (d.wipe_date || '').trim(), type: d.wipe_type || 'full' },
      2: { date: (d.wipe_date2 || '').trim(), type: d.wipe_type2 || 'full' },
    };
    [1, 2].forEach(renderWipeChip);
    setInterval(() => [1, 2].forEach(renderWipeChip), 60000);
    window.__TZ = d.timezone || 'Europe/Moscow';
    window.__H12 = (d.time_format || '24h') === '12h';
    window.__DATEFMT = d.date_format || 'dd.mm.yyyy';
  } catch {}
})();

const WIPE_TYPE_LABELS = { full: 'Полный вайп', map: 'Вайп карты', progress: 'Вайп прогресса' };

function renderWipeChip(num) {
  const el = document.getElementById(`srv-wipe-${num}`);
  const w = _wipeSettings[num];
  if (!el || !w || !w.date) { if (el) el.style.display = 'none'; return; }
  const date = new Date(w.date);
  if (isNaN(date)) { el.style.display = 'none'; return; }
  const diff = date.getTime() - Date.now();
  const label = WIPE_TYPE_LABELS[w.type] || 'Вайп';
  if (diff <= 0) {
    el.textContent = `🗡 ${label}: сервер сброшен`;
    el.classList.remove('urgent');
  } else {
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    el.textContent = `🗡 ${label} через ${d}д ${h}ч`;
    el.classList.toggle('urgent', d < 7);
  }
  el.title = fmtDate(date.toISOString());
  el.style.display = 'inline-flex';
}

let _serverEnabled = { 1: true, 2: true };

let _connectInfo = {};

function setStat(id, text, color) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.classList.remove('skel');
  el.style.color = color || '';
}

function pingColor(ms) {
  if (ms == null) return null;
  if (ms <= 80) return 'var(--green)';
  if (ms <= 150) return 'var(--yellow)';
  return 'var(--red)';
}

function uptimeColor(pct) {
  if (pct == null) return null;
  if (pct >= 95) return 'var(--green)';
  if (pct >= 80) return 'var(--yellow)';
  return 'var(--red)';
}

async function loadServer(num) {
  const statusUrl = num === 1 ? `${API}/monitor/status` : `${API}/monitor/status2`;
  try {
    const d = await fetch(statusUrl).then(r => r.json());
    if (num === 2 && d.enabled === false) {
      _serverEnabled[2] = false;
      const card = document.getElementById(`srv-card-${num}`);
      if (card) card.style.display = 'none';
      return;
    }
    _serverEnabled[num] = true;
    const card = document.getElementById(`srv-card-${num}`);
    if (card) card.style.display = '';

    document.getElementById(`srv-name-${num}`).textContent = d.name || `Сервер ${num}`;
    const badge = document.getElementById(`srv-badge-${num}`);
    if (badge) {
      badge.className = 'srv-badge ' + (d.online ? 'on' : 'off');
      badge.innerHTML = `<span class="srv-dot${d.online ? ' pulse' : ''}"></span>${d.online ? 'Онлайн' : 'Офлайн'}`;
    }
    setStat(`srv-players-${num}`, `${d.players ?? 0}/${d.max_players ?? 0}`);
    setStat(`srv-ping-${num}`, d.latency_ms != null ? `${d.latency_ms} мс` : '—', pingColor(d.latency_ms));
    setStat(`srv-map-${num}`, d.map && d.map !== 'N/A' ? d.map : '—');
    setStat(`srv-version-${num}`, d.version && d.version !== 'N/A' ? d.version : '—');

    const capacity = document.getElementById(`srv-capacity-${num}`);
    if (capacity) {
      const pct = d.max_players > 0 ? Math.min(100, Math.round((d.players / d.max_players) * 100)) : 0;
      capacity.style.width = `${pct}%`;
    }

    const vacBadge = document.getElementById(`srv-vac-${num}`);
    if (vacBadge) {
      vacBadge.style.display = '';
      vacBadge.className = 'srv-vac-badge' + (d.vac ? '' : ' off');
      vacBadge.textContent = d.vac ? '🛡 VAC' : '🛡 VAC выкл';
    }

    _onlineCounts[num] = d.online ? (d.players ?? 0) : 0;

    const connectRow = document.getElementById(`srv-connect-${num}`);
    if (connectRow) {
      if (d.ip && d.game_port) {
        _connectInfo[num] = `${d.ip}:${d.game_port}`;
        connectRow.style.display = '';
      } else {
        connectRow.style.display = 'none';
      }
    }

    renderServerPlayers(num, d.players_list || []);
  } catch {
    const badge = document.getElementById(`srv-badge-${num}`);
    if (badge) { badge.className = 'srv-badge off'; badge.innerHTML = '<span class="srv-dot"></span>Ошибка'; }
  }
}

function connectServer(num) {
  const addr = _connectInfo[num];
  if (!addr) return;
  window.location.href = `steam://rungameid/1604030//+connect%20${addr}`;
}

function copyServerAddr(num, btn) {
  const addr = _connectInfo[num];
  if (!addr) return;
  navigator.clipboard.writeText(addr).then(() => {
    const original = btn.textContent;
    btn.textContent = '✔ Скопировано';
    setTimeout(() => { btn.textContent = original; }, 1500);
  });
}

function renderServerPlayers(num, players) {
  const el = document.getElementById(`srv-players-list-${num}`);
  if (!el) return;
  if (!players.length) {
    el.innerHTML = `<p class="srv-empty">Нет игроков онлайн</p>`;
    return;
  }
  const sorted = [...players].sort((a, b) => b.duration - a.duration);
  el.innerHTML = sorted.map(p => {
    const name = p.name || 'Аноним';
    const hue = name.split('').reduce((a, c) => a + c.charCodeAt(0), 0) % 55 + 330;
    return `<div class="srv-players-row">
      <a class="srv-player-link" href="/user.html?u=${encodeURIComponent(name)}" title="Профиль игрока">
        <span class="srv-player-dot" style="background:hsl(${hue},78%,55%);box-shadow:0 0 5px hsl(${hue},78%,55%);"></span>
        <span class="srv-player-name" style="font-family:'Philosopher',serif;color:#e6def2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .15s;">${esc(name)}</span>
      </a>
      <span class="srv-player-time">${fmtDuration(p.duration)}</span>
    </div>`;
  }).join('');
}

async function loadServerStats(num) {
  try {
    const s = await fetch(`${API}/monitor/stats?server=${num}`).then(r => r.json());
    setStat(`srv-uptime24-${num}`, s.uptime_24h != null ? `${s.uptime_24h}%` : '—', uptimeColor(s.uptime_24h));
    setStat(`srv-uptime7d-${num}`, s.uptime_7d != null ? `${s.uptime_7d}%` : '—', uptimeColor(s.uptime_7d));
    setStat(`srv-peak24-${num}`, s.peak_24h ?? '—');
    setStat(`srv-peak7d-${num}`, s.peak_7d ?? '—');

    const record = document.getElementById(`srv-record-${num}`);
    if (record && s.peak_alltime > 0) {
      const dateStr = s.peak_alltime_date
        ? fmtDate(s.peak_alltime_date)
        : null;
      record.textContent = `🏆 Рекорд онлайна: ${s.peak_alltime} ${_pluralPlayers(s.peak_alltime)}${dateStr ? ' · ' + dateStr : ''}`;
      record.style.display = 'flex';
    } else if (record) {
      record.style.display = 'none';
    }
  } catch {}
}

function _pluralPlayers(n) {
  const n10 = n % 10, n100 = n % 100;
  if (n10 === 1 && n100 !== 11) return 'игрок';
  if ([2, 3, 4].includes(n10) && ![12, 13, 14].includes(n100)) return 'игрока';
  return 'игроков';
}

const PERIOD_LABELS = { 1: 'сутки', 3: '3 дня', 7: '7 дней' };
let _heatHoverSetup = {};

function computeHourBuckets(snaps) {
  const sums = Array(24).fill(0);
  const counts = Array(24).fill(0);
  snaps.forEach(s => {
    const h = new Date(s.ts * 1000).getUTCHours();
    sums[h] += s.players;
    counts[h]++;
  });
  return sums.map((sum, hour) => ({ hour, count: counts[hour], avg: counts[hour] ? sum / counts[hour] : 0 }));
}

function drawHeatmap(num) {
  const wrap = document.getElementById(`srv-heatmap-wrap-${num}`);
  const el = document.getElementById(`srv-heatmap-${num}`);
  const titleEl = document.getElementById(`srv-heatmap-title-${num}`);
  if (!wrap || !el) return;

  const days = _graphPeriod[num] || 7;
  const cutoff = Date.now() / 1000 - days * 86400;
  const snaps = (_graphData[num] || []).filter(s => s.ts >= cutoff);
  const buckets = computeHourBuckets(snaps);

  if (!buckets.some(b => b.count > 0)) {
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = '';
  if (titleEl) titleEl.textContent = `Активность по часам (UTC, среднее за ${PERIOD_LABELS[days] || '7 дней'})`;

  const max = Math.max(...buckets.map(b => b.avg), 1);
  const peak = buckets.reduce((best, b) => b.avg > best.avg ? b : best, buckets[0]);
  const accentRgb = SERVER_THEMES[num].accentRgb;

  el.innerHTML = buckets.map(b => {
    const h = Math.max(2, Math.round((b.avg / max) * 60));
    const isPeak = b.avg > 0 && b.hour === peak.hour;
    const bg = isPeak ? '' : `background:linear-gradient(180deg, rgb(${accentRgb}), rgba(${accentRgb},0.25));`;
    return `<div class="srv-heatbar${isPeak ? ' peak' : ''}" data-hour="${b.hour}" data-avg="${b.avg.toFixed(1)}" data-count="${b.count}" style="height:${h}px;${bg}"></div>`;
  }).join('');

  setupHeatmapHover(num);
}

function setupHeatmapHover(num) {
  if (_heatHoverSetup[num]) return;
  _heatHoverSetup[num] = true;
  const el = document.getElementById(`srv-heatmap-${num}`);
  const tip = document.getElementById(`srv-heat-tip-${num}`);
  if (!el || !tip) return;

  const show = (bar) => {
    if (!bar) { tip.style.display = 'none'; return; }
    const hour = String(bar.dataset.hour).padStart(2, '0');
    tip.innerHTML = `<b>${bar.dataset.avg}</b> игроков<span>${hour}:00–${hour}:59 UTC</span>`;
    tip.style.display = 'block';
    const areaRect = el.parentElement.getBoundingClientRect();
    const barRect = bar.getBoundingClientRect();
    let left = barRect.left - areaRect.left + barRect.width / 2 - 50;
    left = Math.max(0, Math.min(left, areaRect.width - 105));
    tip.style.left = left + 'px';
    tip.style.top = '-46px';
  };

  el.addEventListener('mousemove', e => show(e.target.closest('.srv-heatbar')));
  el.addEventListener('mouseleave', () => show(null));
  el.addEventListener('touchstart', e => { const bar = e.target.closest('.srv-heatbar'); if (bar) show(bar); }, { passive: true });
}

let _graphData = {};
let _graphPeriod = { 1: 7, 2: 7 };
let _graphGeom = {};
let _hoverSetup = {};

async function loadServerGraph(num) {
  const canvas = document.getElementById(`srv-graph-${num}`);
  if (!canvas) return;
  try {
    _graphData[num] = await fetch(`${API}/monitor/snapshots?server=${num}`).then(r => r.ok ? r.json() : []);
  } catch {
    _graphData[num] = null;
  }
  drawGraph(num);
  drawHeatmap(num);
}

function setGraphPeriod(num, days, btn) {
  _graphPeriod[num] = days;
  const wrap = document.getElementById(`srv-period-${num}`);
  if (wrap) wrap.querySelectorAll('.srv-period-btn').forEach(b => b.classList.toggle('active', b === btn));
  drawGraph(num);
  drawHeatmap(num);
}

function drawGraph(num) {
  const canvas = document.getElementById(`srv-graph-${num}`);
  const empty  = document.getElementById(`srv-graph-empty-${num}`);
  const axis   = document.getElementById(`srv-graph-axis-${num}`);
  if (!canvas) return;

  if (_graphData[num] === null) {
    canvas.style.display = 'none';
    if (axis) axis.innerHTML = '';
    if (empty) { empty.style.display = ''; empty.textContent = 'Ошибка загрузки графика.'; }
    return;
  }

  const days = _graphPeriod[num] || 7;
  const cutoff = Date.now() / 1000 - days * 86400;
  const snaps = (_graphData[num] || []).filter(s => s.ts >= cutoff);

  if (!snaps.length) {
    canvas.style.display = 'none';
    if (axis) axis.innerHTML = '';
    if (empty) { empty.style.display = ''; empty.textContent = 'Нет данных за этот период.'; }
    return;
  }
  canvas.style.display = '';
  if (empty) empty.style.display = 'none';

  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth || canvas.parentElement.clientWidth;
  const h = 110;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const accent = SERVER_THEMES[num].accentRgb;
  const maxPlayers = Math.max(1, ...snaps.map(s => s.players));
  const padL = 4, padR = 4, padT = 8, padB = 4;
  const plotW = w - padL - padR, plotH = h - padT - padB;
  const tMin = snaps[0].ts, tMax = snaps[snaps.length - 1].ts;
  const tSpan = Math.max(1, tMax - tMin);
  const x = s => padL + ((s.ts - tMin) / tSpan) * plotW;
  const y = s => padT + plotH - (s.players / maxPlayers) * plotH;

  _graphGeom[num] = { snaps, x, y, padL, padT, plotW, plotH, w, h, accent };

  renderChart(num);
  renderAxisLabels(num, snaps, days);
  setupGraphHover(num);
}

function smoothPathTo(ctx, pts) {
  if (pts.length < 2) { if (pts.length === 1) ctx.lineTo(pts[0].x, pts[0].y); return; }
  for (let i = 1; i < pts.length - 1; i++) {
    const xc = (pts[i].x + pts[i + 1].x) / 2;
    const yc = (pts[i].y + pts[i + 1].y) / 2;
    ctx.quadraticCurveTo(pts[i].x, pts[i].y, xc, yc);
  }
  const last = pts.length - 1;
  ctx.quadraticCurveTo(pts[last - 1].x, pts[last - 1].y, pts[last].x, pts[last].y);
}

function renderChart(num) {
  const canvas = document.getElementById(`srv-graph-${num}`);
  const geom = _graphGeom[num];
  if (!canvas || !geom) return;
  const ctx = canvas.getContext('2d');
  const { snaps, x, y, padL, padT, plotW, plotH, w, h, accent } = geom;
  ctx.clearRect(0, 0, w, h);

  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  [0.25, 0.5, 0.75].forEach(f => {
    const gy = padT + plotH * f;
    ctx.beginPath();
    ctx.moveTo(padL, gy);
    ctx.lineTo(padL + plotW, gy);
    ctx.stroke();
  });

  const pts = snaps.map(s => ({ x: x(s), y: y(s) }));

  ctx.beginPath();
  ctx.moveTo(pts[0].x, padT + plotH);
  ctx.lineTo(pts[0].x, pts[0].y);
  smoothPathTo(ctx, pts);
  ctx.lineTo(pts[pts.length - 1].x, padT + plotH);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, padT, 0, padT + plotH);
  grad.addColorStop(0, `rgba(${accent},0.4)`);
  grad.addColorStop(1, `rgba(${accent},0.02)`);
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  smoothPathTo(ctx, pts);
  ctx.strokeStyle = `rgb(${accent})`;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.stroke();

  ctx.fillStyle = 'rgb(255,93,126)';
  snaps.forEach(s => { if (!s.online) { ctx.beginPath(); ctx.arc(x(s), padT + plotH - 1, 1.3, 0, Math.PI * 2); ctx.fill(); } });
}

function renderAxisLabels(num, snaps, days) {
  const axis = document.getElementById(`srv-graph-axis-${num}`);
  if (!axis) return;
  const tMin = snaps[0].ts, tMax = snaps[snaps.length - 1].ts;
  const count = days <= 1 ? 4 : 6;
  const labels = [];
  for (let i = 0; i <= count; i++) {
    const ts = tMin + (tMax - tMin) * (i / count);
    const d = new Date(ts * 1000);
    labels.push(days <= 1
      ? d.toLocaleTimeString('ru-RU', { timeZone:window.__TZ||'Europe/Moscow', hour12:!!(window.__H12), hour: '2-digit', minute: '2-digit' })
      : d.toLocaleDateString('ru-RU', { timeZone:window.__TZ||'Europe/Moscow', day: '2-digit', month: '2-digit' }));
  }
  axis.innerHTML = labels.map(l => `<span>${esc(l)}</span>`).join('');
}

function setupGraphHover(num) {
  if (_hoverSetup[num]) return;
  _hoverSetup[num] = true;
  const canvas = document.getElementById(`srv-graph-${num}`);
  if (!canvas) return;

  let raf = null;
  const move = (clientX) => {
    if (raf) return;
    raf = requestAnimationFrame(() => { raf = null; handleGraphHover(num, clientX); });
  };
  canvas.addEventListener('mousemove', e => move(e.clientX));
  canvas.addEventListener('mouseleave', () => hideGraphTooltip(num));
  canvas.addEventListener('touchmove', e => { if (e.touches[0]) move(e.touches[0].clientX); }, { passive: true });
  canvas.addEventListener('touchend', () => hideGraphTooltip(num));
}

function hideGraphTooltip(num) {
  const tip = document.getElementById(`srv-graph-tip-${num}`);
  if (tip) tip.style.display = 'none';
  renderChart(num);
}

function handleGraphHover(num, clientX) {
  const geom = _graphGeom[num];
  const canvas = document.getElementById(`srv-graph-${num}`);
  const tip = document.getElementById(`srv-graph-tip-${num}`);
  if (!geom || !canvas || !tip) return;
  const rect = canvas.getBoundingClientRect();
  const mx = clientX - rect.left;

  let nearest = geom.snaps[0], nd = Infinity;
  geom.snaps.forEach(s => {
    const dx = Math.abs(geom.x(s) - mx);
    if (dx < nd) { nd = dx; nearest = s; }
  });

  renderChart(num);
  const ctx = canvas.getContext('2d');
  const px = geom.x(nearest), py = geom.y(nearest);
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(px, geom.padT);
  ctx.lineTo(px, geom.padT + geom.plotH);
  ctx.stroke();
  ctx.fillStyle = `rgb(${geom.accent})`;
  ctx.beginPath();
  ctx.arc(px, py, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  const dateStr = new Date(nearest.ts * 1000).toLocaleString('ru-RU', { timeZone:window.__TZ||'Europe/Moscow', hour12:!!(window.__H12), day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
  tip.innerHTML = `<b>${nearest.players}</b> игроков<span>${dateStr}</span>${!nearest.online ? '<span style="color:var(--red);">офлайн</span>' : ''}`;
  tip.style.display = 'block';
  let left = px + 10;
  if (left + 120 > geom.w) left = px - 130;
  tip.style.left = Math.max(0, left) + 'px';
  tip.style.top = Math.max(0, py - 44) + 'px';
}

async function refreshAll() {
  await Promise.all([1, 2].map(loadServer));
  updatePageTitle();
}

async function init() {
  const wrap = document.getElementById('servers-wrap');
  wrap.innerHTML = srvCardSkeleton(1) + srvCardSkeleton(2);
  await refreshAll();
  [1, 2].filter(n => _serverEnabled[n]).forEach(num => { loadServerStats(num); loadServerGraph(num); });
}

init();
setInterval(refreshAll, 30000);
setInterval(() => [1, 2].filter(n => _serverEnabled[n]).forEach(num => { loadServerStats(num); loadServerGraph(num); }), 300000);
window.addEventListener('resize', () => [1, 2].filter(n => _serverEnabled[n]).forEach(drawGraph));

function toggleMobileNav() {
  const overlay = document.getElementById('mob-overlay');
  const drawer = document.getElementById('mob-drawer');
  const isOpen = drawer.classList.contains('open');
  drawer.classList.toggle('open', !isOpen);
  overlay.classList.toggle('open', !isOpen);
  document.body.style.overflow = isOpen ? '' : 'hidden';
}

// ── Notification bell ──────────────────────────────────────────────────────
let _notifOpen = false;
async function loadNotifications() {
  const res = await fetch('/api/notifications', {credentials:'include'});
  if (!res.ok) return;
  const d = await res.json();
  const wrap = document.getElementById('notif-bell-wrap');
  const cnt = document.getElementById('notif-count');
  const list = document.getElementById('notif-list');
  if (wrap) wrap.style.display = '';
  if (cnt) { cnt.textContent = d.unread; cnt.style.display = d.unread > 0 ? '' : 'none'; }
  if (list) {
    if (!d.items || !d.items.length) {
      list.innerHTML = '<div style="padding:1rem;text-align:center;font-size:.78rem;color:#9488a8;">Нет уведомлений</div>';
    } else {
      list.innerHTML = d.items.map(n => `
        <div style="padding:.65rem 1rem;border-bottom:1px solid rgba(150,0,28,0.1);background:${n.read?'transparent':'rgba(200,0,40,0.05)'};">
          <div style="font-size:.75rem;color:#e2d8f0;">
            ${n.type==='reply'?`<strong>@${esc(n.data?.from_username||'')}</strong> ответил на ваш комментарий`:'Новое уведомление'}
          </div>
          ${n.data?.preview ? `<div style="font-size:.68rem;color:#9488a8;margin-top:.2rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(n.data.preview)}</div>` : ''}
          ${n.data?.news_slug ? `<a href="/?news=${esc(n.data.news_slug)}" style="font-size:.65rem;color:#c8002a;text-decoration:none;">Перейти →</a>` : ''}
        </div>`).join('');
    }
  }
}
function toggleNotifPanel() {
  const panel = document.getElementById('notif-panel');
  _notifOpen = !_notifOpen;
  if (panel) panel.style.display = _notifOpen ? '' : 'none';
  if (_notifOpen) loadNotifications();
}
async function markAllNotifRead() {
  await fetch('/api/notifications/read-all', {method:'POST', credentials:'include'});
  const cnt = document.getElementById('notif-count');
  if (cnt) cnt.style.display = 'none';
  loadNotifications();
}
document.addEventListener('click', e => {
  if (_notifOpen && !e.target.closest('#notif-bell-wrap')) {
    _notifOpen = false;
    const panel = document.getElementById('notif-panel');
    if (panel) panel.style.display = 'none';
  }
});

</script>
