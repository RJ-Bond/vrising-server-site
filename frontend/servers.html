  <style>
    /* Base tokens in /theme.css; overrides below for this page's lighter surfaces/text. */
    :root {
      --card:    rgba(16,7,23,0.92);
      --panel:   rgba(255,255,255,0.035);
      --text:    #f5f0fb;
      --muted:   #b6a8d2;
      --green:   #2ee69b;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body {
      background:var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 50%, rgba(80,0,130,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(150,0,28,0.08) 0%, transparent 50%);
      background-attachment:fixed;
      font-family:'Inter',system-ui,sans-serif; color:var(--text); min-height:100vh;
    }
    /* nav + tooltips + base: /components.css */

    .g-card {
      background:var(--card); border:1px solid rgba(var(--accent-rgb,110,0,150),.28);
      border-radius:.875rem; backdrop-filter:blur(16px) saturate(1.2);
      box-shadow:0 4px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
      position:relative; padding:0; overflow:hidden;
      transition:box-shadow .3s;
    }
    .g-card:hover {
      box-shadow:0 6px 40px rgba(0,0,0,0.7), 0 0 28px rgba(var(--accent-rgb,110,0,150),.13), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .g-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,rgba(var(--accent-rgb,110,0,150),.7),var(--accent,rgba(200,0,45,0.5)),rgba(var(--accent-rgb,110,0,150),.7),transparent);
      z-index:1;
    }
    .g-card { animation:fade-up .4s ease both; }
    @keyframes digit-up { from { transform:translateY(100%); opacity:0; } to { transform:translateY(0); opacity:1; } }

    .srv-header-zone {
      padding:1.35rem 1.5rem 1.15rem;
      background:
        linear-gradient(135deg,
          rgba(var(--accent-rgb,110,0,150),.18) 0%,
          rgba(var(--accent-rgb,110,0,150),.06) 55%,
          transparent 100%),
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 14px,
          rgba(var(--accent-rgb,110,0,150),.025) 14px,
          rgba(var(--accent-rgb,110,0,150),.025) 15px
        );
      border-bottom:1px solid rgba(var(--accent-rgb,110,0,150),.18);
      position:relative;
      overflow:hidden;
    }
    .srv-header-zone::after {
      content:'';
      position:absolute;
      top:-40px; right:-40px;
      width:160px; height:160px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(var(--accent-rgb,110,0,150),.15) 0%, transparent 70%);
      pointer-events:none;
      animation: orb-drift 8s ease-in-out infinite alternate;
    }
    @keyframes orb-drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(-20px, 15px) scale(1.15); }
    }
    .g-card-body { padding:1.25rem 1.5rem 1.5rem; }

    .srv-head { display:flex; align-items:center; gap:.6rem; margin-bottom:1.1rem; flex-wrap:wrap; }
    .srv-icon { width:1.7rem; height:1.7rem; object-fit:contain; filter:drop-shadow(0 0 8px var(--accent)); flex-shrink:0; }
    .srv-name { font-family:'Philosopher',serif; font-weight:700; font-size:1.05rem; color:#ece3f7; flex:1; min-width:0; }
    .srv-badge-group { display:flex; align-items:center; gap:.35rem; flex-shrink:0; flex-wrap:wrap; }
    .srv-badge { font-size:.6rem; font-weight:700; letter-spacing:.04em; padding:.16rem .5rem; border-radius:9999px; display:inline-flex; align-items:center; gap:.3rem; }
    .srv-badge.on  { background:rgba(46,230,155,0.14); border:1px solid rgba(46,230,155,0.4); color:var(--green); }
    .srv-badge.off { background:rgba(255,93,126,0.14); border:1px solid rgba(255,93,126,0.4); color:var(--red); }
    .srv-dot { width:.4rem; height:.4rem; border-radius:50%; background:currentColor; box-shadow:0 0 8px currentColor; }
    .srv-dot.pulse { animation:srv-pulse 1.6s ease-in-out infinite; }
    @keyframes srv-pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    .srv-vac-badge {
      font-size:.6rem; font-weight:700; letter-spacing:.04em; padding:.16rem .5rem; border-radius:9999px;
      display:inline-flex; align-items:center; gap:.3rem;
      background:rgba(46,230,155,0.1); border:1px solid rgba(46,230,155,0.3); color:var(--green);
    }
    .srv-vac-badge.off { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.1); color:var(--muted); }

    .srv-capacity-track { height:6px; background:rgba(255,255,255,0.08); border-radius:9999px; overflow:hidden; margin-top:.5rem; }
    .srv-capacity-fill { height:100%; border-radius:9999px; background:linear-gradient(90deg, var(--accent), rgba(var(--accent-rgb,110,0,150),.6)); transition:width .7s cubic-bezier(.4,0,.2,1); box-shadow:0 0 8px rgba(var(--accent-rgb,110,0,150),.5); }

    .srv-record {
      font-size:.72rem; color:var(--gold); display:flex; align-items:center; gap:.4rem;
      margin-bottom:1.25rem; padding:.5rem .75rem; background:var(--panel);
      border:1px solid rgba(201,169,74,0.2); border-radius:.5rem;
    }

    @keyframes skel-shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    .skel {
      background: linear-gradient(
        90deg,
        rgba(255,255,255,0.04) 25%,
        rgba(255,255,255,0.12) 50%,
        rgba(255,255,255,0.04) 75%
      );
      background-size: 200% 100%;
      animation: skel-shimmer 1.6s ease-in-out infinite;
      color: transparent !important;
      border-radius: 4px;
    }

    .srv-wipe-banner {
      padding:.85rem 1.25rem .95rem 1.4rem;
      border-top:1px solid transparent;
      border-bottom:1px solid transparent;
      border-left:3px solid transparent;
      position:relative;
      cursor:default;
    }
    @keyframes wipe-crit-pulse {
      0%,100% { box-shadow:none; }
      50%      { box-shadow:inset 0 0 0 1px rgba(255,60,60,.35), 0 0 18px rgba(255,60,60,.08); }
    }
    .srv-wipe-banner.critical { animation:wipe-crit-pulse 1.8s ease-in-out infinite; }
    .wipe-digit-val { display:inline-block; transition:transform .12s ease, opacity .12s ease; transform-origin:50% 50%; }

    .srv-connect-row { display:flex; gap:.6rem; margin-bottom:1.25rem; }
    .srv-connect-btn {
      flex:1; background:linear-gradient(135deg,var(--accent),rgba(var(--accent-rgb,110,0,150),.7)); border:none; color:#fff;
      font-size:.78rem; font-weight:700; padding:.6rem 1rem; border-radius:.55rem; cursor:pointer;
      box-shadow:0 2px 16px rgba(var(--accent-rgb,110,0,150),.35); transition:transform .15s, box-shadow .2s;
      display:inline-flex; align-items:center; justify-content:center; gap:.45rem;
    }
    .srv-connect-btn:hover { transform:translateY(-1px); box-shadow:0 4px 28px rgba(var(--accent-rgb,110,0,150),.55); }
    .srv-copy-btn {
      background:var(--panel); border:1px solid rgba(255,255,255,0.12); color:var(--muted);
      border-radius:.55rem; padding:.6rem .9rem; font-size:.78rem; cursor:pointer; transition:all .2s;
    }
    .srv-copy-btn:hover { color:var(--text); border-color:rgba(150,50,200,0.5); }

    .srv-metrics {
      display:grid; grid-template-columns:repeat(4,1fr);
      background:var(--panel); border:1px solid rgba(255,255,255,0.08);
      border-radius:.75rem; margin-bottom:1.25rem; overflow:hidden;
    }
    .srv-metric {
      text-align:center; padding:.85rem .4rem;
      border-right:1px solid rgba(255,255,255,0.07);
      border-bottom:1px solid rgba(255,255,255,0.07);
      transition: background .2s, box-shadow .2s;
      cursor:default;
      position: relative;
    }
    .srv-metric:hover {
      background: rgba(var(--accent-rgb, 110,0,150), 0.08);
      box-shadow: inset 0 0 0 1px rgba(var(--accent-rgb, 110,0,150), 0.2);
    }
    .srv-metric::after {
      content:'';
      position:absolute;
      top:0; left:0; right:0; height:2px;
      background:rgba(var(--accent-rgb,110,0,150),0);
      transition:background .2s;
    }
    .srv-metric:hover::after {
      background:rgba(var(--accent-rgb,110,0,150),.35);
    }
    .srv-metric:nth-child(4n) { border-right:none; }
    .srv-metric:nth-child(n+5) { border-bottom:none; }
    .srv-metric-val {
      font-family:'Oswald',sans-serif; font-size:1.2rem; font-weight:600;
      color:#fff; line-height:1; font-variant-numeric:tabular-nums;
      transition: color .3s, text-shadow .3s;
    }
    .srv-metric:hover .srv-metric-val {
      text-shadow: 0 0 12px rgba(var(--accent-rgb,110,0,150),.6);
    }
    .srv-metric-lbl { font-size:.58rem; color:var(--label); font-weight:600; text-transform:uppercase; letter-spacing:.07em; margin-top:.35rem; }

    @media (max-width:680px) {
      .srv-metrics { grid-template-columns:repeat(2,1fr); }
      .srv-metric:nth-child(4n) { border-right:1px solid rgba(255,255,255,0.07); }
      .srv-metric:nth-child(2n) { border-right:none; }
      .srv-metric:nth-child(n+5) { border-bottom:1px solid rgba(255,255,255,0.07); }
      .srv-metric:nth-last-child(-n+2) { border-bottom:none; }
    }

    .srv-section-title { font-family:'Cinzel',serif; font-size:.68rem; letter-spacing:.14em; color:var(--gold); text-transform:uppercase; margin-bottom:.6rem; }
    .srv-divider { height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent); margin:1.25rem 0; }

    .srv-graph-card { margin-bottom:1.25rem; }
    .srv-graph-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:.6rem; }
    .srv-period-toggle { display:flex; gap:.2rem; background:rgba(8,0,16,0.5); border-radius:.4rem; padding:2px; }
    .srv-period-btn { background:none; border:none; color:var(--muted); font-size:.64rem; font-weight:600; padding:.25rem .55rem; border-radius:.3rem; cursor:pointer; transition:all .15s; font-family:'Inter',sans-serif; }
    .srv-period-btn:hover { color:var(--text); }
    .srv-period-btn.active { background:var(--accent); color:#fff; }
    .srv-graph-wrap { position:relative; }
    .srv-live-dot {
      position:absolute; width:8px; height:8px; border-radius:50%;
      background:var(--accent); pointer-events:none; transform:translate(-50%,-50%);
      box-shadow:0 0 0 0 var(--accent); z-index:3; display:none;
      animation:live-pulse 2.4s ease-out infinite;
    }
    @keyframes live-pulse {
      0%   { box-shadow:0 0 0 0 rgba(var(--accent-rgb),.7); }
      70%  { box-shadow:0 0 0 8px rgba(var(--accent-rgb),0); }
      100% { box-shadow:0 0 0 0 rgba(var(--accent-rgb),0); }
    }
    .srv-graph-tooltip {
      position:absolute; pointer-events:none; background:rgba(10,2,18,0.96); border:1px solid rgba(150,0,28,0.4);
      border-radius:.4rem; padding:.4rem .6rem; font-size:.68rem; color:var(--text); white-space:nowrap;
      box-shadow:0 4px 16px rgba(0,0,0,0.5); z-index:2; line-height:1.5;
    }
    .srv-graph-tooltip b { color:var(--accent); font-size:.88rem; }
    .srv-graph-tooltip span { color:var(--muted); font-size:.62rem; display:block; }
    .srv-graph-axis { display:flex; justify-content:space-between; margin-top:.35rem; font-size:.58rem; color:var(--muted); }
    .srv-heatmap-area { position:relative; }
    .srv-heatmap { display:flex; align-items:flex-end; gap:2px; height:60px; cursor:crosshair; }
    .srv-heatbar { flex:1; background:var(--accent); border-radius:2px 2px 0 0; min-height:2px; opacity:.55; transition:opacity .15s; position:relative; }
    .srv-heatbar:hover { opacity:1; }
    .srv-heatbar.peak { background:var(--gold); opacity:.95; box-shadow:0 0 8px var(--gold); }
    .srv-heat-labels { display:flex; justify-content:space-between; font-size:.55rem; color:var(--muted); margin-top:.25rem; margin-bottom:1.25rem; }

    .srv-players-list { columns:1; column-gap:1.5rem; }
    @media (min-width:481px) { .srv-players-list { columns:2; } }
    @media (min-width:700px) { .srv-players-list { columns:3; } }
    .srv-players-row {
      display:flex; align-items:center; justify-content:space-between; gap:.5rem;
      padding:.4rem 0; border-bottom:1px solid rgba(255,255,255,0.06); font-size:.82rem;
      break-inside:avoid;
    }
    .srv-players-row:last-child { border-bottom:none; }
    .srv-player-dot { width:.4rem; height:.4rem; border-radius:50%; flex-shrink:0; }
    .srv-player-link { text-decoration:none; display:flex; align-items:center; gap:.5rem; min-width:0; flex:1; }
    .srv-player-link:hover .srv-player-name { color:#fff; text-decoration:underline; }
    .srv-player-time { font-family:'Oswald',sans-serif; font-size:.72rem; color:var(--muted); white-space:nowrap; flex-shrink:0; text-align:right; }

    .srv-empty { color:var(--muted); font-size:.78rem; font-style:italic; text-align:center; padding:1rem 0; column-span:all; }

    /* ── Mobile ── */
    @media (max-width:640px) {
      body { overflow-x:hidden; }
      .srv-header-zone { padding:1.1rem 1.1rem .9rem; }
      .g-card-body { padding:1rem 1.1rem 1.25rem; }
      .srv-connect-btn, .srv-copy-btn { padding:.55rem .9rem; min-height:2.75rem; }
      .srv-section-title { font-size:.62rem; letter-spacing:.12em; }
      .glass-nav > div { padding:.6rem 1rem !important; }
      /* Prevent iOS Safari zoom-on-focus for the player-compare search input. */
      input, textarea, select { font-size:16px !important; }
    }
    @media (max-width:400px) {
      .srv-header-zone { padding:.9rem .9rem .8rem; }
      .g-card-body { padding:.9rem .9rem 1.1rem; }
      .srv-connect-btn { font-size:.72rem; }
      .srv-metric-val { font-size:1.05rem; }
    }
    .srv-cal-cell {
      width:14px; height:14px; border-radius:2px; cursor:pointer;
      transition:opacity .15s; flex-shrink:0;
    }
    .srv-cal-cell:hover { opacity:.75; }

    /* ── 1. Flip-clock ── */
    .flip-digit {
      display: inline-block;
      position: relative;
      width: 2.1rem; height: 2.4rem;
      perspective: 200px;
    }
    .flip-digit-top, .flip-digit-bot {
      position: absolute; left:0; right:0; height:50%;
      overflow: hidden;
      background: rgba(20,8,32,0.85);
      border: 1px solid rgba(255,255,255,0.07);
    }
    .flip-digit-top { top:0; border-radius:.3rem .3rem 0 0; border-bottom: 1px solid rgba(0,0,0,0.4); }
    .flip-digit-bot { bottom:0; border-radius:0 0 .3rem .3rem; align-items:flex-end; display:flex; }
    .flip-digit-top span, .flip-digit-bot span {
      display:block; width:100%; text-align:center;
      font-family:'Oswald',sans-serif; font-weight:700; line-height:1;
    }
    .flip-digit-top span { padding-top:.18rem; }
    .flip-digit-bot span { padding-bottom:.18rem; }
    .flip-anim-top {
      position:absolute; top:0; left:0; right:0; height:50%;
      overflow:hidden; border-radius:.3rem .3rem 0 0;
      transform-origin: bottom center;
      animation: flip-top .18s ease-in forwards;
      background: rgba(20,8,32,0.95);
      border: 1px solid rgba(255,255,255,0.07);
      z-index:2;
    }
    .flip-anim-bot {
      position:absolute; bottom:0; left:0; right:0; height:50%;
      overflow:hidden; border-radius:0 0 .3rem .3rem;
      transform-origin: top center;
      transform: rotateX(-90deg);
      animation: flip-bot .18s .17s ease-out forwards;
      background: rgba(20,8,32,0.95);
      border: 1px solid rgba(255,255,255,0.07);
      z-index:2; display:flex; align-items:flex-end;
    }
    .flip-anim-top span { padding-top:.18rem; }
    .flip-anim-bot span { padding-bottom:.18rem; }
    @keyframes flip-top { to { transform: rotateX(90deg); } }
    @keyframes flip-bot { to { transform: rotateX(0deg); } }

    /* ── 3. Player hover-card ── */
    .player-hovercard {
      position:fixed; z-index:9999; pointer-events:none;
      background:rgba(10,2,20,0.97); border:1px solid rgba(150,0,28,0.4);
      border-radius:.65rem; padding:.75rem 1rem;
      box-shadow:0 8px 32px rgba(0,0,0,0.7), 0 0 20px rgba(var(--hc-rgb,110,0,150),0.15);
      min-width:160px; opacity:0; transition:opacity .15s;
      font-family:'Inter',sans-serif;
    }
    .player-hovercard.visible { opacity:1; }
    .player-hc-avatar {
      width:36px; height:36px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:1.1rem; font-weight:700; color:#fff; margin-bottom:.5rem;
      flex-shrink:0;
    }
    .player-hc-session-bar {
      height:3px; border-radius:2px; background:rgba(255,255,255,0.08);
      margin-top:.4rem; overflow:hidden;
    }
    .player-hc-session-fill {
      height:100%; border-radius:2px;
      transition:width .4s ease;
    }

    /* ── 5. Stagger metrics ── */
    .srv-metric { opacity:0; animation: metric-appear .35s ease both; }
    @keyframes metric-appear {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>

<script>
const API = '/api';
function getToken() { return localStorage.getItem('token') || sessionStorage.getItem('token'); }
// esc — defined in common.js
function fmtDuration(sec) {
  if (sec < 60) return `${sec}с`;
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
  return h > 0 ? `${h}ч ${m}м` : `${m}м`;
}

function _timeAgoShort(ts) {
  const diff = (Date.now() - ts) / 1000;
  if (diff < 60) return 'только что';
  if (diff < 3600) return `${Math.floor(diff / 60)}м назад`;
  return `${Math.floor(diff / 3600)}ч назад`;
}

function applySiteBackground(bg) {
  bg = (bg || '').trim();
  if (!bg) return;
  document.body.style.backgroundImage = [
    'radial-gradient(ellipse at 15% 50%, rgba(80,0,130,0.14) 0%, transparent 55%)',
    'radial-gradient(ellipse at 85% 20%, rgba(150,0,28,0.10) 0%, transparent 50%)',
    'linear-gradient(rgba(8,0,14,0.72), rgba(8,0,14,0.72))',
    `url('${bg}')`,
  ].join(',');
  document.body.style.backgroundSize = 'auto,auto,auto,cover';
  document.body.style.backgroundPosition = 'center,center,center,center';
  document.body.style.backgroundAttachment = 'fixed,fixed,fixed,fixed';
}

(function() {
  const cached = (() => { try { return JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user')); } catch { return null; } })();
  if (cached) {
    document.getElementById('nav-profile-link') && (document.getElementById('nav-profile-link').style.display = '');
    document.getElementById('nav-login-link') && (document.getElementById('nav-login-link').style.display = 'none');
  }
  fetch('/api/auth/me', { credentials: 'include' }).then(r => {
    const profileLink = document.getElementById('nav-profile-link');
    const loginLink = document.getElementById('nav-login-link');
    if (r.ok) {
      if (profileLink) profileLink.style.display = '';
      if (loginLink) loginLink.style.display = 'none';
      loadNotifications();
      setInterval(loadNotifications, 60000);
    } else {
      localStorage.removeItem('user'); sessionStorage.removeItem('user');
      localStorage.removeItem('token'); sessionStorage.removeItem('token');
      if (profileLink) profileLink.style.display = 'none';
      if (loginLink) loginLink.style.display = '';
    }
  }).catch(() => {});
})();

let _wipeSettings = {};
let _baseTitle = 'V Rising — Сервера';
// _dateOpts, fmtDate — defined in common.js
let _onlineCounts = { 1: 0, 2: 0 };
let _prevPlayerNames = { 1: null, 2: null };
let _playersData = { 1: [], 2: [] };
let _playersSortBy = { 1: 'time', 2: 'time' };
let _compareMode = false;
let _eventQueue = [];
let _eventShowing = false;
let _graphZoom = {};
let _recentDeparted = { 1: [], 2: [] };
let _serverNames = { 1: 'Сервер 1', 2: 'Сервер 2' };

function updatePageTitle() {
  const total = (_serverEnabled[1] ? _onlineCounts[1] : 0) + (_serverEnabled[2] ? _onlineCounts[2] : 0);
  document.title = total > 0 ? `🟢 ${total} онлайн — ${_baseTitle}` : _baseTitle;
}

(async function() {
  try {
    const d = await (window.getSettings?.() ?? fetch(`${API}/settings/public`).then(r => r.json()));
    const title = (d.site_title || 'V Rising').trim();
    _baseTitle = `${title} — Сервера`;
    document.title = _baseTitle;
    applySiteBackground(d.bg_image_url);
    _wipeSettings = {
      1: { date: (d.wipe_date || '').trim(), type: d.wipe_type || 'full' },
      2: { date: (d.wipe_date2 || '').trim(), type: d.wipe_type2 || 'full' },
    };
    loadWipeHistory().then(() => [1, 2].forEach(renderWipeChip));
    setInterval(() => [1, 2].forEach(tickWipeCountdown), 1000);
    window.__TZ = d.timezone || 'Europe/Moscow';
    window.__H12 = (d.time_format || '24h') === '12h';
    window.__DATEFMT = d.date_format || 'dd.mm.yyyy';
  } catch {}
})();

const WIPE_TYPE_LABELS = { full: 'Полный вайп', map: 'Вайп карты', progress: 'Вайп прогресса' };
let _wipeHistory = {};

async function loadWipeHistory() {
  try {
    const wipes = await fetch('/api/wipes').then(r => r.json());
    _wipeHistory = {};
    wipes.forEach(w => {
      if (!_wipeHistory[w.server_num]) _wipeHistory[w.server_num] = [];
      _wipeHistory[w.server_num].push(w);
    });
  } catch {}
}

function getPrevWipe(num) {
  const now = Date.now();
  return (_wipeHistory[num] || []).find(w => new Date(w.wipe_date).getTime() < now) || null;
}

function _wipeTypeRgb(type) {
  return type === 'map' ? '201,169,74' : type === 'progress' ? '153,85,238' : '200,0,42';
}

function _wipeDigitEl(id, lbl, big = true) {
  const sz = big ? '1.7rem' : '1.1rem';
  const mw = big ? '2.1rem' : '1.6rem';
  return `<div style="text-align:center;min-width:${mw};">
    <span class="wipe-digit-val" id="${id}" data-big="${big}" style="font-family:'Oswald',sans-serif;font-size:${sz};font-weight:700;line-height:1;color:#e8ddf5;">00</span>
    <div style="font-size:.44rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-top:.1rem;">${lbl}</div>
  </div>`;
}

function _wipeDigitSep(small) {
  return `<div style="font-family:'Oswald',sans-serif;font-size:${small?'.9rem':'1.2rem'};color:var(--muted);padding-bottom:.15rem;line-height:1;opacity:.35;">:</div>`;
}

function renderWipeChip(num) {
  const el = document.getElementById(`srv-wipe-${num}`);
  const w = _wipeSettings[num];
  if (!el || !w || !w.date) { if (el) el.style.display = 'none'; return; }
  const date = new Date(w.date);
  if (isNaN(date)) { el.style.display = 'none'; return; }
  const diff = date.getTime() - Date.now();
  const label   = WIPE_TYPE_LABELS[w.type] || 'Вайп';
  const rgb     = _wipeTypeRgb(w.type);
  const accentRgb = SERVER_THEMES[num].accentRgb;
  const icon    = w.type === 'map' ? '🗺️' : w.type === 'progress' ? '🔮' : '⚰️';
  const dateStr = date.toLocaleDateString('ru-RU', {day:'2-digit',month:'2-digit',year:'2-digit'});
  const weekday = date.toLocaleDateString('ru-RU', {weekday:'long'});
  const timeStr = date.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});

  // Frame (border/background) follows the server's own accent; the badge/icon below keeps the wipe-type color.
  el.style.borderTopColor    = `rgba(${accentRgb},.18)`;
  el.style.borderBottomColor = `rgba(${accentRgb},.1)`;
  el.style.borderLeftColor   = `rgba(${accentRgb},.75)`;
  el.title = `${weekday}, ${dateStr} в ${timeStr}`;

  if (diff <= 0) {
    el.innerHTML = `
      <div style="display:flex;align-items:center;gap:.55rem;">
        <span style="font-size:.95rem;opacity:.55;">${icon}</span>
        <div>
          <div style="font-size:.58rem;text-transform:uppercase;letter-spacing:.12em;font-weight:700;color:rgba(${rgb},1);">${label}</div>
          <div style="font-size:.64rem;color:var(--muted);margin-top:.1rem;">Сервер сброшен · ${dateStr}</div>
        </div>
      </div>`;
    el.style.background = `linear-gradient(135deg,rgba(${accentRgb},.06) 0%,rgba(${accentRgb},.01) 65%)`;
    el.classList.remove('critical');
    el.style.display = 'block';
    return;
  }

  const prev = getPrevWipe(num);
  const prevLine = prev ? (() => {
    const d = Math.floor((Date.now() - new Date(prev.wipe_date).getTime()) / 86400000);
    const rel = d === 0 ? 'сегодня' : d === 1 ? 'вчера' : `${d} дн. назад`;
    return `<div style="font-size:.54rem;color:var(--muted);margin-top:.45rem;opacity:.7;">⏪ Прошлый вайп: ${rel}</div>`;
  })() : '';

  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:.45rem;margin-bottom:.5rem;">
      <span style="font-size:.92rem;">${icon}</span>
      <span style="font-size:.57rem;text-transform:uppercase;letter-spacing:.12em;font-weight:700;color:rgba(${rgb},1);">${label}</span>
      <span style="font-size:.56rem;color:var(--muted);margin-left:auto;">📅 ${dateStr}</span>
    </div>
    <div style="display:flex;align-items:flex-end;gap:.28rem;">
      ${_wipeDigitEl(`wd-d-${num}`,'дней')}
      ${_wipeDigitSep(false)}
      ${_wipeDigitEl(`wd-h-${num}`,'часов')}
      ${_wipeDigitSep(false)}
      ${_wipeDigitEl(`wd-m-${num}`,'минут')}
      ${_wipeDigitSep(true)}
      ${_wipeDigitEl(`wd-s-${num}`,'сек',false)}
    </div>
    ${prevLine}
    <div style="position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,0.05);">
      <div id="wd-prog-${num}" style="height:100%;width:0%;background:rgba(${accentRgb},.6);transition:width .8s ease;border-radius:0 1px 1px 0;"></div>
    </div>`;

  el.style.display = 'block';
  tickWipeCountdown(num);
}

function _setWipeDigit(id, val, color, glow) {
  const el = document.getElementById(id);
  if (!el) return;
  const str = String(val).padStart(2, '0');
  const fontSize = el.dataset.big === 'false' ? '1.1rem' : '1.7rem';

  if (!el._flipInitialized) {
    el._flipInitialized = true;
    el._flipVal = str;
    el.innerHTML = `
      <div class="flip-digit">
        <div class="flip-digit-top"><span style="font-size:${fontSize};color:${color};">${str}</span></div>
        <div class="flip-digit-bot"><span style="font-size:${fontSize};color:${color};">${str}</span></div>
      </div>`;
    return;
  }
  if (el._flipVal === str) {
    el.querySelectorAll('.flip-digit-top span, .flip-digit-bot span').forEach(s => { s.style.color = color; });
    return;
  }
  const oldVal = el._flipVal;
  el._flipVal = str;

  const digit = el.querySelector('.flip-digit');
  if (!digit) return;

  digit.querySelectorAll('.flip-anim-top, .flip-anim-bot').forEach(e => e.remove());

  digit.querySelector('.flip-digit-bot span').textContent = str;
  digit.querySelector('.flip-digit-bot span').style.color = color;

  const animTop = document.createElement('div');
  animTop.className = 'flip-anim-top';
  animTop.innerHTML = `<span style="font-size:${fontSize};color:${color};width:100%;text-align:center;display:block;padding-top:.18rem;">${oldVal}</span>`;
  digit.appendChild(animTop);

  const animBot = document.createElement('div');
  animBot.className = 'flip-anim-bot';
  animBot.innerHTML = `<span style="font-size:${fontSize};color:${color};width:100%;text-align:center;display:block;padding-bottom:.18rem;">${str}</span>`;
  digit.appendChild(animBot);

  animTop.addEventListener('animationend', () => {
    digit.querySelector('.flip-digit-top span').textContent = str;
    digit.querySelector('.flip-digit-top span').style.color = color;
    animTop.remove();
  });
  animBot.addEventListener('animationend', () => animBot.remove());
}

function tickWipeCountdown(num) {
  const w = _wipeSettings[num];
  const el = document.getElementById(`srv-wipe-${num}`);
  if (!w || !w.date || !el || el.style.display === 'none') return;
  const date = new Date(w.date);
  const diff = date.getTime() - Date.now();
  if (diff <= 0) return;

  const rgb       = _wipeTypeRgb(w.type);
  const accentRgb = SERVER_THEMES[num].accentRgb;
  const urgent  = diff < 86400000;
  const colored = diff < 7 * 86400000;
  const col     = colored ? `rgb(${rgb})` : '#e8ddf5';
  const alpha   = urgent ? '.18' : colored ? '.13' : '.08';

  // Background follows the server accent; only the countdown digits flash the wipe-type color as an urgency cue.
  el.style.background = `linear-gradient(135deg,rgba(${accentRgb},${alpha}) 0%,rgba(${accentRgb},.01) 65%)`;
  el.classList.toggle('critical', urgent);

  const dd = Math.floor(diff / 86400000);
  const hh = Math.floor((diff % 86400000) / 3600000);
  const mm = Math.floor((diff % 3600000) / 60000);
  const ss = Math.floor((diff % 60000) / 1000);

  _setWipeDigit(`wd-d-${num}`, dd, col, urgent);
  _setWipeDigit(`wd-h-${num}`, hh, col, urgent);
  _setWipeDigit(`wd-m-${num}`, mm, col, urgent);
  // seconds: no flip, always update
  const secEl = document.getElementById(`wd-s-${num}`);
  if (secEl) { secEl.textContent = String(ss).padStart(2,'0'); secEl.style.color = 'var(--muted)'; }

  // Progress bar
  const prev = getPrevWipe(num);
  if (prev) {
    const prevTs = new Date(prev.wipe_date).getTime();
    const pct = Math.min(100, Math.max(0, (Date.now() - prevTs) / (date.getTime() - prevTs) * 100));
    const prog = document.getElementById(`wd-prog-${num}`);
    if (prog) prog.style.width = pct.toFixed(1) + '%';
  }
}

const SERVER_THEMES = {
  1: { accent: '#e05575', accentRgb: '224,85,117' },
  2: { accent: '#9955ee', accentRgb: '153,85,238' },
};

let _serverEnabled = { 1: true, 2: true };

let _connectInfo = {};

function animateCounter(el, newText) {
  if (el.dataset.val === newText) return;
  el.dataset.val = newText;
  const wrapper = document.createElement('span');
  wrapper.style.cssText = 'overflow:hidden;display:inline-block;vertical-align:bottom;';
  const span = document.createElement('span');
  span.textContent = newText;
  span.style.cssText = 'display:block;animation:digit-up 0.35s cubic-bezier(0.4,0,0.2,1) both;';
  wrapper.appendChild(span);
  el.innerHTML = '';
  el.appendChild(wrapper);
  span.addEventListener('animationend', () => {
    el.textContent = newText;
    el.dataset.val = newText;
  }, { once: true });
}

function setStat(id, text, color) {
  const el = document.getElementById(id);
  if (!el) return;
  if (id.includes('srv-players-')) {
    animateCounter(el, text);
  } else {
    el.textContent = text;
  }
  el.classList.remove('skel');
  el.style.color = color || '';
}

function pingColor(ms) {
  if (ms == null) return null;
  if (ms <= 80) return 'var(--green)';
  if (ms <= 150) return 'var(--yellow)';
  return 'var(--red)';
}

function uptimeColor(pct) {
  if (pct == null) return null;
  if (pct >= 95) return 'var(--green)';
  if (pct >= 80) return 'var(--yellow)';
  return 'var(--red)';
}

async function loadServer(num) {
  const statusUrl = num === 1 ? `${API}/monitor/status` : `${API}/monitor/status2`;
  try {
    const d = await fetch(statusUrl).then(r => r.json());
    if (num === 2 && d.enabled === false) {
      _serverEnabled[2] = false;
      const card = document.getElementById(`srv-card-${num}`);
      if (card) card.style.display = 'none';
      return;
    }
    _serverEnabled[num] = true;
    const card = document.getElementById(`srv-card-${num}`);
    if (card) card.style.display = '';

    document.getElementById(`srv-name-${num}`).textContent = d.name || `Сервер ${num}`;
    _serverNames[num] = d.name || `Сервер ${num}`;
    const badge = document.getElementById(`srv-badge-${num}`);
    if (badge) {
      badge.className = 'srv-badge ' + (d.online ? 'on' : 'off');
      badge.innerHTML = `<span class="srv-dot${d.online ? ' pulse' : ''}"></span>${d.online ? 'Онлайн' : 'Офлайн'}`;
    }
    setStat(`srv-players-${num}`, `${d.players ?? 0}/${d.max_players ?? 0}`);
    updateOnlineContext(num, d.players ?? 0, !!d.online);
    setStat(`srv-ping-${num}`, d.latency_ms != null ? `${d.latency_ms} мс` : '—', pingColor(d.latency_ms));
    setStat(`srv-map-${num}`, d.map && d.map !== 'N/A' ? d.map : '—');
    setStat(`srv-version-${num}`, d.version && d.version !== 'N/A' ? d.version : '—');

    const arc = document.getElementById(`srv-gauge-arc-${num}`);
    const pctEl = document.getElementById(`srv-gauge-pct-${num}`);
    const pct = d.max_players > 0 ? Math.min(100, Math.round((d.players / d.max_players) * 100)) : 0;
    if (arc) {
      arc.style.strokeDashoffset = 113.1 * (1 - pct / 100);
      const color = pct >= 80 ? '200,0,42' : pct >= 50 ? '201,169,74' : SERVER_THEMES[num].accentRgb;
      arc.style.stroke = `rgba(${color},0.85)`;
    }
    if (pctEl) pctEl.textContent = pct + '%';

    const vacBadge = document.getElementById(`srv-vac-${num}`);
    if (vacBadge) {
      vacBadge.style.display = '';
      vacBadge.className = 'srv-vac-badge' + (d.vac ? '' : ' off');
      vacBadge.textContent = d.vac ? '🛡 VAC' : '🛡 VAC выкл';
    }

    _onlineCounts[num] = d.online ? (d.players ?? 0) : 0;

    const connectRow = document.getElementById(`srv-connect-${num}`);
    if (connectRow) {
      if (d.ip && d.game_port) {
        _connectInfo[num] = `${d.ip}:${d.game_port}`;
        connectRow.style.display = '';
      } else {
        connectRow.style.display = 'none';
      }
    }

    // Live join/leave events
    const currentNames = new Set((d.players_list||[]).map(p=>p.name).filter(Boolean));
    if (_prevPlayerNames[num] !== null) {
      const prevNames = _prevPlayerNames[num];
      currentNames.forEach(name => {
        if (!prevNames.has(name)) _showServerEvent(`⚔ ${name} зашёл на сервер`, SERVER_THEMES[num].accent);
      });
      prevNames.forEach(name => {
        if (!currentNames.has(name)) {
          _showServerEvent(`💨 ${name} покинул сервер`, 'rgba(150,150,170,0.9)');
          _recentDeparted[num].unshift({ name, leftAt: Date.now() });
        }
      });
      _recentDeparted[num] = _recentDeparted[num].slice(0, 5);
    } else {
      _recentDeparted[num] = [];
    }
    _prevPlayerNames[num] = currentNames;

    renderServerPlayers(num, d.players_list || []);
    renderDeparted(num);
  } catch {
    const badge = document.getElementById(`srv-badge-${num}`);
    if (badge) { badge.className = 'srv-badge off'; badge.innerHTML = '<span class="srv-dot"></span>Ошибка'; }
  }
}

function connectServer(num) {
  const addr = _connectInfo[num];
  if (!addr) return;
  window.location.href = `steam://rungameid/1604030//+connect%20${addr}`;
}

function copyServerAddr(num, btn) {
  const addr = _connectInfo[num];
  if (!addr) return;
  navigator.clipboard.writeText(addr).then(() => {
    const original = btn.textContent;
    btn.textContent = '✔ Скопировано';
    setTimeout(() => { btn.textContent = original; }, 1500);
  });
}

function renderServerPlayers(num, players) {
  _playersData[num] = players;
  filterPlayers(num);
}

function setSortPlayers(num, by, btn) {
  _playersSortBy[num] = by;
  const wrap = btn.parentElement;
  wrap.querySelectorAll('button[data-sort]').forEach(b => {
    b.style.background = b.dataset.sort === by ? 'rgba(110,0,150,0.35)' : 'none';
    b.style.color = b.dataset.sort === by ? 'var(--text)' : 'var(--muted)';
  });
  filterPlayers(num);
}

function filterPlayers(num) {
  const el = document.getElementById(`srv-players-list-${num}`);
  const searchInput = document.getElementById(`srv-search-${num}`);
  if (!el) return;

  // Top player by duration (always from full list, not filtered)
  const topEl = document.getElementById(`srv-top-player-${num}`);
  if (topEl) {
    const allPlayers = _playersData[num] || [];
    if (allPlayers.length > 0) {
      const top = allPlayers.reduce((a, b) => b.duration > a.duration ? b : a);
      const topName = top.name || 'Аноним';
      topEl.style.display = '';
      topEl.innerHTML = `<div style="font-size:.62rem;color:var(--muted);display:flex;align-items:center;gap:.35rem;margin-top:.3rem;">
        <span style="color:var(--gold);">🏅</span>
        <span>Дольше всех:</span>
        <a href="/user.html?u=${encodeURIComponent(topName)}" style="color:var(--gold);font-weight:700;text-decoration:none;">${esc(topName)}</a>
        <span style="color:var(--muted);">· ${fmtDuration(top.duration)}</span>
      </div>`;
    } else {
      topEl.style.display = 'none';
    }
  }

  const query = (searchInput?.value || '').toLowerCase().trim();
  const players = _playersData[num] || [];
  let filtered = query ? players.filter(p => (p.name||'').toLowerCase().includes(query)) : [...players];
  if (_playersSortBy[num] === 'name') {
    filtered.sort((a,b) => (a.name||'').localeCompare(b.name||'', 'ru'));
  } else {
    filtered.sort((a,b) => b.duration - a.duration);
  }
  if (!filtered.length && players.length) {
    el.innerHTML = `<p class="srv-empty">Нет игроков по запросу</p>`;
    return;
  }
  if (!filtered.length) {
    el.innerHTML = `<p class="srv-empty">Нет игроков онлайн</p>`;
    return;
  }
  el.innerHTML = filtered.map(p => {
    const name = p.name || 'Аноним';
    const hue = name.split('').reduce((a,c)=>a+c.charCodeAt(0),0)%55+330;
    return `<div class="srv-players-row" data-player-name="${esc(name)}" data-player-duration="${p.duration}" data-srv-num="${num}"
      onmouseenter="(_hcTimeout=setTimeout(()=>_showPlayerCard(this,${num}),200))"
      onmouseleave="_hidePlayerCard();clearTimeout(_hcTimeout)">
      <a class="srv-player-link" href="/user.html?u=${encodeURIComponent(name)}" title="Профиль игрока">
        <span class="srv-player-dot" style="background:hsl(${hue},78%,55%);box-shadow:0 0 5px hsl(${hue},78%,55%);"></span>
        <span class="srv-player-name" style="font-family:'Philosopher',serif;color:#e6def2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .15s;">${esc(name)}</span>
      </a>
      <span class="srv-player-time">${fmtDuration(p.duration)}</span>
    </div>`;
  }).join('');
}

function updateOnlineContext(num, players, online) {
  const el = document.getElementById(`srv-online-ctx-${num}`);
  if (!el) return;
  if (!online || !_graphData[num] || !_graphData[num].length) { el.textContent = ''; return; }
  const hour = new Date().getUTCHours();
  const buckets = computeHourBuckets(_graphData[num]);
  const bucket = buckets[hour];
  if (!bucket || bucket.count < 3) { el.textContent = ''; return; }
  const ratio = players / Math.max(1, bucket.avg);
  let text, color;
  if (ratio >= 1.3) { text = '▲ выше обычного'; color = 'var(--green)'; }
  else if (ratio <= 0.7) { text = '▼ ниже обычного'; color = 'var(--red)'; }
  else { text = '≈ обычно'; color = 'var(--muted)'; }
  el.textContent = text;
  el.style.color = color;
}

function renderDeparted(num) {
  const el = document.getElementById(`srv-departed-${num}`);
  if (!el) return;
  const list = _recentDeparted[num] || [];
  if (!list.length) { el.style.display = 'none'; return; }
  el.style.display = '';
  el.innerHTML = `<div class="srv-section-title" style="margin-bottom:.4rem;">🕐 Недавно покинули</div>` +
    list.map(p => `<div style="font-size:.62rem;color:var(--muted);padding:.15rem 0;">💨 ${esc(p.name)} · ${_timeAgoShort(p.leftAt)}</div>`).join('');
}

async function loadServerStats(num) {
  try {
    const s = await fetch(`${API}/monitor/stats?server=${num}`).then(r => r.json());
    setStat(`srv-uptime24-${num}`, s.uptime_24h != null ? `${s.uptime_24h}%` : '—', uptimeColor(s.uptime_24h));
    setStat(`srv-uptime7d-${num}`, s.uptime_7d != null ? `${s.uptime_7d}%` : '—', uptimeColor(s.uptime_7d));
    setStat(`srv-peak24-${num}`, s.peak_24h ?? '—');
    setStat(`srv-peak7d-${num}`, s.peak_7d ?? '—');

    const record = document.getElementById(`srv-record-${num}`);
    if (record && s.peak_alltime > 0) {
      const dateStr = s.peak_alltime_date
        ? fmtDate(s.peak_alltime_date)
        : null;
      record.textContent = `🏆 Рекорд онлайна: ${s.peak_alltime} ${_pluralPlayers(s.peak_alltime)}${dateStr ? ' · ' + dateStr : ''}`;
      record.style.display = 'flex';
    } else if (record) {
      record.style.display = 'none';
    }
  } catch {}
}

function _pluralPlayers(n) {
  const n10 = n % 10, n100 = n % 100;
  if (n10 === 1 && n100 !== 11) return 'игрок';
  if ([2, 3, 4].includes(n10) && ![12, 13, 14].includes(n100)) return 'игрока';
  return 'игроков';
}

const PERIOD_LABELS = { 1: 'сутки', 3: '3 дня', 7: '7 дней' };
let _heatHoverSetup = {};

function computeHourBuckets(snaps) {
  const sums = Array(24).fill(0);
  const counts = Array(24).fill(0);
  snaps.forEach(s => {
    const h = new Date(s.ts * 1000).getUTCHours();
    sums[h] += s.players;
    counts[h]++;
  });
  return sums.map((sum, hour) => ({ hour, count: counts[hour], avg: counts[hour] ? sum / counts[hour] : 0 }));
}

function drawHeatmap(num) {
  const wrap = document.getElementById(`srv-heatmap-wrap-${num}`);
  const el = document.getElementById(`srv-heatmap-${num}`);
  const titleEl = document.getElementById(`srv-heatmap-title-${num}`);
  if (!wrap || !el) return;

  const days = _graphPeriod[num] || 7;
  const cutoff = Date.now() / 1000 - days * 86400;
  const snaps = (_graphData[num] || []).filter(s => s.ts >= cutoff);
  const buckets = computeHourBuckets(snaps);

  if (!buckets.some(b => b.count > 0)) {
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = '';
  if (titleEl) titleEl.textContent = `Активность по часам (среднее за ${PERIOD_LABELS[days] || '7 дней'})`;

  const max = Math.max(...buckets.map(b => b.avg), 1);
  const peak = buckets.reduce((best, b) => b.avg > best.avg ? b : best, buckets[0]);
  const accentRgb = SERVER_THEMES[num].accentRgb;

  el.innerHTML = buckets.map(b => {
    const h = Math.max(2, Math.round((b.avg / max) * 60));
    const isPeak = b.avg > 0 && b.hour === peak.hour;
    const bg = isPeak ? '' : `background:linear-gradient(180deg, rgb(${accentRgb}), rgba(${accentRgb},0.25));`;
    return `<div class="srv-heatbar${isPeak ? ' peak' : ''}" data-hour="${b.hour}" data-avg="${b.avg.toFixed(1)}" data-count="${b.count}" style="height:${h}px;${bg}"></div>`;
  }).join('');

  setupHeatmapHover(num);
}

function setupHeatmapHover(num) {
  if (_heatHoverSetup[num]) return;
  _heatHoverSetup[num] = true;
  const el = document.getElementById(`srv-heatmap-${num}`);
  const tip = document.getElementById(`srv-heat-tip-${num}`);
  if (!el || !tip) return;

  const show = (bar) => {
    if (!bar) { tip.style.display = 'none'; return; }
    const hour = String(bar.dataset.hour).padStart(2, '0');
    const avg = parseFloat(bar.dataset.avg);
    const n = Math.round(avg);
    const isInt = Math.abs(avg - n) < 0.05;
    const m10 = n % 10, m100 = n % 100;
    const word = (!isInt || (m100 >= 11 && m100 <= 14) || m10 >= 5 || m10 === 0)
      ? 'Игроков' : m10 === 1 ? 'Игрок' : 'Игрока';
    tip.innerHTML = `<b>${bar.dataset.avg}</b> ${word}<span>${hour}:00–${hour}:59</span>`;
    tip.style.display = 'block';
    const areaRect = el.parentElement.getBoundingClientRect();
    const barRect = bar.getBoundingClientRect();
    let left = barRect.left - areaRect.left + barRect.width / 2 - 50;
    left = Math.max(0, Math.min(left, areaRect.width - 105));
    tip.style.left = left + 'px';
    tip.style.top = '-46px';
  };

  el.addEventListener('mousemove', e => show(e.target.closest('.srv-heatbar')));
  el.addEventListener('mouseleave', () => show(null));
  el.addEventListener('touchstart', e => { const bar = e.target.closest('.srv-heatbar'); if (bar) show(bar); }, { passive: true });
}

let _graphData = {};
let _graphPeriod = { 1: 7, 2: 7 };
let _graphGeom = {};
let _hoverSetup = {};

async function loadServerGraph(num) {
  const canvas = document.getElementById(`srv-graph-${num}`);
  if (!canvas) return;
  try {
    _graphData[num] = await fetch(`${API}/monitor/snapshots?server=${num}`).then(r => r.ok ? r.json() : []);
  } catch {
    _graphData[num] = null;
  }
  drawGraph(num);
  drawHeatmap(num);
  drawUptimeCalendar(num);
  if (_compareMode) drawCompareChart();
}

function setGraphPeriod(num, days, btn) {
  _graphPeriod[num] = days;
  _graphZoom[num] = null;
  const resetBtn = document.getElementById(`srv-zoom-reset-${num}`);
  if (resetBtn) resetBtn.style.display = 'none';
  const wrap = document.getElementById(`srv-period-${num}`);
  if (wrap) wrap.querySelectorAll('.srv-period-btn').forEach(b => b.classList.toggle('active', b === btn));
  drawGraph(num);
  drawHeatmap(num);
}

function drawGraph(num) {
  const canvas = document.getElementById(`srv-graph-${num}`);
  const empty  = document.getElementById(`srv-graph-empty-${num}`);
  const axis   = document.getElementById(`srv-graph-axis-${num}`);
  if (!canvas) return;

  // Zoom mode: render a single day
  if (_graphZoom[num]) {
    const { snaps, key } = _graphZoom[num];
    if (!snaps.length) {
      canvas.style.display = 'none';
      if (axis) axis.innerHTML = '';
      if (empty) { empty.style.display = ''; empty.textContent = 'Нет данных за этот день.'; }
      return;
    }
    canvas.style.display = '';
    if (empty) empty.style.display = 'none';
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.clientWidth || canvas.parentElement.clientWidth;
    const h = 130;
    canvas.width = w * dpr; canvas.height = h * dpr;
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const accent = SERVER_THEMES[num].accentRgb;
    const maxPlayers = Math.max(1, ...snaps.map(s => s.players));
    const padL = 28, padR = 4, padT = 8, padB = 4;
    const plotW = w - padL - padR, plotH = h - padT - padB;
    const tMin = snaps[0].ts, tMax = snaps[snaps.length - 1].ts;
    const tSpan = Math.max(1, tMax - tMin);
    const x = s => padL + ((s.ts - tMin) / tSpan) * plotW;
    const y = s => padT + plotH - (s.players / maxPlayers) * plotH;
    _graphGeom[num] = { snaps, x, y, padL, padT, plotW, plotH, w, h, accent };
    renderChart(num);
    renderAxisLabels(num, snaps, 1);
    setupGraphHover(num);
    return;
  }

  if (_graphData[num] === null) {
    canvas.style.display = 'none';
    if (axis) axis.innerHTML = '';
    if (empty) { empty.style.display = ''; empty.textContent = 'Ошибка загрузки графика.'; }
    return;
  }

  const days = _graphPeriod[num] || 7;
  const cutoff = Date.now() / 1000 - days * 86400;
  const snaps = (_graphData[num] || []).filter(s => s.ts >= cutoff);

  if (!snaps.length) {
    canvas.style.display = 'none';
    if (axis) axis.innerHTML = '';
    if (empty) { empty.style.display = ''; empty.textContent = 'Нет данных за этот период.'; }
    return;
  }
  canvas.style.display = '';
  if (empty) empty.style.display = 'none';

  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth || canvas.parentElement.clientWidth;
  const h = 130;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const accent = SERVER_THEMES[num].accentRgb;
  const maxPlayers = Math.max(1, ...snaps.map(s => s.players));
  const padL = 28, padR = 4, padT = 8, padB = 4;
  const plotW = w - padL - padR, plotH = h - padT - padB;
  const tMin = snaps[0].ts, tMax = snaps[snaps.length - 1].ts;
  const tSpan = Math.max(1, tMax - tMin);
  const x = s => padL + ((s.ts - tMin) / tSpan) * plotW;
  const y = s => padT + plotH - (s.players / maxPlayers) * plotH;

  _graphGeom[num] = { snaps, x, y, padL, padT, plotW, plotH, w, h, accent };

  renderChart(num);
  renderAxisLabels(num, snaps, days);
  setupGraphHover(num);
}

function smoothPathTo(ctx, pts) {
  if (pts.length < 2) { if (pts.length === 1) ctx.lineTo(pts[0].x, pts[0].y); return; }
  for (let i = 1; i < pts.length - 1; i++) {
    const xc = (pts[i].x + pts[i + 1].x) / 2;
    const yc = (pts[i].y + pts[i + 1].y) / 2;
    ctx.quadraticCurveTo(pts[i].x, pts[i].y, xc, yc);
  }
  const last = pts.length - 1;
  ctx.quadraticCurveTo(pts[last - 1].x, pts[last - 1].y, pts[last].x, pts[last].y);
}

function renderChart(num) {
  const canvas = document.getElementById(`srv-graph-${num}`);
  const geom = _graphGeom[num];
  if (!canvas || !geom) return;
  const ctx = canvas.getContext('2d');
  const { snaps, x, y, padL, padT, plotW, plotH, w, h, accent } = geom;
  const maxPlayers = Math.max(1, ...snaps.map(s => s.players));
  ctx.clearRect(0, 0, w, h);

  // Y-axis gridlines + labels
  ctx.font = '500 8px Inter, system-ui, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  [0, 0.5, 1].forEach(f => {
    const gy = padT + plotH * (1 - f);
    const playerVal = Math.round(maxPlayers * f);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(padL, gy);
    ctx.lineTo(padL + plotW, gy);
    ctx.stroke();
    ctx.fillStyle = 'rgba(182,168,210,0.55)';
    ctx.fillText(playerVal, padL - 4, gy);
  });

  const pts = snaps.map(s => ({ x: x(s), y: y(s) }));

  ctx.beginPath();
  ctx.moveTo(pts[0].x, padT + plotH);
  ctx.lineTo(pts[0].x, pts[0].y);
  smoothPathTo(ctx, pts);
  ctx.lineTo(pts[pts.length - 1].x, padT + plotH);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, padT, 0, padT + plotH);
  grad.addColorStop(0, `rgba(${accent},0.4)`);
  grad.addColorStop(1, `rgba(${accent},0.02)`);
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  smoothPathTo(ctx, pts);
  ctx.strokeStyle = `rgb(${accent})`;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.save();
  ctx.shadowBlur = 10;
  ctx.shadowColor = `rgba(${accent}, 0.7)`;
  ctx.stroke();
  ctx.restore();
  ctx.shadowBlur = 0;
  ctx.stroke();

  ctx.fillStyle = 'rgb(255,93,126)';
  snaps.forEach(s => { if (!s.online) { ctx.beginPath(); ctx.arc(x(s), padT + plotH - 1, 1.3, 0, Math.PI * 2); ctx.fill(); } });

  // Live endpoint dot (glow in canvas + position CSS pulse ring)
  const last = snaps[snaps.length - 1];
  if (last && last.online) {
    const lx = x(last), ly = y(last);
    ctx.save();
    ctx.shadowBlur = 14;
    ctx.shadowColor = `rgb(${accent})`;
    ctx.fillStyle = `rgb(${accent})`;
    ctx.beginPath();
    ctx.arc(lx, ly, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(lx, ly, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // Position the CSS pulse ring
    const dotEl = document.getElementById(`srv-live-dot-${num}`);
    if (dotEl) {
      dotEl.style.display = 'block';
      dotEl.style.left = lx + 'px';
      dotEl.style.top = ly + 'px';
    }
  } else {
    const dotEl = document.getElementById(`srv-live-dot-${num}`);
    if (dotEl) dotEl.style.display = 'none';
  }

  // Wipe annotations — vertical dashed lines
  const wipeEntries = [...(_wipeHistory[num] || [])];
  if (_wipeSettings[num] && _wipeSettings[num].date) {
    wipeEntries.push({ wipe_date: _wipeSettings[num].date, type: _wipeSettings[num].type });
  }
  wipeEntries.forEach(wipe => {
    const dateStr = wipe.wipe_date || wipe.date;
    if (!dateStr) return;
    const ts = new Date(dateStr).getTime() / 1000;
    const px = geom.x({ ts });
    if (px < padL || px > padL + plotW) return;
    const wipeType = wipe.type || 'full';
    const lineColor = wipeType === 'map' ? 'rgba(201,169,74,0.7)' : wipeType === 'progress' ? 'rgba(153,85,238,0.7)' : 'rgba(200,0,42,0.7)';
    ctx.save();
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(px, padT);
    ctx.lineTo(px, padT + plotH);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = lineColor;
    ctx.beginPath();
    ctx.arc(px, padT + 4, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function renderAxisLabels(num, snaps, days) {
  const axis = document.getElementById(`srv-graph-axis-${num}`);
  if (!axis) return;
  const tMin = snaps[0].ts, tMax = snaps[snaps.length - 1].ts;
  const count = days <= 1 ? 4 : 6;
  const labels = [];
  for (let i = 0; i <= count; i++) {
    const ts = tMin + (tMax - tMin) * (i / count);
    const d = new Date(ts * 1000);
    labels.push(days <= 1
      ? d.toLocaleTimeString('ru-RU', { timeZone:window.__TZ||'Europe/Moscow', hour12:!!(window.__H12), hour: '2-digit', minute: '2-digit' })
      : d.toLocaleDateString('ru-RU', { timeZone:window.__TZ||'Europe/Moscow', day: '2-digit', month: '2-digit' }));
  }
  axis.innerHTML = labels.map(l => `<span>${esc(l)}</span>`).join('');
}

function setupGraphHover(num) {
  if (_hoverSetup[num]) return;
  _hoverSetup[num] = true;
  const canvas = document.getElementById(`srv-graph-${num}`);
  if (!canvas) return;

  let raf = null;
  const move = (clientX) => {
    if (raf) return;
    raf = requestAnimationFrame(() => { raf = null; handleGraphHover(num, clientX); });
  };
  canvas.addEventListener('mousemove', e => move(e.clientX));
  canvas.addEventListener('mouseleave', () => hideGraphTooltip(num));
  canvas.addEventListener('touchmove', e => { if (e.touches[0]) move(e.touches[0].clientX); }, { passive: true });
  canvas.addEventListener('touchend', () => hideGraphTooltip(num));
}

function hideGraphTooltip(num) {
  const tip = document.getElementById(`srv-graph-tip-${num}`);
  if (tip) tip.style.display = 'none';
  renderChart(num);
}

function handleGraphHover(num, clientX) {
  const geom = _graphGeom[num];
  const canvas = document.getElementById(`srv-graph-${num}`);
  const tip = document.getElementById(`srv-graph-tip-${num}`);
  if (!geom || !canvas || !tip) return;
  const rect = canvas.getBoundingClientRect();
  const mx = clientX - rect.left;

  let nearest = geom.snaps[0], nd = Infinity;
  geom.snaps.forEach(s => {
    const dx = Math.abs(geom.x(s) - mx);
    if (dx < nd) { nd = dx; nearest = s; }
  });

  renderChart(num);
  const ctx = canvas.getContext('2d');
  const px = geom.x(nearest), py = geom.y(nearest);
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(px, geom.padT);
  ctx.lineTo(px, geom.padT + geom.plotH);
  ctx.stroke();
  ctx.fillStyle = `rgb(${geom.accent})`;
  ctx.beginPath();
  ctx.arc(px, py, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  const dateStr = new Date(nearest.ts * 1000).toLocaleString('ru-RU', { timeZone:window.__TZ||'Europe/Moscow', hour12:!!(window.__H12), day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
  tip.innerHTML = `<b>${nearest.players}</b> игроков<span>${dateStr}</span>${!nearest.online ? '<span style="color:var(--red);">офлайн</span>' : ''}`;
  tip.style.display = 'block';
  let left = px + 10;
  if (left + 120 > geom.w) left = px - 130;
  tip.style.left = Math.max(0, left) + 'px';
  tip.style.top = Math.max(0, py - 44) + 'px';
}

async function refreshAll() {
  await Promise.all([1, 2].map(loadServer));
  updatePageTitle();
}

let _srvSseConn = null;

function startSrvSSE() {
  if (_srvSseConn) return;
  try {
    _srvSseConn = new EventSource('/api/monitor/status/stream');
    _srvSseConn.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.ping || !data.server) return;
        const num = data.server;
        if (num === 2 && data.enabled === false) {
          _serverEnabled[2] = false;
          const card = document.getElementById(`srv-card-2`);
          if (card) card.style.display = 'none';
          return;
        }

        _serverEnabled[num] = true;
        const card = document.getElementById(`srv-card-${num}`);
        if (card) card.style.display = '';

        if (document.getElementById(`srv-name-${num}`))
          document.getElementById(`srv-name-${num}`).textContent = data.name || `Сервер ${num}`;

        const badge = document.getElementById(`srv-badge-${num}`);
        if (badge) {
          badge.className = 'srv-badge ' + (data.online ? 'on' : 'off');
          badge.innerHTML = `<span class="srv-dot${data.online?' pulse':''}"></span>${data.online?'Онлайн':'Офлайн'}`;
        }
        setStat(`srv-players-${num}`, `${data.players??0}/${data.max_players??0}`);
        setStat(`srv-ping-${num}`, data.latency_ms!=null?`${data.latency_ms} мс`:'—', pingColor(data.latency_ms));

        const arc = document.getElementById(`srv-gauge-arc-${num}`);
        const pctEl = document.getElementById(`srv-gauge-pct-${num}`);
        const pct = data.max_players > 0 ? Math.min(100, Math.round((data.players / data.max_players) * 100)) : 0;
        if (arc) {
          arc.style.strokeDashoffset = 113.1 * (1 - pct / 100);
          const color = pct >= 80 ? '200,0,42' : pct >= 50 ? '201,169,74' : SERVER_THEMES[num].accentRgb;
          arc.style.stroke = `rgba(${color},0.85)`;
        }
        if (pctEl) pctEl.textContent = pct + '%';

        _onlineCounts[num] = data.online ? (data.players??0) : 0;
        updatePageTitle();
        renderServerPlayers(num, data.players_list||[]);
      } catch {}
    };
    _srvSseConn.onerror = () => {
      _srvSseConn.close(); _srvSseConn = null;
      setTimeout(startSrvSSE, 30000);
    };
  } catch {}
}

async function init() {
  const wrap = document.getElementById('servers-wrap');
  wrap.innerHTML = srvCardSkeleton(1) + srvCardSkeleton(2);
  // ── 5. Stagger metrics animation ──
  [1, 2].forEach(num => {

function drawUptimeCalendar(num) {
  const wrap = document.getElementById(`srv-cal-wrap-${num}`);
  const grid = document.getElementById(`srv-cal-${num}`);
  const legend = document.getElementById(`srv-cal-legend-${num}`);
  if (!grid || !_graphData[num]) { if(wrap) wrap.style.display='none'; return; }
  const accentRgb = SERVER_THEMES[num].accentRgb;

  const now = Date.now() / 1000;
  const days = 28;
  const dayBuckets = {};
  for (let i = 0; i < days; i++) {
    const d = new Date((now - i * 86400) * 1000);
    const key = d.toISOString().slice(0, 10);
    dayBuckets[key] = { total: 0, online: 0 };
  }
  (_graphData[num] || []).forEach(s => {
    const d = new Date(s.ts * 1000);
    const key = d.toISOString().slice(0, 10);
    if (dayBuckets[key] !== undefined) {
      dayBuckets[key].total++;
      if (s.online) dayBuckets[key].online++;
    }
  });

  const dayKeys = Object.keys(dayBuckets).sort();
  const hasAny = dayKeys.some(k => dayBuckets[k].total > 0);
  if (!hasAny) { if(wrap) wrap.style.display='none'; return; }
  if(wrap) wrap.style.display='';

  grid.innerHTML = dayKeys.map(key => {
    const { total, online } = dayBuckets[key];
    const pct = total > 0 ? online / total : 0;
    const alpha = total === 0 ? 0.08 : 0.15 + pct * 0.85;
    const color = total === 0 ? 'rgba(255,255,255,0.06)' : `rgba(${accentRgb},${alpha.toFixed(2)})`;
    const dateStr = new Date(key + 'T12:00:00Z').toLocaleDateString('ru-RU', {day:'2-digit',month:'2-digit'});
    const pctStr = total > 0 ? Math.round(pct * 100) + '% онлайн' : 'Нет данных';
    return `<div class="srv-cal-cell" style="background:${color};" title="${dateStr}: ${pctStr}" onclick="calCellClick(${num},'${key}')"></div>`;
  }).join('');

  legend.innerHTML = [0.1, 0.35, 0.6, 0.85, 1.0].map(a =>
    `<span style="width:12px;height:12px;border-radius:2px;background:rgba(${accentRgb},${a});display:inline-block;"></span>`
  ).join('');
}

function calCellClick(num, key) {
  const startTs = new Date(key + 'T00:00:00Z').getTime() / 1000;
  const snaps = (_graphData[num] || []).filter(s => s.ts >= startTs && s.ts < startTs + 86400);
  drawGraphZoomed(num, snaps, key);
  const graphEl = document.getElementById(`srv-graph-${num}`);
  if (graphEl) graphEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function drawGraphZoomed(num, snaps, key) {

}

function toggleCompare() {

function drawCompareChart() {
  const canvas = document.getElementById('compare-canvas');
  const tip = document.getElementById('compare-tip');
  if (!canvas) return;
  // Update legend labels with real server names
  const leg1 = document.querySelector('#compare-card .compare-leg-1');
  const leg2 = document.querySelector('#compare-card .compare-leg-2');
  if (leg1) leg1.textContent = _serverNames[1];
  if (leg2) leg2.textContent = _serverNames[2];
  const d1 = _graphData[1] || [];
  const d2 = _graphData[2] || [];
  if (!d1.length && !d2.length) { canvas.style.display='none'; return; }
  canvas.style.display = '';

  const days = Math.max(_graphPeriod[1]||7, _graphPeriod[2]||7);
  const cutoff = Date.now()/1000 - days*86400;
  const s1 = d1.filter(s=>s.ts>=cutoff);
  const s2 = d2.filter(s=>s.ts>=cutoff);

  const dpr = window.devicePixelRatio||1;
  const w = canvas.clientWidth||canvas.parentElement.clientWidth;
  const h = 150;
  canvas.width = w*dpr; canvas.height = h*dpr;
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,w,h);

  const allSnaps = [...s1,...s2];
  if (!allSnaps.length) return;
  const tMin = Math.min(...allSnaps.map(s=>s.ts));
  const tMax = Math.max(...allSnaps.map(s=>s.ts));
  const maxP = Math.max(1,...allSnaps.map(s=>s.players));
  const padL=28, padR=4, padT=8, padB=4;
  const plotW=w-padL-padR, plotH=h-padT-padB;
  const tSpan = Math.max(1,tMax-tMin);
  const xf = ts => padL + ((ts-tMin)/tSpan)*plotW;
  const yf = p => padT + plotH - (p/maxP)*plotH;

  [0,0.5,1].forEach(f => {
    const gy = padT+plotH*(1-f);
    ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(padL,gy); ctx.lineTo(padL+plotW,gy); ctx.stroke();
    ctx.fillStyle='rgba(182,168,210,0.55)'; ctx.font='500 8px Inter,sans-serif';
    ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillText(Math.round(maxP*f), padL-4, gy);
  });

  const drawSeries = (snaps, rgb) => {
    if (!snaps.length) return;
    const pts = snaps.map(s=>({x:xf(s.ts),y:yf(s.players)}));
    ctx.beginPath(); ctx.moveTo(pts[0].x,padT+plotH); ctx.lineTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length-1;i++){const xc=(pts[i].x+pts[i+1].x)/2,yc=(pts[i].y+pts[i+1].y)/2;ctx.quadraticCurveTo(pts[i].x,pts[i].y,xc,yc);}
    if(pts.length>1)ctx.quadraticCurveTo(pts[pts.length-2].x,pts[pts.length-2].y,pts[pts.length-1].x,pts[pts.length-1].y);
    ctx.lineTo(pts[pts.length-1].x,padT+plotH); ctx.closePath();
    const g=ctx.createLinearGradient(0,padT,0,padT+plotH);
    g.addColorStop(0,`rgba(${rgb},0.25)`); g.addColorStop(1,`rgba(${rgb},0.01)`);
    ctx.fillStyle=g; ctx.fill();
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length-1;i++){const xc=(pts[i].x+pts[i+1].x)/2,yc=(pts[i].y+pts[i+1].y)/2;ctx.quadraticCurveTo(pts[i].x,pts[i].y,xc,yc);}
    if(pts.length>1)ctx.quadraticCurveTo(pts[pts.length-2].x,pts[pts.length-2].y,pts[pts.length-1].x,pts[pts.length-1].y);
    ctx.strokeStyle=`rgb(${rgb})`; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.stroke();
  };

  drawSeries(s1, '224,85,117');
  drawSeries(s2, '153,85,238');

  if (!canvas._cmpHover) {
    canvas._cmpHover = true;
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const find = (snaps) => {
        if (!snaps.length) return null;
        return snaps.reduce((b,s) => Math.abs(xf(s.ts)-mx) < Math.abs(xf(b.ts)-mx) ? s : b);
      };
      const n1 = find(s1), n2 = find(s2);
      let html = '';
      if (n1) html += `<div style="color:#e05575;font-weight:700;">${n1.players} игр. (${_serverNames[1]})</div>`;
      if (n2) html += `<div style="color:#9955ee;font-weight:700;">${n2.players} игр. (${_serverNames[2]})</div>`;
      const ref = n1||n2;
      if (ref) {
        const dt = new Date(ref.ts*1000).toLocaleString('ru-RU',{timeZone:window.__TZ||'Europe/Moscow',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
        html += `<span style="font-size:.62rem;color:var(--muted);">${dt}</span>`;
        tip.innerHTML = html; tip.style.display='block';
        let left = xf(ref.ts)+8; if(left+130>w) left=xf(ref.ts)-140;
        tip.style.left=Math.max(0,left)+'px'; tip.style.top='4px';
      }
    });
    canvas.addEventListener('mouseleave', () => tip.style.display='none');
  }
}

function _showServerEvent(text, color) {
  _eventQueue.push({text, color});
  if (!_eventShowing) _flushEventQueue();
}

function _flushEventQueue() {
  if (!_eventQueue.length) { _eventShowing = false; return; }
  _eventShowing = true;
  const {text, color} = _eventQueue.shift();

  const isJoin = text.startsWith('⚔');
  const name = text.replace(/^[⚔💨]\s/, '').replace(/ (зашёл|покинул) на сервер$/, '').replace(/ покинул сервер$/, '').trim();
  const initial = name[0] ? name[0].toUpperCase() : '?';
  const hue = name.split('').reduce((a,c)=>a+c.charCodeAt(0),0)%55+330;
  const label = isJoin ? 'подключился' : 'отключился';
  const borderColor = isJoin ? 'rgba(46,230,155,0.5)' : 'rgba(150,150,170,0.4)';
  const stripColor = isJoin ? '#2ee69b' : '#9488a8';

  const el = document.createElement('div');
  el.style.cssText = `
    position:fixed; bottom:1.5rem; right:1.5rem;
    display:flex; align-items:center; gap:.6rem;
    background:rgba(8,0,14,0.97);
    border:1px solid ${borderColor};
    border-left:3px solid ${stripColor};
    color:#e2d8f0; padding:.55rem .9rem .55rem .7rem;
    border-radius:.55rem; font-size:.78rem; font-weight:600;
    box-shadow:0 4px 24px rgba(0,0,0,0.6), 0 0 12px ${isJoin?'rgba(46,230,155,0.1)':'rgba(0,0,0,0)'};
    z-index:9999; pointer-events:none;
    opacity:0; transform:translateX(1.5rem);
    transition:opacity .25s, transform .25s cubic-bezier(.32,.72,0,1);
    max-width:240px; white-space:nowrap;`;

  el.innerHTML = `
    <div style="width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,hsl(${hue},70%,30%),hsl(${hue},78%,50%));display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:#fff;flex-shrink:0;">${esc(initial)}</div>
    <div>
      <div style="font-size:.74rem;font-weight:700;color:#ece3f7;overflow:hidden;text-overflow:ellipsis;max-width:160px;">${esc(name)}</div>
      <div style="font-size:.6rem;color:${stripColor};font-weight:600;letter-spacing:.04em;">${label}</div>
    </div>`;

  document.body.appendChild(el);
  requestAnimationFrame(() => { el.style.opacity='1'; el.style.transform='translateX(0)'; });

  setTimeout(() => {
    el.style.opacity='0'; el.style.transform='translateX(1.5rem)';
    setTimeout(() => { el.remove(); _flushEventQueue(); }, 250);
  }, 2800);
}

// ── 3. Player hover-card ────────────────────────────────────────────────────
const _hcEl = (() => {
  const d = document.createElement('div');
  d.className = 'player-hovercard';
  document.body.appendChild(d);
  return d;
})();
let _hcTimeout = null;

function _showPlayerCard(row, num) {
  const name = row.dataset.playerName;
  const duration = parseInt(row.dataset.playerDuration || '0', 10);
  if (!name) return;

  const hue = name.split('').reduce((a,c)=>a+c.charCodeAt(0),0)%55+330;
  const accentRgb = SERVER_THEMES[num].accentRgb;
  const maxDur = Math.max(1, ...(_playersData[num]||[]).map(p=>p.duration));
  const pct = Math.min(100, Math.round((duration/maxDur)*100));

  _hcEl.style.setProperty('--hc-rgb', accentRgb);
  _hcEl.innerHTML = `
    <div style="display:flex;align-items:center;gap:.55rem;margin-bottom:.4rem;">
      <div class="player-hc-avatar" style="background:linear-gradient(135deg,hsl(${hue},70%,35%),hsl(${hue},78%,55%));">
        ${esc(name[0].toUpperCase())}
      </div>
      <div>
        <div style="font-weight:700;font-size:.82rem;color:#ece3f7;">${esc(name)}</div>
        <div style="font-size:.62rem;color:var(--muted);">в игре</div>
      </div>
    </div>
    <div style="font-size:.68rem;color:var(--muted);margin-bottom:.2rem;">Сессия</div>
    <div style="font-family:'Oswald',sans-serif;font-size:1.3rem;font-weight:700;color:#fff;line-height:1;">${fmtDuration(duration)}</div>
    <div class="player-hc-session-bar">
      <div class="player-hc-session-fill" style="width:${pct}%;background:linear-gradient(90deg,rgba(${accentRgb},0.6),rgba(${accentRgb},1));"></div>
    </div>`;

  _hcEl.classList.add('visible');
}

function _hidePlayerCard() {
  _hcEl.classList.remove('visible');
}

document.addEventListener('mousemove', e => {
  if (_hcEl.classList.contains('visible')) {
    let x = e.clientX + 16;
    let y = e.clientY - 20;
    if (x + 180 > window.innerWidth) x = e.clientX - 196;
    if (y + 140 > window.innerHeight) y = e.clientY - 150;
    _hcEl.style.left = x + 'px';
    _hcEl.style.top = y + 'px';
  }
});

function toggleMobileNav() {
  const overlay = document.getElementById('mob-overlay');
  const drawer = document.getElementById('mob-drawer');
  const isOpen = drawer.classList.contains('open');
  drawer.classList.toggle('open', !isOpen);
  overlay.classList.toggle('open', !isOpen);
  document.body.style.overflow = isOpen ? '' : 'hidden';
}

// ── Notification bell ──────────────────────────────────────────────────────
let _notifOpen = false;
async function loadNotifications() {
  const res = await fetch('/api/notifications', {credentials:'include'});
  if (!res.ok) return;
  const d = await res.json();
  const wrap = document.getElementById('notif-bell-wrap');
  const cnt = document.getElementById('notif-count');
  const list = document.getElementById('notif-list');
  if (wrap) wrap.style.display = '';
  if (cnt) { cnt.textContent = d.unread; cnt.style.display = d.unread > 0 ? '' : 'none'; }
  if (list) {
    if (!d.items || !d.items.length) {
      list.innerHTML = '<div style="padding:1rem;text-align:center;font-size:.78rem;color:#9488a8;">Нет уведомлений</div>';
    } else {
      list.innerHTML = d.items.map(n => `
        <div style="padding:.65rem 1rem;border-bottom:1px solid rgba(150,0,28,0.1);background:${n.read?'transparent':'rgba(200,0,40,0.05)'};">
          <div style="font-size:.75rem;color:#e2d8f0;">
            ${n.type==='reply'?`<strong>@${esc(n.data?.from_username||'')}</strong> ответил на ваш комментарий`:'Новое уведомление'}
          </div>
          ${n.data?.preview ? `<div style="font-size:.68rem;color:#9488a8;margin-top:.2rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(n.data.preview)}</div>` : ''}
          ${n.data?.news_slug ? `<a href="/?news=${esc(n.data.news_slug)}${n.data?.comment_id ? '&comment='+n.data.comment_id : ''}" style="font-size:.65rem;color:#c8002a;text-decoration:none;">Перейти →</a>` : ''}
        </div>`).join('');
    }
  }
}
function toggleNotifPanel() {
  const panel = document.getElementById('notif-panel');
  _notifOpen = !_notifOpen;
  if (panel) panel.style.display = _notifOpen ? '' : 'none';
  if (_notifOpen) loadNotifications();
}
async function markAllNotifRead() {
  await fetch('/api/notifications/read-all', {method:'POST', credentials:'include'});
  const cnt = document.getElementById('notif-count');
  if (cnt) cnt.style.display = 'none';
  loadNotifications();
}
document.addEventListener('click', e => {
  if (_notifOpen && !e.target.closest('#notif-bell-wrap')) {
    _notifOpen = false;
    const panel = document.getElementById('notif-panel');
    if (panel) panel.style.display = 'none';
  }
});

</script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
