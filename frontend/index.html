<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V Rising — Замок</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg:       #08000e;
      --panel:    rgba(16,5,26,0.94);
      --border:   rgba(110,0,20,0.38);
      --crimson:  #cc0028;
      --purple:   #7b00cc;
      --glow-r:   rgba(204,0,40,0.45);
      --glow-p:   rgba(123,0,204,0.45);
      --text:     #c8c5d4;
      --muted:    #8a8098;
      --gold:     #c9a04a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 50%, rgba(80,0,130,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(150,0,28,0.08) 0%, transparent 50%);
      background-attachment: fixed;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      min-height: 100vh;
    }
    .gothic { font-family: 'Cinzel', serif; }

    /* ── Fog ── */
    .fog { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .fog::before {
      content: ''; position: absolute; width: 180%; height: 180%; top: -40%; left: -40%;
      background: radial-gradient(ellipse at 38% 55%, rgba(80,0,150,0.09) 0%, transparent 55%);
      animation: fog1 30s ease-in-out infinite alternate;
    }
    .fog::after {
      content: ''; position: absolute; width: 180%; height: 180%; top: -40%; left: -40%;
      background: radial-gradient(ellipse at 68% 28%, rgba(160,0,30,0.06) 0%, transparent 50%);
      animation: fog2 42s ease-in-out infinite alternate-reverse;
    }
    @keyframes fog1 { to { transform: translate(6%,8%) scale(1.12); } }
    @keyframes fog2 { to { transform: translate(-7%,5%) scale(0.94); } }

    /* ── Nav ── */
    .glass-nav {
      background: rgba(8,0,14,0.9);
      border-bottom: 1px solid rgba(110,0,20,0.35);
      backdrop-filter: blur(14px);
    }

    /* ── Hero ── */
    .hero {
      position: relative; min-height: 28vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 50% 80%, rgba(100,0,20,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 40%, rgba(60,0,100,0.18) 0%, transparent 55%),
        linear-gradient(180deg, #08000e 0%, #0d0018 50%, #100008 100%);
    }
    /* Castle silhouette */
    .castle-wrap { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: min(900px,100%); pointer-events: none; }
    .castle-svg { width: 100%; opacity: 0.22; filter: blur(0.5px); }

    /* Moon */
    .moon {
      position: absolute; top: 10%; right: 15%;
      width: 80px; height: 80px; border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #2a1a40, #0d0018);
      box-shadow: 0 0 30px rgba(123,0,204,0.2), 0 0 80px rgba(80,0,140,0.12);
      opacity: 0.5;
    }
    /* Stars */
    .stars { position: absolute; inset: 0; }
    .star { position: absolute; border-radius: 50%; background: rgba(212,196,224,0.6); animation: twinkle 3s ease-in-out infinite alternate; }
    @keyframes twinkle { 0% { opacity: .3; } 100% { opacity: .9; } }

    .hero-title {
      font-size: clamp(1.6rem, 4.5vw, 3.2rem);
      letter-spacing: .18em; line-height: 1;
      text-shadow: 0 0 30px rgba(204,0,40,0.7), 0 0 70px rgba(204,0,40,0.3), 0 0 120px rgba(123,0,204,0.2);
      color: #d4c4e0;
    }
    .hero-sub { font-size: .75rem; letter-spacing: .3em; color: var(--muted); text-transform: uppercase; }
    .hero-divider { width: 120px; height: 1px; background: linear-gradient(90deg, transparent, var(--crimson), var(--purple), transparent); margin: .45rem auto; }

    /* ── Gothic Panel ── */
    .g-panel {
      background: rgba(20,10,25,0.65);
      border: 1px solid rgba(110,0,150,0.18);
      border-radius: 1rem !important;
      box-shadow:
        0 0 0 1px rgba(160,0,80,0.08),
        0 8px 32px rgba(0,0,0,0.55),
        0 0 18px rgba(80,0,120,0.12),
        inset 0 0 24px rgba(50,0,80,0.06);
      backdrop-filter: blur(12px);
      position: relative;
    }
    .g-panel > .corner-tl, .g-panel > .corner-tr,
    .g-panel > .corner-bl, .g-panel > .corner-br {
      position: absolute; font-size: 11px; line-height: 1;
      color: rgba(210,0,45,0.7);
      text-shadow: 0 0 8px rgba(210,0,45,0.8), 0 0 18px rgba(140,0,180,0.5);
    }
    .corner-tl { top: 5px; left: 7px; }
    .corner-tr { top: 5px; right: 7px; }
    .corner-bl { bottom: 5px; left: 7px; }
    .corner-br { bottom: 5px; right: 7px; }
    /* Thin bracket lines at corners */
    .corner-tl::before,.corner-tl::after,.corner-tr::before,.corner-tr::after,
    .corner-bl::before,.corner-bl::after,.corner-br::before,.corner-br::after {
      content:''; position:absolute; background:rgba(200,0,50,0.35);
    }
    .corner-tl::before { width:10px; height:1px; top:5px; left:13px; }
    .corner-tl::after  { width:1px; height:10px; top:13px; left:5px; }
    .corner-tr::before { width:10px; height:1px; top:5px; right:13px; }
    .corner-tr::after  { width:1px; height:10px; top:13px; right:5px; }
    .corner-bl::before { width:10px; height:1px; bottom:5px; left:13px; }
    .corner-bl::after  { width:1px; height:10px; bottom:13px; left:5px; }
    .corner-br::before { width:10px; height:1px; bottom:5px; right:13px; }
    .corner-br::after  { width:1px; height:10px; bottom:13px; right:5px; }

    /* ── Status badge ── */
    .badge-on  { background:rgba(0,70,15,.35); border:1px solid rgba(0,180,40,.45); color:#4ade80; box-shadow:0 0 10px rgba(0,180,40,.2); animation: badge-glow 2.2s ease-in-out infinite; }
    .badge-off { background:rgba(100,0,0,.35);  border:1px solid rgba(200,0,0,.45);  color:#f87171; box-shadow:0 0 10px rgba(200,0,0,.2); }
    @keyframes badge-glow {
      0%,100% { box-shadow: 0 0 8px rgba(0,180,40,0.25); }
      50%      { box-shadow: 0 0 18px rgba(0,220,55,0.6), 0 0 6px rgba(0,200,40,0.35); }
    }
    @keyframes dot-pulse {
      0%,100% { opacity:1; text-shadow: 0 0 5px rgba(0,230,55,0.95); }
      50%      { opacity:0.3; text-shadow: none; }
    }
    .dot-pulse { display:inline-block; animation: dot-pulse 1.6s ease-in-out infinite; }

    /* ── Stat circle ── */
    .stat-circle {
      width: 72px; height: 72px; border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, rgba(40,5,60,0.9), rgba(10,0,16,0.95));
      border: 1px solid rgba(160,0,40,0.45);
      box-shadow: 0 0 16px rgba(190,0,35,0.25), 0 0 8px rgba(120,0,180,0.2), inset 0 0 14px rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
    }

    /* ── Players bar ── */
    .p-bar { height: 3px; background: rgba(110,0,20,0.2); border-radius: 2px; overflow: hidden; }
    .p-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--purple), var(--crimson)); transition: width .8s ease; }

    /* ── News card ── */
    .news-card {
      background: rgba(20,10,25,0.6); border: 1px solid rgba(110,0,150,0.16);
      border-radius: 1rem; overflow: hidden; cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 10px rgba(80,0,100,0.08);
      transition: transform .2s, border-color .25s, box-shadow .25s;
    }
    .news-card:hover {
      transform: translateY(-3px);
      border-color: rgba(190,0,40,0.45);
      box-shadow: 0 0 28px rgba(190,0,35,0.28), 0 0 12px rgba(120,0,160,0.18), inset 0 0 20px rgba(100,0,30,0.06);
    }
    .news-thumb { width:100%; height:7rem; object-fit:cover; }
    .news-no-thumb {
      width:100%; height:7rem;
      background: linear-gradient(135deg, rgba(60,0,100,0.4), rgba(90,0,15,0.4));
      display:flex; align-items:center; justify-content:center;
      font-size:1.8rem; color:rgba(180,0,30,0.5);
    }

    /* ── Pagination ── */
    .pg-btn {
      background: rgba(14,3,24,0.8); border:1px solid rgba(110,0,20,0.3);
      color: var(--muted); padding:.35rem .75rem; border-radius:.5rem;
      cursor:pointer; font-size:.8rem; transition:all .2s;
    }
    .pg-btn:hover, .pg-btn.active { border-color:var(--crimson); color:var(--text); box-shadow:0 0 14px rgba(200,0,35,0.45), inset 0 0 8px rgba(170,0,30,0.12); }

    /* ── Chat ── */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: .75rem;
      display: flex; flex-direction: column; gap: .6rem;
      scrollbar-width: thin; scrollbar-color: rgba(110,0,20,0.4) transparent;
    }
    .msg-user {
      align-self: flex-end; max-width: 80%;
      background: rgba(123,0,204,0.18); border:1px solid rgba(123,0,204,0.3);
      border-radius: .6rem .6rem 0 .6rem; padding: .5rem .75rem;
      font-size: .82rem; color: var(--text);
    }
    .msg-ai {
      align-self: flex-start; max-width: 85%;
      background: rgba(100,0,16,0.18); border:1px solid rgba(150,0,25,0.3);
      border-radius: .6rem .6rem .6rem 0; padding: .5rem .75rem;
      font-size: .82rem; color: var(--text); line-height: 1.5;
    }
    .msg-ai .author { font-size:.65rem; color:var(--crimson); margin-bottom:.25rem; font-family:'Cinzel',serif; letter-spacing:.05em; }
    .chat-input-area {
      border-top: 1px solid var(--border);
      padding: .6rem;
      display: flex; gap: .5rem; align-items: flex-end;
    }
    .chat-textarea {
      flex:1; background:rgba(8,0,14,0.8); border:1px solid rgba(100,0,18,0.35);
      border-radius:.5rem; padding:.55rem .75rem; color:var(--text);
      font-size:.82rem; resize:none; min-height:38px; max-height:90px;
      font-family:inherit; line-height:1.4;
      transition: border-color .2s, box-shadow .2s;
    }
    .chat-textarea::placeholder { color:var(--muted); }
    .chat-textarea:focus { border-color:var(--crimson); box-shadow:0 0 10px rgba(204,0,40,0.18); outline:none; }

    /* ── RUNE BUTTON ── */
    .rune-btn {
      width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
      background: radial-gradient(circle at 40% 40%, rgba(90,0,150,0.4), rgba(130,0,25,0.3));
      border: 1px solid rgba(150,0,28,0.55);
      cursor: pointer; display:flex; align-items:center; justify-content:center;
      font-size: 1.2rem; transition: transform .15s;
      animation: rune-idle 3s ease-in-out infinite;
    }
    .rune-btn:hover { transform: scale(1.08); }
    .rune-btn:disabled { cursor: not-allowed; opacity: .5; animation: rune-think .7s ease-in-out infinite; }
    @keyframes rune-idle {
      0%,100% { box-shadow: 0 0 8px var(--glow-r), 0 0 4px var(--glow-p); }
      50%      { box-shadow: 0 0 18px var(--glow-r), 0 0 10px var(--glow-p); }
    }
    @keyframes rune-think {
      0%,100% { box-shadow: 0 0 24px var(--glow-p), 0 0 48px rgba(123,0,204,0.3); transform: scale(1); }
      50%      { box-shadow: 0 0 36px var(--glow-r), 0 0 72px rgba(204,0,40,0.35); transform: scale(1.06); }
    }

    /* ── Chat welcome ── */
    .chat-welcome {
      flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
      text-align:center; padding:1rem; gap:.5rem; opacity:.6;
    }
    .chat-welcome .rune-big { font-size:2.5rem; opacity:.4; }

    /* ── Modal ── */
    .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:50; align-items:center; justify-content:center; padding:1rem; backdrop-filter:blur(5px); }
    .modal-bg.open { display:flex; }
    .modal-box {
      background:rgba(12,2,20,0.98); border:1px solid rgba(130,0,25,0.45);
      box-shadow:0 0 60px rgba(0,0,0,0.8), 0 0 30px rgba(100,0,20,0.15);
      border-radius:1rem; max-width:700px; width:100%; max-height:88vh;
      overflow-y:auto; padding:1.75rem; position:relative;
    }
    /* Rich content styles */
    .rich-content { font-size:.9rem; line-height:1.75; color:var(--text); }
    .rich-content h1,.rich-content h2,.rich-content h3 { font-family:'Cinzel',serif; color:#c9a04a; margin:1.2rem 0 .5rem; }
    .rich-content h1 { font-size:1.4rem; }
    .rich-content h2 { font-size:1.15rem; }
    .rich-content h3 { font-size:1rem; }
    .rich-content p { margin-bottom:.65rem; }
    .rich-content ul,.rich-content ol { padding-left:1.5rem; margin-bottom:.65rem; }
    .rich-content li { margin-bottom:.25rem; }
    .rich-content blockquote { border-left:3px solid rgba(181,0,42,0.6); color:#9a7aaa; padding-left:1rem; margin:.75rem 0; font-style:italic; }
    .rich-content code { background:rgba(40,0,60,0.5); border-radius:.3rem; padding:.1rem .4rem; color:#c9a04a; font-size:.85rem; }
    .rich-content pre { background:rgba(40,0,60,0.5); border-radius:.5rem; padding:.75rem 1rem; overflow-x:auto; margin-bottom:.65rem; }
    .rich-content pre code { background:none; padding:0; }
    .rich-content a { color:#b5002a; text-decoration:underline; }
    .rich-content img { max-width:100%; border-radius:.5rem; margin:.5rem 0; display:block; }
    .rich-content strong { color:#d4c4e0; font-weight:700; }
    .rich-content em { color:#b8a0cc; }

    /* ── Buttons ── */
    .btn-sm { background:linear-gradient(135deg,#6a001a,#a00022); border:none; border-radius:.55rem; padding:.4rem .9rem; color:#fff; font-size:.75rem; font-weight:700; cursor:pointer; box-shadow:0 0 14px rgba(180,0,30,0.45), inset 0 0 8px rgba(180,0,30,0.14); transition:all .2s; }
    .btn-sm:hover { box-shadow:0 0 26px rgba(210,0,40,0.7), 0 0 10px rgba(210,0,40,0.3), inset 0 0 12px rgba(180,0,30,0.2); transform:translateY(-1px); }

    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:rgba(8,0,14,0.4); }
    ::-webkit-scrollbar-thumb { background:rgba(130,0,24,0.5); border-radius:3px; }

    @keyframes pulse { 0%,100% { opacity:.5; } 50% { opacity:.85; } }

    /* ── Hero glow behind title ── */
    .hero-content { position:relative; z-index:2; text-align:center; padding:.75rem 1rem; }
    .hero-content::before {
      content:'';
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:clamp(400px,70vw,800px); height:220px;
      background:radial-gradient(ellipse at center,
        rgba(160,0,45,0.32) 0%,
        rgba(100,0,160,0.22) 38%,
        transparent 70%);
      filter:blur(22px);
      pointer-events:none;
      animation:hero-glow-pulse 3.5s ease-in-out infinite alternate;
    }
    @keyframes hero-glow-pulse {
      0%   { opacity:.7; transform:translate(-50%,-50%) scale(1); }
      100% { opacity:1;  transform:translate(-50%,-50%) scale(1.08); }
    }

    /* ── Scroll arrow bounce ── */
    @keyframes scroll-bounce {
      0%,100% { transform:translateX(-50%) translateY(0);   opacity:.38; }
      50%      { transform:translateX(-50%) translateY(9px); opacity:.7;  }
    }
    .nav-link-item {
      display:flex; align-items:center; gap:.6rem;
      padding:.55rem .8rem; border-radius:.6rem;
      background:rgba(110,0,20,0.1); border:1px solid rgba(110,0,20,0.2);
      color:var(--text); text-decoration:none; font-size:.82rem;
      transition:background .2s, border-color .2s, box-shadow .2s;
    }
    .nav-link-item:hover { background:rgba(150,0,28,0.22); border-color:rgba(160,0,35,0.5); box-shadow:0 0 12px rgba(190,0,35,0.22), inset 0 0 10px rgba(140,0,25,0.1); }
    .discord-btn {
      display:flex; align-items:center; gap:.65rem;
      padding:.6rem .8rem; border-radius:.5rem;
      background:rgba(88,101,242,0.12); border:1px solid rgba(88,101,242,0.28);
      color:#7289da; text-decoration:none; font-size:.82rem; font-weight:600;
      transition:background .2s, border-color .2s, box-shadow .2s;
    }
    .discord-btn:hover { background:rgba(88,101,242,0.22); border-color:rgba(88,101,242,0.5); box-shadow:0 0 14px rgba(88,101,242,0.2); }
    @media (max-width: 1024px) { .main-grid { flex-direction: column !important; } .side-panel { width: 100% !important; } }

    /* ── Fade-up entrance ── */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .g-panel { animation: fade-up .45s ease both; }
    .news-card { animation: fade-up .35s ease both; }

    /* ── Tag pills ── */
    .tag-pill {
      display: inline-flex; align-items: center;
      padding: .22rem .7rem; border-radius: 9999px; font-size: .68rem;
      border: 1px solid rgba(110,0,20,0.3); background: rgba(20,10,25,0.5);
      color: var(--muted); cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .tag-pill:hover { border-color: rgba(180,0,35,0.5); color: var(--text); }
    .tag-pill.active {
      border-color: var(--crimson); color: var(--text);
      background: rgba(130,0,25,0.28); box-shadow: 0 0 10px rgba(190,0,35,0.2);
    }
    .news-tag {
      display: inline-block; font-size: .6rem; padding: .1rem .45rem;
      border-radius: 9999px; border: 1px solid rgba(110,0,20,0.3);
      color: var(--muted); margin-right: .3rem; cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .news-tag:hover { color: var(--crimson); border-color: rgba(180,0,35,0.4); }

    /* ── Toast ── */
    #toast-container {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 200;
      display: flex; flex-direction: column; gap: .5rem; pointer-events: none;
    }
    .toast {
      background: rgba(10,2,18,0.97); border-radius: .65rem;
      padding: .7rem 1.1rem; border: 1px solid rgba(130,0,25,0.4);
      font-size: .8rem; color: var(--text);
      box-shadow: 0 4px 28px rgba(0,0,0,0.55); max-width: 300px;
      animation: fade-up .3s ease both; pointer-events: auto;
    }
    .toast-success { border-color: rgba(0,160,35,0.5); }
    .toast-error   { border-color: rgba(200,0,25,0.6); }
    @keyframes toast-out { to { opacity:0; transform:translateY(6px); } }

    /* ── Sparkline ── */
    .sparkline-wrap { padding: .25rem 0 .1rem; }

    /* ── Hunter rows ── */
    .hunter-row {
      display: grid; grid-template-columns: 18px 1fr auto;
      align-items: center; gap: .5rem;
      padding: .28rem 0; border-bottom: 1px solid rgba(110,0,20,0.08);
    }
    .hunter-row:last-child { border-bottom: none; }
  </style>
</head>
<body>
<div class="fog"></div>

<!-- ══ NAV ══════════════════════════════════════════════════════════════════ -->
<nav class="glass-nav sticky top-0 z-40 relative">
  <div style="max-width:1280px;margin:auto;padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;">
    <a href="/" id="nav-logo" class="gothic" style="font-size:1.25rem;font-weight:900;letter-spacing:.15em;color:#d4c4e0;text-decoration:none;text-shadow:0 0 20px rgba(204,0,40,0.6);">⚔ V RISING</a>
    <div style="display:flex;align-items:center;gap:.75rem;">
      <span id="nav-username" class="hidden" style="font-size:.8rem;color:var(--muted);"></span>
      <a id="nav-admin" href="/admin.html" class="hidden btn-sm gothic" style="font-size:.7rem;letter-spacing:.05em;text-decoration:none;">Админка</a>
      <a id="nav-login" href="/login.html" class="btn-sm">Войти</a>
      <button id="nav-logout" class="hidden pg-btn" style="font-size:.75rem;" onclick="doLogout()">Выйти</button>
    </div>
  </div>
</nav>

<!-- ══ HERO ══════════════════════════════════════════════════════════════════ -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="moon"></div>
  <div class="stars" id="stars"></div>

  <!-- Castle SVG silhouette -->
  <div class="castle-wrap">
    <svg class="castle-svg" viewBox="0 0 1000 320" preserveAspectRatio="xMidYMax meet" fill="#0d0018">
      <path d="
        M0,320 L0,200
        L30,200 L30,160 L50,160 L50,140 L70,140 L70,160 L90,160 L90,200
        L130,200 L130,130 L145,130 L145,100 L155,100 L155,85 L165,85 L165,100 L175,100 L175,130 L190,130 L190,200

<script>
const API = '/api';

// ── Setup guard ────────────────────────────────────────────────────────────
(async () => {
  try {
    const r = await fetch(`${API}/setup/status`);
    const d = await r.json();
    if (!d.completed) window.location.href = '/setup.html';
  } catch {}
})();

// ── Stars ──────────────────────────────────────────────────────────────────
(() => {
  const c = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2 + 1;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*60}%;left:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*3}s;`;
    c.appendChild(s);
  }
})();

// ── Nav ────────────────────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('token'); }
function getUser()  { try { return JSON.parse(localStorage.getItem('user')); } catch { return null; } }
function doLogout() { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.reload(); }

let _isAdmin = false;

(() => {
  const u = getUser();
  if (u && getToken()) {
    document.getElementById('nav-username').textContent = u.username;
    document.getElementById('nav-username').classList.remove('hidden');
    document.getElementById('nav-login').classList.add('hidden');
    document.getElementById('nav-logout').classList.remove('hidden');
    if (u.role === 'admin') {
      document.getElementById('nav-admin').classList.remove('hidden');
      _isAdmin = true;
    }
    document.getElementById('nav-profile-link').classList.remove('hidden');
    // sidebar nav: replace "Войти" with "Выйти"
    const lnk = document.getElementById('nav-login-link');
    lnk.href = '#'; lnk.onclick = (e) => { e.preventDefault(); doLogout(); };
    document.getElementById('nav-link-label').textContent = 'Выйти';
  }
})();

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg, type = 'info', duration = 4500) {
  const ct = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  ct.appendChild(t);
  setTimeout(() => {
    t.style.animation = 'toast-out .3s ease forwards';
    setTimeout(() => t.remove(), 320);
  }, duration);
}

// ── Status ─────────────────────────────────────────────────────────────────
function fmtDate(iso) { return new Date(iso).toLocaleDateString('ru-RU',{day:'2-digit',month:'short',year:'numeric'}); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDuration(sec) {
  if (sec < 60) return `${sec}с`;
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
  return h > 0 ? `${h}ч ${m}м` : `${m}м`;
}

function row(k, v) {
  return `<div style="display:flex;justify-content:space-between;border-bottom:1px solid rgba(110,0,20,0.12);padding-bottom:.35rem;">
    <span style="color:var(--muted);">${k}</span>
    <span style="color:#d4c4e0;font-weight:600;">${esc(v)}</span>
  </div>`;
}

function bloodCircle(centerText, label, fillPct) {
  const r = 28, cx = 36, cy = 36;
  const circ = +(2 * Math.PI * r).toFixed(2);
  const offset = +(circ * (1 - Math.min(100, Math.max(0, fillPct)) / 100)).toFixed(2);
  const uid = Math.random().toString(36).slice(2, 8);
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:.45rem;">
    <svg width="72" height="72" viewBox="0 0 72 72" style="overflow:visible;">
      <defs>
        <linearGradient id="bg${uid}" x1="0%" y1="100%" x2="0%" y2="0%">
          <stop offset="0%" stop-color="#1e0006"/>
          <stop offset="45%" stop-color="#880014"/>
          <stop offset="100%" stop-color="#d40026"/>
        </linearGradient>
        <filter id="gf${uid}" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="2.8" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="rgba(18,0,6,0.7)" stroke="rgba(80,0,15,0.22)" stroke-width="5"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
        stroke="url(#bg${uid})" stroke-width="5" stroke-linecap="round"
        stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
        transform="rotate(-90 ${cx} ${cy})" filter="url(#gf${uid})"
        data-target="${offset}"
        style="transition:stroke-dashoffset 1.4s cubic-bezier(0.25,0.46,0.45,0.94);"/>
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central"
        fill="#d4c4e0" font-size="14" font-weight="700"
        font-family="'Exo 2',sans-serif">${centerText}</text>
    </svg>
    <p style="font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;">${label}</p>
  </div>`;
}

function animateBloodCircles(container) {
  if (!container) return;
  setTimeout(() => {
    container.querySelectorAll('[data-target]').forEach(el => {
      el.style.strokeDashoffset = el.dataset.target;
    });
  }, 60);
}

function renderPlayerList(players, elId) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (!players || players.length === 0) {
    el.innerHTML = `<div style="color:var(--muted);font-size:.75rem;font-style:italic;padding:.4rem 0;">Нет игроков онлайн</div>`;
    return;
  }
  const sorted = [...players].sort((a, b) => b.duration - a.duration);
  el.innerHTML = sorted.map(p => {
    const name = p.name || 'Аноним';
    const initial = esc(name.trim().charAt(0).toUpperCase() || '?');
    const hue = name.split('').reduce((a, c) => a + c.charCodeAt(0), 0) % 55 + 330;
    return `<div style="display:grid;grid-template-columns:28px 1fr auto;align-items:center;gap:.55rem;padding:.32rem 0;border-bottom:1px solid rgba(110,0,20,0.1);">
      <div style="width:26px;height:26px;border-radius:50%;
           background:radial-gradient(circle at 38% 32%, hsl(${hue},72%,22%), hsl(${hue},60%,9%));
           border:1px solid rgba(190,0,40,0.32);
           display:flex;align-items:center;justify-content:center;
           font-size:.68rem;font-weight:700;color:rgba(225,185,205,0.9);
           font-family:'Cinzel',serif;
           box-shadow:0 0 6px rgba(180,0,30,0.22);flex-shrink:0;">
        ${initial}
      </div>
      <span style="font-family:'Philosopher',serif;color:#d0ccd8;font-size:.875rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(name)}</span>
      <span style="font-family:'Philosopher',serif;color:var(--muted);font-size:.72rem;white-space:nowrap;">${fmtDuration(p.duration)}</span>
    </div>`;
  }).join('');
}

function renderServerBlock(d, sfx) {
  const pct = d.max_players > 0 ? Math.round(d.players / d.max_players * 100) : 0;
  const cls = d.online ? 'badge-on' : 'badge-off';
  const lbl = d.online ? '● ОНЛАЙН' : '● ОФЛАЙН';
  const dot = d.online ? '<span class="dot-pulse">●</span>' : '●';
  const badgeTxt = d.online ? 'ОНЛАЙН' : 'ОФЛАЙН';

  const statusEl = document.getElementById('left-status' + sfx);
  if (statusEl) statusEl.innerHTML = `
    <div style="margin-bottom:.35rem;">
      <span class="${cls}" style="font-size:.6rem;padding:.15rem .6rem;border-radius:9999px;font-weight:700;">${dot} ${badgeTxt}</span>
    </div>
    <div style="font-size:.82rem;color:#d4c4e0;font-weight:600;line-height:1.3;margin-bottom:.45rem;word-break:break-word;">${esc(d.name)}</div>
    <div class="p-bar"><div class="p-fill" style="width:${pct}%"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:.3rem;font-size:.65rem;color:var(--muted);">
      <span>Игроков: ${d.players}</span><span>Макс: ${d.max_players}</span>
    </div>`;

  const circEl = document.getElementById('left-circles' + sfx);
  if (circEl) {
    const fillPct = d.max_players > 0 ? d.players / d.max_players * 100 : 0;
    circEl.innerHTML = bloodCircle(d.players, 'Онлайн', fillPct) + bloodCircle(pct + '%', 'Заполнен', pct);
    animateBloodCircles(circEl);
  }

  const infoEl = document.getElementById('left-info' + sfx);
  if (infoEl) infoEl.innerHTML =
    row('Карта', d.map || '—') +
    row('Версия', d.version || '—') +
    row('VAC', d.vac ? '✔ Защищён' : '✘ Нет');

  renderPlayerList(d.players_list || [], 'players-list' + sfx);
  return { lbl, cls, name: d.name, players: d.players, max_players: d.max_players };
}

// ── Top hunters ────────────────────────────────────────────────────────────
function updateHunters(players) {
  const wrap = document.getElementById('hunters-wrap');
  const el = document.getElementById('top-hunters');
  if (!wrap || !el) return;
  if (!players || !players.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  const sorted = [...players].sort((a, b) => b.duration - a.duration).slice(0, 5);
  const medals = ['🥇', '🥈', '🥉'];
  el.innerHTML = sorted.map((p, i) => `
    <div class="hunter-row">
      <span style="font-size:.7rem;text-align:center;">${medals[i] || '⚔'}</span>
      <span style="font-family:'Philosopher',serif;font-size:.8rem;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.name)}</span>
      <span style="font-size:.68rem;color:var(--muted);white-space:nowrap;">${fmtDuration(p.duration)}</span>
    </div>`).join('');
}

// ── Sparkline ──────────────────────────────────────────────────────────────
function renderSparkline(history) {
  const wrap = document.getElementById('sparkline-wrap');
  const ct = document.getElementById('sparkline');
  const hint = document.getElementById('sparkline-hint');
  if (!wrap || !ct) return;
  if (!history || history.length < 2) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  const W = 260, H = 44, pad = 3;
  const maxP = Math.max(...history.map(h => h.players), 1);
  if (hint) hint.textContent = `пик ${maxP}`;
  const pts = history.map((h, i) => {
    const x = pad + (i / (history.length - 1)) * (W - pad * 2);
    const y = pad + ((maxP - h.players) / maxP) * (H - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const uid = Math.random().toString(36).slice(2, 6);
  ct.innerHTML = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block;">
    <defs>
      <linearGradient id="sg${uid}" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="rgba(100,0,180,0.7)"/>
        <stop offset="100%" stop-color="rgba(200,0,35,0.95)"/>
      </linearGradient>
    </defs>
    <polyline points="${pts.join(' ')}" fill="none" stroke="url(#sg${uid})" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

async function loadHistory() {
  try {
    const d = await fetch(`${API}/monitor/history`).then(r => r.json());
    renderSparkline(d);
  } catch {}
}

// ── Server status change detection ─────────────────────────────────────────
let _prevOnline1 = null, _prevOnline2 = null;

async function loadStatus() {
  try {
    const d = await fetch(`${API}/monitor/status`).then(r => r.json());
    const { lbl, cls } = renderServerBlock(d, '');
    document.getElementById('hero-status').innerHTML = `
      <span class="${cls}" style="font-size:.72rem;font-weight:700;padding:.2rem .75rem;border-radius:9999px;">${lbl}</span>
      <span style="color:var(--text);margin:0 .6rem;font-size:.78rem;font-weight:500;">${esc(d.name)}</span>
      <span style="color:var(--muted);font-size:.75rem;">${d.players} / ${d.max_players} игроков</span>`;
    updateHunters(d.players_list || []);
    if (_prevOnline1 !== null && _prevOnline1 !== d.online) {
      d.online
        ? showToast(`${d.name} вернулся онлайн!`, 'success')
        : showToast(`${d.name} ушёл офлайн`, 'error');
    }
    _prevOnline1 = d.online;
  } catch {
    document.getElementById('hero-status').innerHTML = `<span style="color:var(--muted);font-size:.78rem;">Статус недоступен</span>`;
  }
}

async function loadStatus2() {
  try {
    const d = await fetch(`${API}/monitor/status2`).then(r => r.json());
    const section = document.getElementById('server2-section');
    const heroSt2 = document.getElementById('hero-status2');
    if (!d.enabled) {
      section.style.display = 'none';
      if (heroSt2) heroSt2.style.display = 'none';
      return;
    }
    section.style.display = 'block';
    const titleEl = document.getElementById('server2-title');
    if (titleEl) titleEl.textContent = `— ${d.name} —`;
    renderServerBlock(d, '2');
    if (_prevOnline2 !== null && _prevOnline2 !== d.online) {
      d.online
        ? showToast(`${d.name} вернулся онлайн!`, 'success')
        : showToast(`${d.name} ушёл офлайн`, 'error');
    }
    _prevOnline2 = d.online;
  } catch {}
}

// ── Tags ───────────────────────────────────────────────────────────────────
let _activeTag = null;

async function loadTags() {
  try {
    const tags = await fetch(`${API}/news/tags`).then(r => r.json());
    const ct = document.getElementById('tag-filters');
    if (!ct || !tags.length) return;
    ct.innerHTML = tags.map(t => `<button class="tag-pill" data-tag="${esc(t)}" onclick="setTag('${esc(t)}')">${esc(t)}</button>`).join('');
  } catch {}
}

function setTag(tag) {
  _activeTag = (_activeTag === tag) ? null : tag;
  document.querySelectorAll('.tag-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.tag === _activeTag);
  });
  loadNews(1);
}

// ── News ───────────────────────────────────────────────────────────────────
async function loadNews(page = 1) {
  const url = _activeTag
    ? `${API}/news?page=${page}&per_page=9&tag=${encodeURIComponent(_activeTag)}`
    : `${API}/news?page=${page}&per_page=9`;
  const data = await fetch(url).then(r => r.json());
  const list = document.getElementById('news-list');
  list.innerHTML = '';
  if (!data.items.length) {
    list.innerHTML = `<p style="color:var(--muted);font-style:italic;padding:.75rem 0;">Новостей пока нет — следите за обновлениями.</p>`;
    return;
  }
  data.items.forEach((n, idx) => {
    const thumbImg = n.thumbnail_url
      ? `<img src="${esc(n.thumbnail_url)}" alt="" style="width:140px;min-height:100px;height:100%;object-fit:cover;flex-shrink:0;">`
      : `<div style="width:140px;min-height:100px;flex-shrink:0;background:linear-gradient(135deg,rgba(60,0,100,0.4),rgba(90,0,15,0.4));display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:rgba(180,0,30,0.45);">⚔</div>`;
    const tagsHtml = (n.tags || '').split(',').map(t => t.trim()).filter(Boolean)
      .map(t => `<span class="news-tag" onclick="event.stopPropagation();setTag('${esc(t)}')">${esc(t)}</span>`).join('');
    const card = document.createElement('div');
    card.className = 'news-card';
    card.style.animationDelay = `${idx * 0.06}s`;
    card.innerHTML = `<div style="display:flex;gap:0;min-height:100px;">
      ${thumbImg}
      <div style="padding:.75rem 1rem;flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;">
        <p style="font-size:.65rem;color:var(--muted);margin-bottom:.35rem;">${fmtDate(n.created_at)} · ${esc(n.author.username)}</p>
        <h3 class="gothic" style="font-size:1rem;font-weight:600;color:#d4c4e0;line-height:1.35;margin-bottom:.35rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${esc(n.title)}</h3>
        <p style="font-size:.78rem;color:var(--muted);line-height:1.5;margin-bottom:.4rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${esc(n.summary)}</p>
        ${tagsHtml ? `<div style="margin-top:.1rem;">${tagsHtml}</div>` : ''}
      </div>
    </div>`;
    card.onclick = () => openNews(n.slug);
    if (_isAdmin) {
      const editBtn = document.createElement('a');
      editBtn.href = `/admin.html?edit=${encodeURIComponent(n.slug)}`;
      editBtn.title = 'Редактировать новость';
      editBtn.onclick = e => e.stopPropagation();
      editBtn.style.cssText = `
        position:absolute;top:.55rem;right:.65rem;
        display:flex;align-items:center;gap:.3rem;
        background:rgba(10,2,20,0.88);border:1px solid rgba(150,0,28,0.4);
        border-radius:.45rem;padding:.2rem .55rem;
        font-size:.65rem;font-weight:700;color:var(--muted);
        text-decoration:none;line-height:1;
        transition:color .15s,border-color .15s,box-shadow .15s;
        z-index:10;`;
      editBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Ред.`;
      editBtn.onmouseover = () => { editBtn.style.color = '#fff'; editBtn.style.borderColor = 'rgba(200,0,35,0.7)'; editBtn.style.boxShadow = '0 0 10px rgba(180,0,30,0.35)'; };
      editBtn.onmouseout  = () => { editBtn.style.color = 'var(--muted)'; editBtn.style.borderColor = 'rgba(150,0,28,0.4)'; editBtn.style.boxShadow = ''; };
      card.style.position = 'relative';
      card.appendChild(editBtn);
    }
    list.appendChild(card);
  });
  const pag = document.getElementById('news-pagination');
  pag.innerHTML = '';
  for (let i = 1; i <= data.pages; i++) {
    const b = document.createElement('button');
    b.className = 'pg-btn' + (i === page ? ' active' : '');
    b.textContent = i; b.onclick = () => loadNews(i);
    pag.appendChild(b);
  }
}

async function openNews(slug) {
  try {
    const n = await fetch(`${API}/news/${slug}`).then(r => r.json());
    document.getElementById('modal-title').textContent = n.title;
    document.getElementById('modal-date').textContent = `${fmtDate(n.created_at)} · ${n.author.username}`;
    document.getElementById('modal-content').innerHTML = n.content || '';
    document.getElementById('modal-bg').classList.add('open');
    document.body.style.overflow = 'hidden';
  } catch { alert('Не удалось загрузить новость.'); }
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); document.body.style.overflow = ''; }
document.getElementById('modal-bg').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Site settings ──────────────────────────────────────────────────────────
async function loadSiteSettings() {
  try {
    const d = await fetch(`${API}/settings/public`).then(r => r.json());
    const title   = (d.site_title || '').trim() || 'V RISING';
    const logo    = (d.site_logo_url || '').trim();
    const discord = (d.discord_url || '').trim();
    const bg      = (d.bg_image_url || '').trim();
    if (bg) {
      document.body.style.backgroundImage = [
        'radial-gradient(ellipse at 15% 50%, rgba(80,0,130,0.14) 0%, transparent 55%)',
        'radial-gradient(ellipse at 85% 20%, rgba(150,0,28,0.10) 0%, transparent 50%)',
        'linear-gradient(rgba(8,0,14,0.72), rgba(8,0,14,0.72))',
        `url('${bg}')`,
      ].join(',');
      document.body.style.backgroundSize = 'auto,auto,auto,cover';
      document.body.style.backgroundPosition = 'center,center,center,center';
      document.body.style.backgroundAttachment = 'fixed,fixed,fixed,fixed';
    }

    document.getElementById('hero-title').textContent = title;
    document.title = title + ' — Замок';

    const navLogo = document.getElementById('nav-logo');
    if (logo) {
      navLogo.innerHTML = `<img src="${logo}" alt="${title}" style="height:2rem;max-width:10rem;object-fit:contain;vertical-align:middle;" onerror="this.parentElement.textContent='⚔ ${title}'">`;
    } else {
      navLogo.textContent = '⚔ ' + title;
    }

    const discordBtn = document.getElementById('discord-btn');
    if (discord) {
      discordBtn.href = discord;
      discordBtn.style.display = 'flex';
    }
  } catch {}
}

// ── Init ───────────────────────────────────────────────────────────────────
// Stagger panel entrance animations
document.querySelectorAll('.g-panel').forEach((p, i) => {
  p.style.animationDelay = `${i * 0.08}s`;
});

loadSiteSettings();
loadStatus();
loadStatus2();
loadHistory();
setInterval(() => { loadStatus(); loadStatus2(); }, 30000);
setInterval(loadHistory, 300000); // refresh sparkline every 5 min
loadNews(1);
loadTags();
</script>
</body>
