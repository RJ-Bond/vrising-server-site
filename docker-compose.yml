services:
  web:
    build: .
    container_name: vrising_api
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-changeme_generate_random_32chars}
      - DATABASE_URL=sqlite+aiosqlite:////data/vrising.db
      - VRISING_SERVER_IP=${VRISING_SERVER_IP:-127.0.0.1}
      - VRISING_SERVER_PORT=${VRISING_SERVER_PORT:-27016}
    volumes:
      - db_data:/data
    networks:
      - vrising_net

  nginx:
    image: nginx:1.25-alpine
    container_name: vrising_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - web
    networks:
      - vrising_net

volumes:
  db_data:

networks:
  vrising_net:
    driver: bridge
