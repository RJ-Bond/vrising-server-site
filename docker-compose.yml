name: vrising

services:
  web:
    build: .
    container_name: vrising_api
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-changeme_generate_random_32chars}
      - DATABASE_URL=sqlite+aiosqlite:////data/vrising.db
      - VRISING_SERVER_IP=${VRISING_SERVER_IP:-127.0.0.1}
      - VRISING_SERVER_PORT=${VRISING_SERVER_PORT:-27016}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@localhost}
      - TZ=Europe/Moscow
    volumes:
      - db_data:/data
      - ./backend:/app/backend
      - .:/opt/vrising-site
      - /var/run/docker.sock:/var/run/docker.sock
      - maintenance_flag:/var/maintenance
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/version')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - vrising_net

  nginx:
    image: nginx:1.25-alpine
    container_name: vrising_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-ssl.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - letsencrypt_data:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
      - maintenance_flag:/var/maintenance:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - vrising_net

volumes:
  db_data:
  letsencrypt_data:
    name: vrising_letsencrypt
  certbot_webroot:
    name: vrising_certbot_webroot
  maintenance_flag:

networks:
  vrising_net:
    driver: bridge
