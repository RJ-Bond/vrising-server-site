name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (import check + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
      - name: Import check (backend/*.py)
        run: bash scripts/check_backend.sh
      - name: pytest (backend/tests)
        run: bash scripts/test_backend.sh

  frontend:
    name: Frontend (HTML/CSS validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate frontend/*.html + CSS
        run: bash scripts/check.sh
