name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (import check + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
      - name: Import check (backend/*.py)
        run: bash scripts/check_backend.sh
      - name: pytest (backend/tests)
        run: bash scripts/test_backend.sh

  frontend:
    name: Frontend (HTML/CSS validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate frontend/*.html + CSS
        run: bash scripts/check.sh

  # Every push to master that passes both jobs above gets an automatic CalVer tag
  # (vYYYY.MM.DD, with a .N suffix for same-day releases) + a GitHub Release whose
  # notes are the emoji-annotated commit list since the previous tag (see
  # scripts/release_notes.sh). Deploy itself stays manual (`sudo js` on the server,
  # per CLAUDE.md) — this job only marks/documents releases, it never touches the
  # server. Skipped on pull_request (no new commits on master yet to release) and on
  # the VERSION-bump commit itself, via the standard "[skip ci]" convention below.
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          today=$(date -u +%Y.%m.%d)
          count=$(git tag -l "v${today}*" | wc -l)
          if [ "$count" -eq 0 ]; then
            new_version="v${today}"
          else
            new_version="v${today}.$((count + 1))"
          fi
          prev_tag=$(git describe --tags --abbrev=0 2>/dev/null || true)
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "prev_tag=$prev_tag" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          notes="$(bash scripts/release_notes.sh "${{ steps.version.outputs.prev_tag }}")"
          {
            echo "notes<<EOF_NOTES"
            echo "$notes"
            echo "EOF_NOTES"
          } >> "$GITHUB_OUTPUT"

      - name: Bump VERSION and commit
        run: |
          echo "${{ steps.version.outputs.version }}" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump VERSION to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:master

      - name: Tag release
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "🚀 Релиз ${{ steps.version.outputs.version }}"
          body: ${{ steps.changelog.outputs.notes }}
