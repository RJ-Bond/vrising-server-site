worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml font/woff2;

    # Hide nginx version
    server_tokens off;

    # Crawlers/link-unfurlers that don't execute JS (Discord, Telegram, VK, Twitter,
    # search bots, …) never run index.js's client-side setMeta() call, so a shared
    # article link (/?news=<slug>) always showed the generic homepage title/image.
    # Requests from these user-agents for that specific shape get routed (see the "/"
    # location below) to /api/news-embed, which re-serves index.html with the real
    # article's meta swapped in server-side; regular browsers are unaffected.
    map $http_user_agent $is_crawler_ua {
        default 0;
        "~*(bot|crawler|spider|slurp|facebookexternalhit|discordbot|telegrambot|twitterbot|whatsapp|slackbot|linkedinbot|vkshare|pinterest|redditbot|applebot|skypeuripreview|w3c_validator)" 1;
    }

    # HTTP → HTTPS redirect + certbot challenge
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/letsencrypt/live/v.just-skill.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/v.just-skill.ru/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/v.just-skill.ru/chain.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self'; frame-src https://www.youtube-nocookie.com https://www.youtube.com https://rutube.ru; frame-ancestors 'none';" always;

        root /usr/share/nginx/html;
        index index.html;
        error_page 503 /maintenance.html;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Long-term cache for hashed/versioned static assets
        location ~* \.(js|css|woff2?|ttf|otf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Medium cache for images
        location ~* \.(png|jpg|jpeg|gif|webp|ico|svg)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # SEO: sitemap served from API (dynamic, includes news URLs)
        location = /sitemap.xml {
            proxy_pass http://vrising_api:8000/api/sitemap.xml;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            add_header Content-Type "application/xml; charset=utf-8";
        }

        # RSS feed served from API
        location = /rss.xml {
            proxy_pass http://vrising_api:8000/api/rss.xml;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            add_header Content-Type "application/rss+xml; charset=utf-8";
        }

        # Pages always accessible regardless of maintenance mode
        location = /maintenance.html { try_files $uri =404; }
        location = /admin.html       { try_files $uri =404; }
        location = /login.html       { try_files $uri =404; }

        # Maintenance mode: return 503 for all other HTML pages when flag file exists
        location ~* \.html$ {
            if (-f /var/maintenance/.flag) {
                return 503;
            }
            try_files $uri =404;
        }

        # Root — check maintenance flag, then bot-only article prerender
        location = / {
            if (-f /var/maintenance/.flag) {
                return 503;
            }
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            set $prerender "";
            if ($is_crawler_ua) { set $prerender "1"; }
            if ($arg_news = "") { set $prerender ""; }
            if ($prerender) {
                proxy_pass http://vrising_api:8000/api/news-embed?slug=$arg_news;
            }
            try_files /index.html =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://vrising_api:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            # Required for SSE (Server-Sent Events) streaming
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            chunked_transfer_encoding on;
        }

    }
}
