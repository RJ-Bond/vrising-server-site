worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml font/woff2;

    # Hide nginx version
    server_tokens off;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;
        error_page 503 /maintenance.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://i.ytimg.com; connect-src 'self'; frame-src https://www.youtube-nocookie.com https://www.youtube.com https://rutube.ru; frame-ancestors 'none';" always;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Long-term cache for hashed/versioned static assets
        location ~* \.(js|css|woff2?|ttf|otf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Medium cache for images
        location ~* \.(png|jpg|jpeg|gif|webp|ico|svg)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # SEO: sitemap served from API (dynamic, includes news URLs)
        location = /sitemap.xml {
            proxy_pass http://vrising_api:8000/api/sitemap.xml;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Content-Type "application/xml; charset=utf-8";
        }

        # Pages always accessible regardless of maintenance mode
        location = /maintenance.html { try_files $uri =404; }
        location = /admin.html       { try_files $uri =404; }
        location = /login.html       { try_files $uri =404; }

        # Maintenance mode: return 503 for all other HTML pages when flag file exists
        location ~* \.html$ {
            if (-f /var/maintenance/.flag) {
                return 503;
            }
            try_files $uri =404;
        }

        # Root — check maintenance flag
        location = / {
            if (-f /var/maintenance/.flag) {
                return 503;
            }
            try_files /index.html =404;
        }

        # SPA routes — check maintenance flag
        location / {
            if (-f /var/maintenance/.flag) {
                return 503;
            }
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://vrising_api:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            # Required for SSE (Server-Sent Events) streaming
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            chunked_transfer_encoding on;
        }

    }
}
